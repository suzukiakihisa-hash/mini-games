<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>ミニゲームBOX</title>
<style>
/* ============================================================
   共通スタイル
   ============================================================ */
:root{
  --bg:#060a14; --bg2:#0e1729; --card:#141f38; --line:#2b3a5c;
  --text:#e8eefc; --sub:#8fa3c8; --accent:#38bdf8;
  --good:#4ade80; --bad:#f87171; --gold:#fbbf24;
  --glass:rgba(20,31,56,.72);
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{
  margin:0; padding:0; height:100%;
  background:#060a14;
  color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;
  overflow:hidden; overscroll-behavior:none;
  -webkit-user-select:none; user-select:none;
  touch-action:manipulation;
}
/* 背景: 多層オーロラ + 微グリッド */
body::before{
  content:''; position:fixed; inset:-12%; z-index:-2; pointer-events:none;
  background:
    radial-gradient(58% 40% at 16% 2%,  rgba(56,189,248,.22), transparent 62%),
    radial-gradient(50% 36% at 86% 12%, rgba(167,139,250,.20), transparent 64%),
    radial-gradient(72% 50% at 50% 106%,rgba(244,114,182,.14), transparent 66%),
    linear-gradient(#0b1426, #060a14 72%);
  animation:aurora 20s ease-in-out infinite alternate;
}
@keyframes aurora{
  from{transform:translate3d(-1.5%,-1%,0) scale(1.02)}
  to  {transform:translate3d(1.5%,1.5%,0) scale(1.08)}
}
body::after{
  content:''; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.55;
  background-image:
    linear-gradient(rgba(148,197,255,.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,197,255,.055) 1px, transparent 1px);
  background-size:46px 46px;
  -webkit-mask-image:radial-gradient(78% 58% at 50% 26%, #000, transparent 76%);
  mask-image:radial-gradient(78% 58% at 50% 26%, #000, transparent 76%);
}
#app{
  height:100vh; height:100dvh;
  display:flex; flex-direction:column;
  padding-top:var(--sat); padding-bottom:var(--sab);
}
/* ---- ヘッダー ---- */
#hdr{
  flex:0 0 auto; display:flex; align-items:center; gap:8px;
  padding:10px 12px;
}
#hdr .hbtn{
  width:42px; height:42px; border-radius:14px;
  border:1px solid rgba(148,180,255,.16);
  background:linear-gradient(165deg, rgba(44,62,102,.85), rgba(13,20,38,.85));
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  color:var(--text); font-size:19px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  flex:0 0 auto;
  box-shadow:0 4px 12px rgba(2,6,23,.5), inset 0 1px 0 rgba(255,255,255,.14);
  transition:transform .1s;
}
#hdr .hbtn:active{transform:scale(.9);}
#hdr-title{
  flex:1; text-align:center; font-weight:800; font-size:15px; letter-spacing:.08em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  text-transform:uppercase; color:#cfe0ff;
  text-shadow:0 0 14px rgba(56,189,248,.35);
}
/* ---- 画面 ---- */
.screen{display:none; flex:1; min-height:0; flex-direction:column; overflow:hidden;}
.screen.active{display:flex;}
/* ---- メニュー ---- */
#scr-menu{padding:4px 16px 20px; overflow-y:auto;}
.logo{text-align:center; margin:8px 0 18px;}
.logo .big{
  font-size:30px; font-weight:900; letter-spacing:.08em;
  background:linear-gradient(100deg,#7dd3fc 0%,#a78bfa 45%,#f472b6 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter:drop-shadow(0 3px 10px rgba(96,165,250,.45));
}
.logo .small{
  font-size:11px; color:var(--sub); margin-top:5px;
  letter-spacing:.28em; text-transform:uppercase;
}
.logo .rule{
  width:118px; height:2px; margin:9px auto 0; border-radius:2px;
  background:linear-gradient(90deg, transparent, #60a5fa, #a78bfa, transparent);
  filter:drop-shadow(0 0 6px rgba(96,165,250,.8));
}
.cards{display:grid; grid-template-columns:1fr 1fr; gap:13px; max-width:440px; margin:0 auto; width:100%;}
.card{
  --acc:#38bdf8;
  position:relative; overflow:hidden; isolation:isolate;
  background:linear-gradient(168deg, rgba(40,57,97,.92), rgba(12,19,36,.94));
  border:1px solid rgba(148,180,255,.14);
  border-radius:20px;
  padding:16px 10px 13px; text-align:center; cursor:pointer;
  transition:transform .12s cubic-bezier(.2,.9,.3,1.3), box-shadow .18s;
  box-shadow:0 12px 28px rgba(2,6,23,.6), inset 0 1px 0 rgba(255,255,255,.10);
}
/* 上端のアクセントライン(発光) */
.card::after{
  content:''; position:absolute; left:16%; right:16%; top:0; height:2px; z-index:2;
  background:linear-gradient(90deg, transparent, var(--acc), transparent);
  filter:drop-shadow(0 0 7px var(--acc));
}
/* 上方からのアクセント光 */
.card::before{
  content:''; position:absolute; left:-25%; right:-25%; top:-52%; height:92%; z-index:0;
  background:radial-gradient(closest-side, var(--acc), transparent 70%);
  opacity:.20; pointer-events:none;
}
.card:active{
  transform:scale(.945) translateY(2px);
  box-shadow:0 4px 12px rgba(2,6,23,.7), inset 0 1px 0 rgba(255,255,255,.10);
}
/* 3Dアイコンプレート: 面光沢 + 内部陰影 + 外周グロー */
.card .ico{
  position:relative; z-index:1;
  width:68px; height:68px; margin:0 auto; font-size:34px; line-height:1;
  display:flex; align-items:center; justify-content:center; border-radius:22px;
  background:
    radial-gradient(130% 100% at 28% 8%, rgba(255,255,255,.5), transparent 56%),
    linear-gradient(158deg, var(--acc) 0%, rgba(9,14,28,.92) 94%);
  box-shadow:
    0 9px 20px rgba(2,6,23,.65),
    0 0 26px -7px var(--acc),
    inset 0 2px 3px rgba(255,255,255,.55),
    inset 0 -7px 14px rgba(0,0,0,.4);
  text-shadow:0 3px 6px rgba(0,0,0,.5);
}
/* プレート上半分の反射 */
.card .ico::after{
  content:''; position:absolute; inset:2px 2px 52% 2px; border-radius:20px 20px 44% 44%;
  background:linear-gradient(rgba(255,255,255,.3), rgba(255,255,255,0));
  pointer-events:none;
}
.card .nm{font-weight:800; margin-top:11px; font-size:15px; letter-spacing:.02em;}
.card .ds{font-size:11px; color:var(--sub); margin-top:5px; line-height:1.5; min-height:33px;}
.card .st{
  font-size:13px; margin-top:8px; letter-spacing:3px; color:#fbbf24;
  filter:drop-shadow(0 0 5px rgba(251,191,36,.55));
}
.menu-foot{text-align:center; margin-top:22px;}
.menu-foot button{
  background:none; border:none; color:var(--sub); font-size:12px;
  text-decoration:underline; cursor:pointer; padding:8px;
}
/* ---- ステージ選択 ---- */
#scr-stages{padding:8px 20px; align-items:center; overflow-y:auto;}
.sg-head{--acc:#38bdf8; text-align:center; margin:12px 0 20px;}
.sg-head .ico{
  width:88px; height:88px; margin:0 auto; font-size:46px; line-height:1;
  display:flex; align-items:center; justify-content:center; border-radius:28px;
  background:
    radial-gradient(130% 100% at 28% 8%, rgba(255,255,255,.5), transparent 56%),
    linear-gradient(158deg, var(--acc) 0%, rgba(9,14,28,.92) 94%);
  box-shadow:
    0 12px 26px rgba(2,6,23,.65), 0 0 34px -8px var(--acc),
    inset 0 2px 4px rgba(255,255,255,.55), inset 0 -9px 18px rgba(0,0,0,.4);
  text-shadow:0 4px 8px rgba(0,0,0,.5);
}
.sg-head .nm{font-size:21px; font-weight:900; margin-top:12px; letter-spacing:.03em;}
.sg-head .ds{font-size:12.5px; color:var(--sub); margin-top:6px; line-height:1.6;}
.stage-list{display:flex; flex-direction:column; gap:12px; width:100%; max-width:360px;}
.stage-btn{
  --acc:#38bdf8;
  position:relative; overflow:hidden;
  display:flex; align-items:center; gap:14px;
  background:linear-gradient(120deg, rgba(38,54,92,.85), rgba(12,19,36,.9));
  border:1px solid rgba(148,180,255,.13);
  border-radius:18px;
  color:var(--text); padding:15px 18px; font-size:16px; cursor:pointer; width:100%;
  box-shadow:0 8px 20px rgba(2,6,23,.5), inset 0 1px 0 rgba(255,255,255,.08);
  transition:transform .1s;
}
/* 左端の発光ライン */
.stage-btn::before{
  content:''; position:absolute; left:0; top:14%; bottom:14%; width:3px; border-radius:0 3px 3px 0;
  background:var(--acc); filter:drop-shadow(0 0 7px var(--acc));
}
.stage-btn:active{transform:scale(.97);}
.stage-btn .no{
  width:42px; height:42px; border-radius:14px;
  background:
    radial-gradient(120% 100% at 30% 10%, rgba(255,255,255,.55), transparent 58%),
    linear-gradient(158deg, var(--acc), rgba(9,14,28,.85) 95%);
  color:#08111f;
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:17px; flex:0 0 auto;
  box-shadow:inset 0 2px 3px rgba(255,255,255,.5), inset 0 -5px 10px rgba(0,0,0,.3),
             0 4px 10px rgba(2,6,23,.5);
}
.stage-btn .lbl{flex:1; text-align:left; font-weight:700; letter-spacing:.03em;}
.stage-btn .mark{font-size:18px; filter:drop-shadow(0 0 6px rgba(251,191,36,.6));}
.stage-btn.locked{opacity:.4; filter:saturate(.3);}
.stage-btn.locked::before{filter:none;}
/* ---- ゲーム画面 ---- */
#scr-game{position:relative;}
#game-host{flex:1; min-height:0; position:relative; display:flex; flex-direction:column; touch-action:none;}
#game-host::after{
  content:''; position:absolute; inset:0; pointer-events:none; z-index:3;
  background:radial-gradient(125% 105% at 50% 42%, transparent 60%, rgba(2,6,23,.45));
}
canvas{display:block; touch-action:none;}
.hint-bar{
  position:absolute; top:52px; left:50%; transform:translateX(-50%);
  background:linear-gradient(160deg, rgba(30,44,76,.92), rgba(9,14,28,.92));
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(148,180,255,.2);
  padding:9px 18px; border-radius:99px; font-size:13px; font-weight:600; white-space:nowrap;
  pointer-events:none; z-index:5; animation:hintfade 3s forwards;
  box-shadow:0 8px 22px rgba(2,6,23,.6), inset 0 1px 0 rgba(255,255,255,.12);
}
@keyframes hintfade{0%,70%{opacity:1}100%{opacity:0}}
/* ---- スキル進捗ゲージ(サバイブヒーロー/セルサバイバー) ---- */
.pw-gauge{
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  width:min(88%, 330px); z-index:5; pointer-events:none;
}
.pw-bar{
  position:relative; height:18px;
  background:rgba(11,19,36,.85); border:1px solid var(--line);
  border-radius:99px; overflow:hidden;
  box-shadow:0 2px 8px rgba(2,6,23,.5);
}
.pw-fill{
  height:100%; width:0%; border-radius:99px;
  transition:width .18s ease-out;
}
.pw-txt{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:11.5px; font-weight:800; letter-spacing:.03em;
  text-shadow:0 1px 3px rgba(0,0,0,.9);
}
.pw-skills{
  text-align:center; font-size:14px; margin-top:3px; min-height:18px;
  text-shadow:0 1px 3px rgba(0,0,0,.8); letter-spacing:2px;
}
.game-hud{
  flex:0 0 auto; display:flex; align-items:center; justify-content:center; gap:7px;
  padding:9px 12px; font-size:13px; color:var(--sub); min-height:42px; flex-wrap:wrap;
}
.game-hud>span{
  background:linear-gradient(160deg, rgba(36,52,88,.8), rgba(11,17,33,.8));
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  border:1px solid rgba(148,180,255,.15);
  padding:6px 13px; border-radius:99px; display:inline-flex; align-items:center; gap:5px;
  box-shadow:0 3px 10px rgba(2,6,23,.5), inset 0 1px 0 rgba(255,255,255,.1);
}
.game-hud b{color:var(--text); font-weight:800; letter-spacing:.02em;}
.game-hud button{
  background:linear-gradient(160deg, rgba(46,64,106,.9), rgba(14,21,40,.9));
  border:1px solid rgba(148,180,255,.18); color:var(--text);
  border-radius:12px; padding:7px 15px; font-size:13px; font-weight:700; cursor:pointer;
  box-shadow:0 3px 10px rgba(2,6,23,.5), inset 0 1px 0 rgba(255,255,255,.12);
}
.game-hud button:active{transform:scale(.94);}
/* ---- リザルトオーバーレイ ---- */
#overlay{
  position:fixed; inset:0; background:rgba(2,6,23,.66);
  backdrop-filter:blur(9px) saturate(.7); -webkit-backdrop-filter:blur(9px) saturate(.7);
  display:none; align-items:center; justify-content:center; z-index:50; padding:24px;
}
#overlay.show{display:flex;}
.result-box{
  position:relative; overflow:hidden;
  background:linear-gradient(168deg, rgba(38,54,92,.95), rgba(10,16,32,.97));
  border:1px solid rgba(148,180,255,.18); border-radius:26px;
  padding:30px 24px 26px; width:100%; max-width:322px; text-align:center;
  animation:pop .26s cubic-bezier(.2,.9,.3,1.35);
  box-shadow:0 26px 60px rgba(2,6,23,.75), inset 0 1px 0 rgba(255,255,255,.12);
}
/* 上端の発光アーチ */
.result-box::before{
  content:''; position:absolute; left:50%; top:-58%; width:150%; height:100%;
  transform:translateX(-50%); pointer-events:none;
  background:radial-gradient(closest-side, rgba(125,211,252,.5), transparent 70%);
  opacity:.35;
}
@keyframes pop{from{transform:scale(.82) translateY(14px);opacity:0}to{transform:none;opacity:1}}
.result-box .emo{
  position:relative; font-size:58px; line-height:1;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.55));
  animation:emopop .5s cubic-bezier(.2,.9,.3,1.5) both;
}
@keyframes emopop{0%{transform:scale(.3) rotate(-14deg)}70%{transform:scale(1.14) rotate(3deg)}100%{transform:none}}
.result-box .ttl{
  position:relative; font-size:21px; font-weight:900; margin-top:12px; letter-spacing:.03em;
  text-shadow:0 0 20px rgba(125,211,252,.35);
}
.result-box .msg{position:relative; font-size:13px; color:var(--sub); margin-top:9px; line-height:1.65; min-height:1em;}
.result-box .btns{position:relative; display:flex; flex-direction:column; gap:10px; margin-top:22px;}
.rbtn{
  border:none; border-radius:15px; padding:14px; font-size:15px; font-weight:900;
  cursor:pointer; color:#06121f; letter-spacing:.03em;
  background:linear-gradient(165deg,#a5e8ff,#38bdf8 55%,#0284c7);
  box-shadow:0 8px 20px rgba(56,189,248,.35), 0 0 22px -8px #38bdf8,
             inset 0 2px 3px rgba(255,255,255,.6), inset 0 -4px 10px rgba(0,0,0,.2);
  transition:transform .1s;
}
.rbtn.sec{
  background:linear-gradient(160deg, rgba(46,64,106,.9), rgba(14,21,40,.9));
  color:var(--text); border:1px solid rgba(148,180,255,.18);
  box-shadow:0 5px 14px rgba(2,6,23,.5), inset 0 1px 0 rgba(255,255,255,.12);
}
/* 三番手(クリア後のリトライ等)。押し間違えないよう小さく・控えめに離して置く */
.rbtn.ghost{
  background:none; border:none; box-shadow:none;
  color:var(--sub); font-size:12.5px; font-weight:600; padding:6px;
  text-decoration:underline; text-underline-offset:3px;
  margin-top:2px;
}
.rbtn:active{transform:scale(.955);}
/* 誤タップ防止: オーバーレイが出た直後はボタンを効かせない
   (ゲーム中の連打がそのままリトライを押してしまうため) */
#overlay.guard .btns{pointer-events:none;}
#overlay.guard .btns .rbtn{opacity:.45; filter:saturate(.4);}
#overlay .btns .rbtn{transition:opacity .25s, filter .25s;}
/* ============================================================
   ゲーム2: 水ソート
   ============================================================ */
.ws-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px; overflow:hidden;}
.ws-tubes{display:flex; flex-wrap:wrap; justify-content:center; gap:14px 12px; max-width:400px;}
.tube{
  width:50px; height:168px; border:3px solid #64748b; border-top:none;
  border-radius:0 0 22px 22px; background:rgba(148,163,184,.08);
  display:flex; flex-direction:column-reverse; overflow:hidden;
  cursor:pointer; transition:transform .15s;
  padding:2px;
}
.tube.sel{transform:translateY(-14px); border-color:var(--gold);}
.tube .seg{width:100%; flex:0 0 25%; border-radius:3px;}
.tube .seg.top-pop{animation:segin .18s ease-out;}
@keyframes segin{from{transform:translateY(-16px);opacity:.4}to{transform:none;opacity:1}}
/* ============================================================
   ゲーム4: マージ
   ============================================================ */
.mg-wrap{flex:1; display:flex; align-items:center; justify-content:center; padding:12px;}
.mg-board{
  position:relative; background:#0b1324; border:1px solid var(--line);
  border-radius:16px; touch-action:none;
}
.mg-cell{position:absolute; background:rgba(148,163,184,.09); border-radius:10px;}
.mg-tile{
  position:absolute; border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-weight:800; color:#0f172a; transition:transform .14s ease-out;
  box-shadow:0 3px 0 rgba(0,0,0,.3);
}
.mg-tile.pop{animation:tilepop .18s ease-out;}
@keyframes tilepop{0%{scale:.5}70%{scale:1.12}100%{scale:1}}
.mg-tile.drag{transition:none; z-index:3;}
.mg-pop-txt{
  position:absolute; font-weight:800; color:#fff; pointer-events:none; z-index:5;
  text-shadow:0 2px 6px rgba(0,0,0,.6); animation:floatup .8s ease-out forwards;
}
@keyframes floatup{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-46px)}}
.mg-spark{
  position:absolute; width:6px; height:6px; border-radius:2px; pointer-events:none; z-index:4;
  animation:sparkfly .5s ease-out forwards;
}
@keyframes sparkfly{from{opacity:1;transform:translate(0,0)}to{opacity:0;transform:translate(var(--dx),var(--dy))}}
/* ---- 紙吹雪(勝利演出) ---- */
#confetti{position:fixed; inset:0; pointer-events:none; z-index:60; overflow:hidden;}
#confetti span{
  position:absolute; top:-14px; width:9px; height:14px; border-radius:2px;
  animation:confall linear forwards;
}
@keyframes confall{
  from{transform:translate(0,0) rotate(0)}
  to{transform:translate(var(--dx),105vh) rotate(var(--rot))}
}
/* ---- 水ソート演出 ---- */
.tube{position:relative; background:linear-gradient(105deg,rgba(148,163,184,.16) 0%,rgba(148,163,184,.05) 45%,rgba(255,255,255,.10) 50%,rgba(148,163,184,.05) 55%);}
.tube::after{
  content:''; position:absolute; top:4px; left:6px; width:5px; height:70%;
  background:linear-gradient(rgba(255,255,255,.35),rgba(255,255,255,0));
  border-radius:99px; pointer-events:none;
}
.tube.pouring{z-index:6;}
.ws-stream{
  position:absolute; width:7px; border-radius:3px; pointer-events:none; z-index:7;
  animation:streamin .32s ease-in forwards; transform-origin:top center;
}
@keyframes streamin{0%{height:0;opacity:.4}30%{opacity:1}100%{height:var(--h);opacity:.9}}
.ws-done{position:absolute; font-size:18px; pointer-events:none; z-index:8; animation:floatup .9s ease-out forwards;}
/* ---- ふぶきサバイバル: 建設パネル ---- */
.sn-build{
  position:absolute; left:50%; bottom:14px; transform:translate(-50%, 20px);
  z-index:6; width:min(92%, 320px);
  display:none; align-items:center; gap:11px;
  padding:10px 11px;
  background:linear-gradient(165deg, rgba(38,54,92,.94), rgba(9,14,28,.96));
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(148,180,255,.22); border-radius:18px;
  box-shadow:0 14px 34px rgba(2,6,23,.7), inset 0 1px 0 rgba(255,255,255,.12);
  opacity:0; transition:opacity .18s, transform .18s cubic-bezier(.2,.9,.3,1.3);
}
.sn-build.show{display:flex; opacity:1; transform:translate(-50%, 0);}
.sn-build .bico{
  width:46px; height:46px; flex:0 0 auto; border-radius:14px; font-size:24px;
  display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(125% 100% at 30% 10%, rgba(255,255,255,.45), transparent 56%),
    linear-gradient(158deg, #7dd3fc, rgba(9,14,28,.9) 94%);
  box-shadow:inset 0 2px 3px rgba(255,255,255,.5), inset 0 -5px 10px rgba(0,0,0,.35),
             0 4px 12px rgba(2,6,23,.5);
  text-shadow:0 2px 4px rgba(0,0,0,.45);
}
.sn-build .bmain{flex:1; min-width:0;}
.sn-build .bnm{font-size:14px; font-weight:800; letter-spacing:.02em;}
.sn-build .bds{font-size:10.5px; color:var(--sub); margin-top:2px; line-height:1.4;}
.sn-build .bcost{margin-top:4px; font-size:12px; font-weight:800; display:flex; gap:9px;}
.sn-build .bcost .ok{color:#86efac;}
.sn-build .bcost .ng{color:#fca5a5;}
.sn-build .bbtn{
  flex:0 0 auto; border:none; border-radius:13px; padding:11px 15px;

  box-shadow:0 6px 16px rgba(56,189,248,.35), inset 0 2px 3px rgba(255,255,255,.6);
}

<body>
<div id="app">
  <header id="hdr">
    <button class="hbtn" id="btn-back" style="visibility:hidden">←</button>
    <div id="hdr-title">ミニゲームBOX</div>
    <button class="hbtn" id="btn-mute">🔊</button>
  </header>

  <!-- メニュー -->
  <section class="screen active" id="scr-menu">
    <div class="logo">
      <div class="big">🎮 ミニゲームBOX</div>
      <div class="small">8 games × 3 stages</div>
      <div class="rule"></div>
    </div>
    <div class="cards" id="menu-cards"></div>
    <div class="menu-foot"><button id="btn-reset">進行度をリセット</button></div>
  </section>

  <!-- ステージ選択 -->
  <section class="screen" id="scr-stages">
    <div class="sg-head"><div class="ico" id="sg-ico"></div><div class="nm" id="sg-nm"></div><div class="ds" id="sg-ds"></div></div>
    <div class="stage-list" id="stage-list"></div>
  </section>

  <!-- ゲーム -->
  <section class="screen" id="scr-game">
    <div id="game-host"></div>
  </section>
</div>

<!-- リザルト -->
<div id="overlay">
  <div class="result-box">
    <div class="emo" id="rs-emo"></div>
    <div class="ttl" id="rs-ttl"></div>
    <div class="msg" id="rs-msg"></div>
    <div class="btns" id="rs-btns"></div>
  </div>
</div>

<script>
'use strict';
/* ============================================================
   ユーティリティ / セーフガード
   ============================================================ */
const $ = s => document.querySelector(s);
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const rnd = (a,b) => a + Math.random()*(b-a);
const ri = (a,b) => Math.floor(rnd(a, b+1));
if (!CanvasRenderingContext2D.prototype.roundRect) {   // iOS15以前向け
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(r, w/2, h/2);
    this.moveTo(x+r, y);
    this.arcTo(x+w, y,   x+w, y+h, r);
    this.arcTo(x+w, y+h, x,   y+h, r);
    this.arcTo(x,   y+h, x,   y,   r);
    this.arcTo(x,   y,   x+w, y,   r);
    this.closePath();
    return this;
  };
}
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('gesturestart', e => e.preventDefault());
let lastTouch = 0;
document.addEventListener('touchend', e => {           // ダブルタップ拡大抑止
  const now = Date.now();
  if (now - lastTouch < 350) e.preventDefault();
  lastTouch = now;
}, {passive:false});

/* ============================================================
   進行保存
   ============================================================ */
const Store = {
  KEY:'mgbox_progress_v1',
  data:{run:0, water:0, pin:0, merge:0, zombie:0, snow:0, dada:0, cell:0},   // クリア済みステージ数 0..3
  load(){ try{ Object.assign(this.data, JSON.parse(localStorage.getItem(this.KEY)||'{}')); }catch(e){} },
  save(){ try{ localStorage.setItem(this.KEY, JSON.stringify(this.data)); }catch(e){} },
  cleared(g, stage){ if (stage+1 > this.data[g]) { this.data[g] = stage+1; this.save(); } },
  unlocked(g, stage){ return stage <= this.data[g]; },
  reset(){ this.data = {run:0, water:0, pin:0, merge:0, zombie:0, snow:0, dada:0, cell:0}; this.save(); }
};
Store.load();

/* ============================================================
   サウンド(Web Audio 合成)
   ============================================================ */
const Sound = {
  ctx:null,
  muted: localStorage.getItem('mgbox_mute') === '1',
  ensure(){
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) this.ctx = new AC();
    }
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  tone(freq, dur, type='sine', vol=0.18, slideTo=null, delay=0){
    if (this.muted || !this.ctx) return;
    const t0 = this.ctx.currentTime + delay;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t0);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0+dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t0); o.stop(t0+dur+0.02);
  },
  play(name){
    if (this.muted) return;
    this.ensure();
    if (!this.ctx) return;
    switch(name){
      case 'tap':    this.tone(600,0.06,'square',0.10); break;
      case 'jump':   this.tone(350,0.14,'sine',0.20,700); break;
      case 'pour':   this.tone(420,0.08,'sine',0.15,300); this.tone(340,0.08,'sine',0.13,260,null,0.08); break;
      case 'pull':   this.tone(260,0.07,'square',0.14,180); break;
      case 'collect':this.tone(900,0.09,'sine',0.18,1200); break;
      case 'merge':  this.tone(500,0.09,'triangle',0.20,650); break;
      case 'win':    [523.25,659.25,783.99,1046.5].forEach((f,i)=>this.tone(f,0.14,'triangle',0.18,null,i*0.09)); break;
      case 'fail':   this.tone(240,0.28,'sawtooth',0.14,110); break;
      case 'burn':   this.tone(160,0.3,'sawtooth',0.16,60); break;
      case 'shoot':  this.tone(880,0.03,'square',0.05,600); break;
      case 'hit':    this.tone(200,0.06,'square',0.10,120); break;
      case 'gate':   this.tone(700,0.10,'triangle',0.18,1000); break;
      case 'coin':   this.tone(1150,0.07,'sine',0.15,1500); break;
      case 'chop':   this.tone(300,0.06,'square',0.14,180); break;
      case 'slash':  this.tone(500,0.09,'sawtooth',0.12,180); break;
      case 'freeze': this.tone(500,0.4,'sine',0.12,180); break;
      case 'event':  this.tone(600,0.12,'triangle',0.15,800); break;
    }
  }
};
document.addEventListener('pointerdown', () => Sound.ensure(), {once:false});

/* ============================================================
   ゲームメタ情報
   ============================================================ */
const META = {
  run:    {ico:'🏃', nm:'ダッシュラン',     ds:'タップでジャンプ！コインを集めてゴールへ', color:'#38bdf8'},
  water:  {ico:'🧪', nm:'みずいろソート',   ds:'水をそそぎ分けて同じ色にそろえよう',       color:'#22d3ee'},
  pin:    {ico:'📌', nm:'ピンをぬけ！',     ds:'正しい順番でピンを抜いてお宝をツボへ',     color:'#fbbf24'},
  merge:  {ico:'🔢', nm:'かずあわせ',       ds:'同じ数字をドラッグ合体で大きくしよう',     color:'#a78bfa'},
  zombie: {ico:'🧟', nm:'ゾンビロード',     ds:'ゲートで兵士を増やして大群を撃て！',       color:'#4ade80'},
  dada:   {ico:'🥷', nm:'サバイブヒーロー', ds:'動いて避けて自動攻撃！大群から生きのびろ', color:'#f472b6'},
  cell:   {ico:'🦠', nm:'セルサバイバー',   ds:'回転して迫るウイルスをビームで焼きはらえ', color:'#34d399'},
  snow:   {ico:'❄️', nm:'ふぶきサバイバル', ds:'雪原で資源を集め、たき火のまわりに集落を築け', color:'#7dd3fc'},
};
const GAME_ORDER = ['run','water','pin','merge','zombie','dada','cell','snow'];

/* ============================================================
   演出ヘルパ(パーティクル・フロート文字・紙吹雪)
   ============================================================ */
function makeParticles(){
  const ps = [];
  return {
    burst(x, y, {n=12, color='#fbbf24', speed=180, life=0.6, size=4, grav=380, up=0}={}){
      for (let i=0;i<n;i++){
        const a = rnd(0, Math.PI*2), v = rnd(speed*0.35, speed);
        ps.push({x, y, vx:Math.cos(a)*v, vy:Math.sin(a)*v - up, life:rnd(life*0.5, life), t:0,
                 color:Array.isArray(color)?color[ri(0,color.length-1)]:color, size:rnd(size*0.6, size*1.5), grav});
      }
    },
    update(dt){
      for (let i=ps.length-1;i>=0;i--){
        const p = ps[i]; p.t += dt;
        if (p.t > p.life) { ps.splice(i,1); continue; }
        p.vy += p.grav*dt; p.x += p.vx*dt; p.y += p.vy*dt;
      }
    },
    draw(ctx){
      ps.forEach(p => {
        ctx.globalAlpha = 1 - p.t/p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
      });
      ctx.globalAlpha = 1;
    }
  };
}
function makeFloats(){
  const fs = [];
  return {
    add(x, y, txt, color='#fff', size=16){ fs.push({x, y, txt, color, size, t:0}); },
    update(dt){ for (let i=fs.length-1;i>=0;i--){ fs[i].t += dt; if (fs[i].t > 0.9) fs.splice(i,1); } },
    draw(ctx){
      fs.forEach(f => {
        ctx.globalAlpha = 1 - f.t/0.9;
        ctx.fillStyle = f.color;
        ctx.font = '800 ' + f.size + 'px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(f.txt, f.x, f.y - f.t*50);
      });
      ctx.globalAlpha = 1;
    }
  };
}
function makeShake(){
  let t = 0, mag = 0;
  return {
    hit(m=6, d=0.3){ mag = m; t = d; },
    update(dt){ if (t > 0) t -= dt; },
    apply(ctx){ if (t > 0) ctx.translate(rnd(-mag, mag), rnd(-mag, mag)); }
  };
}
function makeSkillGauge(host, icon, c1, c2){
  // 「あと何個で次のスキルか」を常時表示する大型ゲージ+獲得スキル一覧
  const el = document.createElement('div');
  el.className = 'pw-gauge';
  el.innerHTML = `<div class="pw-bar"><div class="pw-fill" style="background:linear-gradient(90deg,${c1},${c2})"></div>
    <div class="pw-txt"></div></div><div class="pw-skills"></div>`;
  host.appendChild(el);
  const fill = el.querySelector('.pw-fill'), txt = el.querySelector('.pw-txt'), sk = el.querySelector('.pw-skills');
  let lc = -1, ln = -1;
  return {
    set(cur, need){
      if (cur === lc && need === ln) return;
      lc = cur; ln = need;
      fill.style.width = clamp(cur/need*100, 0, 100) + '%';
      txt.textContent = `${icon} ${cur} / ${need}  つぎのスキルまで`;
    },
    addSkill(emoji){
      sk.textContent += emoji;
      if (sk.textContent.length > 20) sk.textContent = '…' + sk.textContent.slice(-18);
    }
  };
}
/* ============================================================
   立体シェーディング描画キット(擬似3D)
   光源は左上に固定。すべての立体は「ハイライト→ベース→陰影」の
   3トーンで塗り、接地影とリムライトで地面から浮かせる。
   ============================================================ */
const LX = -0.45, LY = -0.55;                 // 光源方向(左上)

function shade(hex, f){                        // f>0=明るく / f<0=暗く
  const n = parseInt(hex.slice(1), 16);
  let r = (n>>16)&255, g = (n>>8)&255, b = n&255;
  if (f >= 0) { r += (255-r)*f; g += (255-g)*f; b += (255-b)*f; }
  else        { r *= 1+f; g *= 1+f; b *= 1+f; }
  return `rgb(${r|0},${g|0},${b|0})`;
}
function rgba(hex, a){
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
/* 立体の面用グラデーション(パスを引いてから fillStyle に使う) */
function shadeFill(ctx, cx, cy, r, base, hi=0.45, lo=-0.45){
  const g = ctx.createLinearGradient(cx + LX*r, cy + LY*r, cx - LX*r, cy - LY*r);
  g.addColorStop(0,   shade(base, hi));
  g.addColorStop(0.5, base);
  g.addColorStop(1,   shade(base, lo));
  return g;
}
/* 球(オフセットしたラジアルグラデで球面に見せる) */
function orb(ctx, x, y, r, base, hi=0.6, lo=-0.5){
  const g = ctx.createRadialGradient(x + LX*r*0.7, y + LY*r*0.7, r*0.05, x, y, r*1.08);
  g.addColorStop(0,    shade(base, hi));
  g.addColorStop(0.45, base);
  g.addColorStop(1,    shade(base, lo));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
}
/* カプセル(手足・丸太など) */
function capsule(ctx, x1, y1, x2, y2, r, base){
  ctx.strokeStyle = shadeFill(ctx, (x1+x2)/2, (y1+y2)/2, r*1.8, base, 0.35, -0.42);
  ctx.lineWidth = r*2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}
/* 接地影(ソフトな楕円) */
function castShadow(ctx, x, y, rx, ry, a=0.35){
  ctx.save();
  ctx.translate(x, y); ctx.scale(1, ry/rx);
  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, rx);
  g.addColorStop(0,    `rgba(2,6,23,${a})`);
  g.addColorStop(0.55, `rgba(2,6,23,${(a*0.5).toFixed(3)})`);
  g.addColorStop(1,    'rgba(2,6,23,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, rx, 0, 7); ctx.fill();
  ctx.restore();
}
/* 鏡面ハイライト */
function spec(ctx, x, y, rx, ry, a=0.5, rot=0){
  const g = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rx, ry));
  g.addColorStop(0, `rgba(255,255,255,${a})`);
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(x, y, rx, ry, rot, 0, 7); ctx.fill();
}
/* 発光(光源・グロー) */
function glow(ctx, x, y, r, hex, a=0.5){
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0,   rgba(hex, a));
  g.addColorStop(0.45, rgba(hex, a*0.35));
  g.addColorStop(1,   rgba(hex, 0));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
}
/* ガラスパネル(Canvas内HUD用) */
function panel(ctx, x, y, w, h, r=12){
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r);
  const g = ctx.createLinearGradient(x, y, x, y+h);
  g.addColorStop(0, 'rgba(38,54,92,.78)');
  g.addColorStop(1, 'rgba(9,14,28,.82)');
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = 'rgba(148,180,255,.2)'; ctx.lineWidth = 1; ctx.stroke();
}
/* ステータスバー(HUD用・内側に光沢) */
function statBar(ctx, x, y, w, h, v, c1, c2){
  ctx.beginPath(); ctx.roundRect(x, y, w, h, h/2);
  ctx.fillStyle = 'rgba(3,7,18,.75)'; ctx.fill();
  const fw = clamp(v, 0, 1) * w;
  if (fw > 1.5) {
    ctx.save();
    ctx.beginPath(); ctx.roundRect(x, y, fw, h, h/2); ctx.clip();
    const g = ctx.createLinearGradient(x, y, x + w, y);
    g.addColorStop(0, c1); g.addColorStop(1, c2);
    ctx.fillStyle = g; ctx.fillRect(x, y, fw, h);
    ctx.fillStyle = 'rgba(255,255,255,.28)';
    ctx.fillRect(x, y, fw, h*0.42);
    ctx.restore();
  }
}

function confettiBurst(){
  const old = $('#confetti'); if (old) old.remove();
  const c = document.createElement('div'); c.id = 'confetti';
  const cols = ['#38bdf8','#fbbf24','#4ade80','#f87171','#a855f7','#f97316'];
  for (let i=0;i<44;i++){
    const s = document.createElement('span');
    s.style.left = rnd(0,100) + 'vw';
    s.style.background = cols[ri(0,cols.length-1)];
    s.style.setProperty('--dx', rnd(-80,80) + 'px');
    s.style.setProperty('--rot', ri(360,1080) + 'deg');
    s.style.animationDuration = rnd(1.4,2.6) + 's';
    s.style.animationDelay = rnd(0,0.5) + 's';
    c.appendChild(s);
  }
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 3400);
}

/* ============================================================
   アプリ(画面遷移・リザルト)
   ============================================================ */
const App = {
  cur:{g:null, stage:0},
  inst:null,
  guardT:0,                       // リザルトの誤タップ防止タイマー
  show(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === 'scr-'+id));
    $('#btn-back').style.visibility = (id === 'menu') ? 'hidden' : 'visible';
  },
  openMenu(){
    this.killGame();
    $('#hdr-title').textContent = 'ミニゲームBOX';
    const wrap = $('#menu-cards'); wrap.innerHTML = '';
    GAME_ORDER.forEach(g => {
      const m = META[g], n = Store.data[g];
      const c = document.createElement('div'); c.className = 'card';
      c.style.setProperty('--acc', m.color);
      c.innerHTML = `<div class="ico">${m.ico}</div><div class="nm">${m.nm}</div>
        <div class="ds">${m.ds}</div><div class="st">${'⭐'.repeat(n)}${'☆'.repeat(3-n)}</div>`;
      c.addEventListener('click', () => { Sound.play('tap'); this.openStages(g); });
      wrap.appendChild(c);
    });
    this.show('menu');
  },
  openStages(g){
    this.killGame();
    this.cur.g = g;
    const m = META[g];
    $('#hdr-title').textContent = m.nm;
    document.querySelector('.sg-head').style.setProperty('--acc', m.color);
    $('#sg-ico').textContent = m.ico;
    $('#sg-nm').textContent = m.nm;
    $('#sg-ds').textContent = m.ds;
    const list = $('#stage-list'); list.innerHTML = '';
    for (let i=0;i<3;i++){
      const ok = Store.unlocked(g,i), done = Store.data[g] > i;
      const b = document.createElement('button');
      b.className = 'stage-btn' + (ok ? '' : ' locked');
      b.style.setProperty('--acc', m.color);
      b.innerHTML = `<span class="no">${i+1}</span><span class="lbl">ステージ ${i+1}</span>
        <span class="mark">${done ? '⭐' : (ok ? '▶' : '🔒')}</span>`;
      b.addEventListener('click', () => {
        if (!ok) { Sound.play('fail'); return; }
        Sound.play('tap'); this.startGame(g, i);
      });
      list.appendChild(b);
    }
    this.show('stages');
  },
  startGame(g, stage){
    this.killGame();
    this.cur = {g, stage};
    $('#hdr-title').textContent = `${META[g].nm}  ステージ${stage+1}`;
    const host = $('#game-host'); host.innerHTML = '';
    host.style.background = `radial-gradient(480px 380px at 50% 32%, ${META[g].color}18, transparent)`;
    this.show('game');
    const api = {
      end: res => this.onEnd(res),
      sound: n => Sound.play(n),
      hint: text => {
        const h = document.createElement('div'); h.className = 'hint-bar'; h.textContent = text;
        host.appendChild(h); setTimeout(()=>h.remove(), 3100);
      }
    };
    this.inst = GAMES[g].create(host, stage, api);
  },
  onEnd(res){
    const {g, stage} = this.cur;
    if (res.win) { Store.cleared(g, stage); Sound.play('win'); confettiBurst(); } else Sound.play('fail');
    const last = stage === 2;
    $('#rs-emo').textContent = res.win ? (last ? '🏆' : '🎉') : '💦';
    $('#rs-ttl').textContent = res.win ? (last ? '全ステージクリア！' : `ステージ${stage+1} クリア！`) : 'しっぱい…';
    $('#rs-msg').textContent = res.msg || '';
    const btns = $('#rs-btns'); btns.innerHTML = '';
    const mk = (label, cls, fn) => {
      const b = document.createElement('button'); b.className = 'rbtn'+(cls?' '+cls:'');
      b.textContent = label;
      b.addEventListener('click', () => { Sound.play('tap'); $('#overlay').classList.remove('show'); fn(); });
      btns.appendChild(b);
    };
    // クリア時のリトライは「三番手」に降格し、進む/戻るから離して置く(誤タップ対策)
    if (res.win) {
      if (!last) mk('次のステージへ ▶', '', () => this.startGame(g, stage+1));
      mk('メニューに戻る', last ? '' : 'sec', () => this.openMenu());
      mk('このステージをもう一度', 'ghost', () => this.startGame(g, stage));
    } else {
      mk('リトライ', '', () => this.startGame(g, stage));
      mk('メニューに戻る', 'sec', () => this.openMenu());
    }
    // ゲーム中のタップがそのままボタンに入らないよう、出た直後は受け付けない
    const ov = $('#overlay');
    ov.classList.add('show', 'guard');
    clearTimeout(this.guardT);
    this.guardT = setTimeout(() => ov.classList.remove('guard'), 650);
  },
  killGame(){
    if (this.inst) { try{ this.inst.destroy(); }catch(e){} this.inst = null; }
    clearTimeout(this.guardT);
    $('#overlay').classList.remove('show', 'guard');
    $('#game-host').innerHTML = '';
  }
};

  else App.openMenu();

/* ============================================================
   Canvasゲーム共通ヘルパ
   ============================================================ */
function makeCanvas(host, logicalW, logicalH){
  // logicalW/H を保ったままホストにレターボックスでフィット
  const cv = document.createElement('canvas');
  cv.style.margin = 'auto';
  host.appendChild(cv);
  const ctx = cv.getContext('2d');
  function resize(){
    const hw = host.clientWidth, hh = host.clientHeight;
    if (!hw || !hh) return;
    const sc = Math.min(hw/logicalW, hh/logicalH);
    cv.style.width  = Math.floor(logicalW*sc) + 'px';
    cv.style.height = Math.floor(logicalH*sc) + 'px';
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    cv.width  = Math.floor(logicalW*sc*dpr);
    cv.height = Math.floor(logicalH*sc*dpr);
    ctx.setTransform(sc*dpr,0,0,sc*dpr,0,0);
  }
  resize();
  const ro = new ResizeObserver(resize); ro.observe(host);
  const toLocal = e => {
    const r = cv.getBoundingClientRect();
    return {x:(e.clientX-r.left)*logicalW/r.width, y:(e.clientY-r.top)*logicalH/r.height};
  };
  return {cv, ctx, toLocal, destroy(){ ro.disconnect(); }};
}

/* ============================================================
   ゲーム1: ダッシュラン(Canvas)
   タップでジャンプ。ゴール距離まで走ればクリア。
   ============================================================ */
const RunGame = {
  // メダル100枚を「取れる配置」で敷き詰めるには走行距離が要る(跳躍群の手前は
  // 着地できるぶん空ける必要があるため)。所要時間は3ステージとも約37秒に揃えた
  stages: [
    {v:255, goal:1200, gapF:1.10, kinds:['low','wide'], theme:0, pats:['line','arch','arch']},
    {v:305, goal:1400, gapF:1.00, kinds:['low','wide','tall'], theme:1, pats:['line','arch','high','arch']},
    {v:350, goal:1600, gapF:0.90, kinds:['low','wide','tall','double'], theme:2, pats:['arch','high','line','high']},
  ],
  themes: [
    {sky:['#1d4ed8','#7dd3fc'], far:'#1e3a8a', near:'#172554', orb:'#fde047', orbY:80, stars:false},
    {sky:['#4c1d95','#f97316'], far:'#3b0764', near:'#2e1065', orb:'#fb923c', orbY:150, stars:false},
    {sky:['#020617','#1e3356'], far:'#16213a', near:'#0d1526', orb:'#e2e8f0', orbY:70, stars:true},
  ],
  create(host, stage, api){
    const cfg = this.stages[stage];
    const th = this.themes[cfg.theme];
    const W = 360, H = 520;
    const {cv, ctx, destroy:dcv} = makeCanvas(host, W, H);
    const COIN_TOTAL = 100;
    const hud = document.createElement('div');
    hud.className = 'game-hud';
    hud.innerHTML = `<span>🪙 <b id="run-c">0</b> / ${COIN_TOTAL}</span><span>きょり <b id="run-d">0</b> / ${cfg.goal} m</span>
      <span style="flex:0 0 90px;height:8px;background:#0b1324;border-radius:99px;overflow:hidden">
        <span id="run-bar" style="display:block;height:100%;width:0%;background:var(--accent)"></span></span>`;
    host.appendChild(hud);
    api.hint(stage === 0 ? 'タップでジャンプ！メダル100枚 ぜんぶ集めろ'
                         : '高いメダルは2段ジャンプ(空中でもう1回タップ)でしか届かない！');

    const GY = H - 90;
    const G = 1750, JV = -620, JV2 = JV * 0.92;
    const player = {x:70, y:GY, w:30, h:38, vy:0, jumps:0, spin:0, dead:false};
    let dist = 0;
    const goalPx = cfg.goal * 8;
    let coinCnt = 0, coinPop = 0, perfect = false, perfectT = 0;
    let over = false, raf = 0, tPrev = 0, runT = 0;
    const parts = makeParticles(), shake = makeShake();
    const stars = [];
    if (th.stars) for (let i=0;i<40;i++) stars.push([rnd(0,W), rnd(0,GY-120), rnd(0.6,1.8)]);
    // 山シルエット(2層・繰り返しパターン)
    const mkRidge = (n, hMin, hMax) => Array.from({length:n}, () => rnd(hMin, hMax));
    const farR = mkRidge(6, 60, 130), nearR = mkRidge(5, 30, 80);

    /* ---- ジャンプの弾道(メダルの高さはこの軌道そのものに乗せる) ----
       1段ジャンプの到達高 H1、2段ジャンプの到達高 H2。
       'arch' は1段ジャンプ、'high' は2段ジャンプの軌道をなぞる
       → 「跳べば必ず届く / 2段でなければ絶対に届かない」が成立する */
    const H1 = JV*JV / (2*G),  T1 = -JV / G;                 // ≈110px / 0.354s
    const H2 = H1 + JV2*JV2 / (2*G),  T2 = -JV2 / G;         // ≈203px / 0.326s
    const TF1 = Math.sqrt(2*H1/G), TF2 = Math.sqrt(2*H2/G);  // 落下時間
    const AIR1 = T1 + TF1, AIR2 = T1 + T2 + TF2;             // 滞空時間
    const h1At = tt => tt <= T1 ? -JV*tt - G*tt*tt/2 : Math.max(0, H1 - G*(tt-T1)*(tt-T1)/2);
    const h2At = tt => {
      if (tt <= T1) return -JV*tt - G*tt*tt/2;
      if (tt <= T1+T2) { const u = tt - T1; return H1 - JV2*u - G*u*u/2; }
      const u = tt - T1 - T2; return Math.max(0, H2 - G*u*u/2);
    };
    const EYE = 19;                                           // プレイヤー中心の地上高

    /* ---- レベルを事前生成 ----
       ・メダルはステージちょうど100枚
       ・障害物は「メダル群のあいだ」か「2段ジャンプ群の真下(=跳んでいる最中)」にしか置かない
         → どうしても取れない位置のメダルが原理的に生まれない */
    const GRAB = 32;
    const obstacles = [], coins = [];
    const OBS = {
      low:   [{w:22, h:30}],
      wide:  [{w:44, h:22}],
      tall:  [{w:22, h:46}],
      double:[{w:20, h:28},{gap:26, w:20, h:28}],
    };
    const obsW = kind => OBS[kind].reduce((s, d) => s + (d.gap||0) + d.w, 0);
    function putObs(kind, x){
      let off = 0;
      OBS[kind].forEach(d => {
        off += d.gap || 0;
        obstacles.push({wx: x + off, w:d.w, h:d.h, type:kind});
        off += d.w;
      });
    }
    // 群の横幅と枚数(跳躍群は滞空距離いっぱいに、間隔が約30pxになる枚数)
    const SPAN = {line: 210, arch: cfg.v*AIR1*0.92, high: cfg.v*AIR2*0.92};
    const SIZE = {
      line: 8,
      arch: clamp(Math.round(SPAN.arch/30) + 1, 5, 12),
      high: clamp(Math.round(SPAN.high/32) + 1, 6, 14),
    };
    // 障害物のクリアランス。群の「手前」は、直前の障害物を跳び越しても
    // 群に入る前に着地できる距離を必ず空ける(でないと100枚が原理的に不可能になる)
    const CL_PRE  = cfg.v * AIR1 * 0.9 + 30;
    const CL_POST = 70;

    (function buildLevel(){
      const A = 640, B = goalPx - 320, L = B - A;
      const groups = [];
      let left = COIN_TOTAL, i = 0;
      while (left > 0) {                                      // 合計がちょうど100になるよう端数調整
        // 端数は地上メダルにまとめる。枚数の欠けた跳躍群は軌道が途中で切れて
        // 「2段ジャンプでしか届かない」設計が崩れるため作らない
        const kind = left < 6 ? 'line' : cfg.pats[i++ % cfg.pats.length];
        const n = Math.min(SIZE[kind], left);
        groups.push({kind, n}); left -= n;
      }
      const nG = groups.length, pitch = L / nG;
      groups.forEach((g, gi) => {
        const span = g.kind === 'line' ? (g.n - 1) * 30 : SPAN[g.kind];
        g.x0 = A + pitch*gi + (pitch - span)/2;
        g.x1 = g.x0 + span;
        for (let k=0; k<g.n; k++){
          const u  = g.n > 1 ? k/(g.n-1) : 0.5;
          const wx = g.x0 + span*u;
          let y, hh = 0;
          if (g.kind === 'line') y = GY - 46;                       // 地上(走って取れる)
          else {                                                    // 跳躍の軌道そのものに乗せる
            const tt = (wx - g.x0) / cfg.v;
            hh = g.kind === 'arch' ? h1At(tt) : h2At(tt);
            y = GY - EYE - hh;
          }
          // hi = 1段ジャンプの到達範囲より上 = 2段ジャンプでしか届かないメダル
          coins.push({wx, y, got:false, hi: hh > H1 + GRAB});
        }
        // 2段ジャンプ群の真下に障害物(そこでは必ず空中にいるので必ず避けられる)
        if (g.kind === 'high' && g.n >= 8) {
          const kind = cfg.kinds[ri(0, cfg.kinds.length-1)];
          putObs(kind, (g.x0 + g.x1)/2 - obsW(kind)/2);
        }
      });
      // 群のあいだの通路にも障害物
      const corridor = (a, b) => {
        let x = a + rnd(10, 50);
        for (let guard=0; guard<12; guard++){
          const kind = cfg.kinds[ri(0, cfg.kinds.length-1)];
          const w = obsW(kind);
          if (x + w > b) break;
          putObs(kind, x);
          x += w + cfg.v * cfg.gapF * rnd(0.85, 1.7);
        }
      };
      corridor(420, groups[0].x0 - CL_PRE);
      for (let k=0; k<nG-1; k++) corridor(groups[k].x1 + CL_POST, groups[k+1].x0 - CL_PRE);
      corridor(groups[nG-1].x1 + CL_POST, goalPx - 130);
    })();

    function jump(){
      if (over) return;
      if (player.jumps < 2) {
        player.vy = JV * (player.jumps === 1 ? 0.92 : 1);
        if (player.jumps === 1) player.spin = 1;        // 2段目は回転
        player.jumps++;
        api.sound('jump');
        parts.burst(player.x, player.y, {n:5, color:'#94a3b8', speed:80, life:0.35, size:3, grav:200});
      }
    }
    const ac = new AbortController();
    cv.addEventListener('pointerdown', e => { e.preventDefault(); jump(); }, {signal:ac.signal});
    window.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
    }, {signal:ac.signal});

    const sxOf = wx => wx - dist + player.x;      // ワールド座標 → 画面座標

    function update(dt){
      runT += dt;
      dist += cfg.v * dt;
      const wasAir = player.jumps > 0;
      player.vy += G * dt;
      player.y += player.vy * dt;
      if (player.spin > 0) player.spin = Math.max(0, player.spin - dt*2.2);
      if (player.y >= GY) {
        player.y = GY; player.vy = 0; player.jumps = 0; player.spin = 0;
        if (wasAir) parts.burst(player.x, GY, {n:6, color:'#64748b', speed:90, life:0.3, size:3, grav:150});
      }
      // メダル取得
      const py = player.y - player.h/2;
      for (const c of coins){
        if (c.got) continue;
        const cx = sxOf(c.wx);
        if (cx < -40 || cx > W + 40) continue;
        const dx = cx - player.x, dy = c.y - py;
        if (dx*dx + dy*dy < GRAB*GRAB) {
          c.got = true; coinCnt++; coinPop = 0.35;
          api.sound('coin');
          parts.burst(cx, c.y, {n:8, color:'#fde047', speed:130, life:0.4, size:3, grav:250});
          $('#run-c').textContent = coinCnt;
          if (coinCnt === COIN_TOTAL) onPerfect();
        }
      }
      // 当たり判定(少し甘め)
      const m = 6;
      const pl = player.x - player.w/2 + m, pr = player.x + player.w/2 - m, pt = player.y - player.h + m;
      for (const o of obstacles){
        const ox = sxOf(o.wx);
        if (ox > W + 20 || ox + o.w < -20) continue;
        if (pr > ox && pl < ox + o.w && player.y - 2 > GY - o.h + m && pt < GY) {
          player.dead = true;
          shake.hit(7, 0.4);
          parts.burst(player.x, player.y - 18, {n:26, color:['#f87171','#fbbf24','#e2e8f0'], speed:260, life:0.7, size:5, grav:500, up:120});
          finish(false, `きろく: ${Math.floor(dist/8)} m / 🪙${coinCnt} / ${COIN_TOTAL}`);
          return;
        }
      }
      coinPop = Math.max(0, coinPop - dt);
      perfectT = Math.max(0, perfectT - dt);
      if (dist >= goalPx) finish(true, perfect
        ? `🌟 PERFECT！ 🪙${COIN_TOTAL}/${COIN_TOTAL} ・ ${runT.toFixed(1)}秒`
        : `タイム: ${runT.toFixed(1)} 秒 / 🪙${coinCnt} / ${COIN_TOTAL}`);
      $('#run-d').textContent = Math.min(cfg.goal, Math.floor(dist/8));
      $('#run-bar').style.width = clamp(dist/goalPx*100,0,100) + '%';
    }
    /* メダル全取得。ゴールとは別の、その場で出るパーフェクト演出 */
    function onPerfect(){
      perfect = true; perfectT = 2.4;
      api.sound('win');
      shake.hit(6, 0.45);
      parts.burst(player.x, player.y - 20, {n:64, color:['#fde047','#fff7cc','#fbbf24','#7dd3fc'],
                                            speed:340, life:1.0, size:6, grav:420, up:170});
      confettiBurst();
    }
    function ridge(arr, base, speed, color){
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(-10, GY);
      const seg = 90;
      const total = arr.length * seg;
      for (let sx=-10; sx<=W+seg; sx+=8){
        const wx = (sx + dist*speed) % total;
        const i = Math.floor(wx/seg), f = (wx%seg)/seg;
        const h1 = arr[i % arr.length], h2 = arr[(i+1) % arr.length];
        const hh = h1 + (h2-h1) * (0.5 - Math.cos(f*Math.PI)/2);
        ctx.lineTo(sx, base - hh);
      }
      ctx.lineTo(W+10, GY); ctx.closePath(); ctx.fill();
    }
    function draw(){
      ctx.save();
      shake.apply(ctx);
      // 空
      const sky = ctx.createLinearGradient(0,0,0,GY);
      sky.addColorStop(0, th.sky[0]); sky.addColorStop(1, th.sky[1]);
      ctx.fillStyle = sky; ctx.fillRect(-10,-10,W+20,GY+10);
      if (th.stars) { ctx.fillStyle = '#e2e8f0'; stars.forEach(s => ctx.fillRect(s[0], s[1], s[2], s[2])); }
      // 太陽/月
      ctx.fillStyle = th.orb; ctx.beginPath(); ctx.arc(W-70, th.orbY, 26, 0, 7); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,.15)'; ctx.beginPath(); ctx.arc(W-70, th.orbY, 36, 0, 7); ctx.fill();
      // 山(パララックス2層)
      ridge(farR, GY, 0.15, th.far);
      ridge(nearR, GY, 0.35, th.near);
      // 雲
      ctx.fillStyle = 'rgba(226,232,240,.16)';
      for (let i=0;i<4;i++){
        const cx = ((i*150 - dist*0.25) % (W+140) + W+140) % (W+140) - 70;
        ctx.beginPath(); ctx.ellipse(cx, 66+i*30, 38, 13, 0, 0, 7); ctx.fill();
      }
      // 地面
      ctx.fillStyle = '#1e293b'; ctx.fillRect(-10, GY, W+20, H-GY+10);
      ctx.fillStyle = '#38bdf8'; ctx.fillRect(-10, GY, W+20, 3);
      ctx.fillStyle = 'rgba(56,189,248,.25)';
      for (let i=0;i<8;i++){
        const lx = ((i*70 - dist) % (W+70) + W+70) % (W+70) - 35;
        ctx.fillRect(lx, GY+18, 32, 4);
      }
      // ゴール旗
      const gx = goalPx - dist + player.x;
      if (gx < W + 30) { ctx.font = '36px serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.globalAlpha = 1; ctx.fillText('🚩', gx, GY - 6); }
      // メダル
      ctx.font = '20px serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.globalAlpha = 1;
      coins.forEach(c => {
        if (c.got) return;
        const cx = sxOf(c.wx);
        if (cx < -30 || cx > W + 30) return;
        ctx.fillText('🪙', cx, c.y + 7 + Math.sin(runT*5 + c.wx)*2);
      });
      // 障害物
      obstacles.forEach(o => {
        const ox = sxOf(o.wx);
        if (ox > W + 30 || ox + o.w < -30) return;
        if (o.type === 'tall') { ctx.font = (o.h+6)+'px serif'; ctx.textAlign='center'; ctx.fillStyle = '#fff'; ctx.fillText('🌵', ox+o.w/2, GY-2); }
        else {
          ctx.fillStyle = '#ef4444';
          ctx.beginPath(); ctx.roundRect(ox, GY-o.h, o.w, o.h, 5); ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,.25)'; ctx.fillRect(ox, GY-o.h, o.w, 5);
        }
      });
      // プレイヤー(手足が動くベクターランナー・2段ジャンプで回転)
      if (!player.dead) {
        ctx.globalAlpha = 1;
        // 接地影(高く跳ぶほど薄く小さく)
        const airH = clamp((GY - player.y)/130, 0, 1);
        ctx.fillStyle = `rgba(0,0,0,${(0.32 - airH*0.2).toFixed(2)})`;
        ctx.beginPath(); ctx.ellipse(player.x, GY+8, 14 - airH*5, 4, 0, 0, 7); ctx.fill();
        ctx.save();
        ctx.translate(player.x, player.y);
        if (player.spin > 0) ctx.rotate((1-player.spin) * Math.PI * 2);
        const onGround = player.jumps === 0;
        const phase = runT * 15;
        const bob = onGround ? Math.abs(Math.sin(phase)) * 2 : 0;
        ctx.translate(0, -bob);
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        // 2関節の手足を描くヘルパ(角度は真下=0・前方向が正)
        const limb = (x0, y0, a1, l1, a2, l2, color, w) => {
          const x1 = x0 + Math.sin(a1)*l1, y1 = y0 + Math.cos(a1)*l1;
          const x2 = x1 + Math.sin(a2)*l2, y2 = y1 + Math.cos(a2)*l2;
          ctx.strokeStyle = color; ctx.lineWidth = w;
          ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
        };
        const hipX = -1, hipY = -16, shX = 2, shY = -30;
        // 走行フォーム: 手前の腕は手前の脚と逆位相(右脚前=右腕後ろ)。
        // 膝: 後ろ脚はかかとが上がる(スネは太ももより後ろに折れる)。肘: 常に約90度前向き。
        let l1, l2, a1, a2;
        if (onGround) {
          l1 = Math.sin(phase) * 0.85;   // 手前の太もも
          l2 = -l1;                      // 奥の太もも(逆位相)
          a1 = -l1 * 0.8;                // 手前の上腕(脚と逆)
          a2 = l1 * 0.8;                 // 奥の上腕
        } else {
          l1 = 0.95; l2 = -0.35; a1 = -0.7; a2 = 0.5;   // 空中タック姿勢
        }
        // 奥側の腕・脚(暗色)
        limb(shX, shY, a2, 8, a2 + 1.2, 7, '#075985', 4);
        limb(hipX, hipY, l2, 9, l2*1.3 - 0.7, 8, '#075985', 5);
        // 胴体(前傾)
        ctx.strokeStyle = '#0ea5e9'; ctx.lineWidth = 7;
        ctx.beginPath(); ctx.moveTo(hipX, hipY); ctx.lineTo(shX, shY); ctx.stroke();
        // 頭+ヘッドバンド
        ctx.fillStyle = '#fde68a';
        ctx.beginPath(); ctx.arc(shX+3, shY-8, 6.5, 0, 7); ctx.fill();
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(shX-3, shY-13, 12, 3);
        // 手前側の脚・腕(明色)
        limb(hipX, hipY, l1, 9, l1*1.3 - 0.7, 8, '#38bdf8', 5);
        limb(shX, shY, a1, 8, a1 + 1.2, 7, '#7dd3fc', 4);
        ctx.restore();
        if (onGround && Math.random() < 0.3)
          parts.burst(player.x-12, GY, {n:1, color:'#475569', speed:40, life:0.3, size:3, grav:60});
        if (perfect && Math.random() < 0.55)                    // パーフェクト後は金色のオーラ
          parts.burst(player.x - 6, player.y - 18, {n:1, color:['#fde047','#fbbf24'], speed:45, life:0.55, size:3, grav:-60});
      }
      parts.draw(ctx);
      // メダルカウンタ(常時・取得時にポップ)
      const cps = 1 + coinPop * 0.9;
      ctx.save();
      ctx.translate(16, 36);
      ctx.scale(cps, cps);
      ctx.font = '20px serif'; ctx.textAlign = 'left';
      ctx.fillText('🪙', 0, 0);
      const lbl = coinCnt + ' / ' + COIN_TOTAL;
      ctx.font = '800 17px system-ui';
      ctx.fillStyle = 'rgba(0,0,0,.65)';
      ctx.fillText(lbl, 27, 1);
      ctx.fillStyle = perfect ? '#fff7cc' : '#fde047';
      ctx.fillText(lbl, 26, 0);
      ctx.restore();
      // パーフェクト演出(ゴールとは別に、100枚目を取った瞬間に出る)
      if (perfectT > 0) {
        const p  = 1 - perfectT/2.4;
        const sc = 0.5 + Math.sin(Math.min(p*4, 1) * Math.PI/2) * 0.5 + Math.sin(perfectT*11)*0.03;
        ctx.save();
        ctx.globalAlpha = clamp(perfectT/0.7, 0, 1);
        ctx.translate(W/2, 148);
        ctx.scale(sc, sc);
        ctx.rotate(Math.sin(perfectT*7) * 0.035);
        ctx.textAlign = 'center';
        ctx.font = '800 40px system-ui';
        ctx.lineWidth = 8; ctx.strokeStyle = 'rgba(2,6,23,.7)';
        ctx.strokeText('PERFECT!', 0, 0);
        const g = ctx.createLinearGradient(-110, -26, 110, 26);
        g.addColorStop(0, '#fbbf24'); g.addColorStop(0.5, '#fff7cc'); g.addColorStop(1, '#f59e0b');
        ctx.fillStyle = g;
        ctx.fillText('PERFECT!', 0, 0);
        ctx.font = '800 14px system-ui';
        ctx.lineWidth = 5;
        ctx.strokeText(`🪙 ${COIN_TOTAL} / ${COIN_TOTAL} ぜんぶ集めた！`, 0, 26);
        ctx.fillStyle = '#fff';
        ctx.fillText(`🪙 ${COIN_TOTAL} / ${COIN_TOTAL} ぜんぶ集めた！`, 0, 26);
        ctx.restore();
      }
      ctx.restore();
    }
    function finish(win, msg){
      if (over) return; over = true;
      api.sound(win ? 'collect' : 'fail');
      setTimeout(() => api.end({win, msg}), win ? 400 : 700);
    }
    function loop(t){
      raf = requestAnimationFrame(loop);
      const dt = Math.min((t - tPrev)/1000 || 0, 1/30);
      tPrev = t;
      if (!over) update(dt);
      parts.update(dt); shake.update(dt);
      draw();
    }
    raf = requestAnimationFrame(t => { tPrev = t; raf = requestAnimationFrame(loop); });
    return {destroy(){ cancelAnimationFrame(raf); ac.abort(); dcv(); }};
  }
};

/* ============================================================
   ゲーム2: みずいろソート(DOM)
   ============================================================ */
const WaterGame = {
  stages: [ {colors:4, empty:2}, {colors:6, empty:2}, {colors:7, empty:2} ],
  CAP: 4,
  PALETTE: ['#ef4444','#3b82f6','#22c55e','#eab308','#a855f7','#f97316','#06b6d4'],
  /* --- 解けるかチェック(DFS) --- */
  solvable(tubes){
    const CAP = this.CAP, seen = new Set();
    const key = t => t.map(x=>x.join(',')).sort().join('|');
    const solved = t => t.every(tu => tu.length===0 || (tu.length===CAP && tu.every(c=>c===tu[0])));
    const dfs = t => {
      if (solved(t)) return true;
      const k = key(t);
      if (seen.has(k) || seen.size > 15000) return false;
      seen.add(k);
      for (let i=0;i<t.length;i++) for (let j=0;j<t.length;j++){
        if (i===j) continue;
        const from = t[i], to = t[j];
        if (!from.length || to.length >= CAP) continue;
        const c = from[from.length-1];
        if (to.length && to[to.length-1] !== c) continue;
        if (!to.length && from.every(x=>x===c)) continue;   // 無意味な移動
        let run = 0; for (let q=from.length-1; q>=0 && from[q]===c; q--) run++;
        const mv = Math.min(run, CAP - to.length);
        const nt = t.map(a=>a.slice());
        for (let m=0;m<mv;m++) nt[j].push(nt[i].pop());
        if (dfs(nt)) return true;
      }
      return false;
    };
    return dfs(tubes);
  },
  generate(cfg){
    for (let tries=0; tries<60; tries++){
      const pool = [];
      for (let c=0;c<cfg.colors;c++) for (let k=0;k<this.CAP;k++) pool.push(c);
      for (let i=pool.length-1;i>0;i--){ const j=ri(0,i); [pool[i],pool[j]]=[pool[j],pool[i]]; }
      const tubes = [];
      for (let c=0;c<cfg.colors;c++) tubes.push(pool.slice(c*this.CAP, (c+1)*this.CAP));
      // 最初から単色のコップがあればやり直し
      if (tubes.some(tu => tu.every(x=>x===tu[0]))) continue;
      for (let e=0;e<cfg.empty;e++) tubes.push([]);
      if (this.solvable(tubes.map(a=>a.slice()))) return tubes;
    }
    // フォールバック(ほぼ来ない): 1手で崩した状態
    const tubes = [];
    for (let c=0;c<cfg.colors;c++) tubes.push(new Array(this.CAP).fill(c));
    tubes[0].pop(); tubes[1].pop(); tubes[0].push(1); tubes[1].push(0);
    for (let e=0;e<cfg.empty;e++) tubes.push([]);
    return tubes;
  },
  create(host, stage, api){
    const cfg = this.stages[stage];
    const initial = this.generate(cfg);
    let tubes = initial.map(a=>a.slice());
    let sel = -1, moves = 0, over = false, busy = false;
    const undoStack = [], timers = [];
    const CAP = this.CAP, PAL = this.PALETTE;

    const wrap = document.createElement('div'); wrap.className = 'ws-wrap';
    const area = document.createElement('div'); area.className = 'ws-tubes';
    wrap.appendChild(area); host.appendChild(wrap);
    const hud = document.createElement('div'); hud.className = 'game-hud';
    hud.innerHTML = `<span>手数 <b id="ws-mv">0</b></span>`;
    const bUndo = document.createElement('button'); bUndo.textContent = '↩ もどす';
    const bReset = document.createElement('button'); bReset.textContent = '🔄 はじめから';
    hud.appendChild(bUndo); hud.appendChild(bReset);
    host.appendChild(hud);
    api.hint('コップをタップ → そそぐ先をタップ');

    function render(popIdx){
      area.innerHTML = '';
      tubes.forEach((tu, i) => {
        const el = document.createElement('div');
        el.className = 'tube' + (i===sel ? ' sel' : '');
        tu.forEach((c, k) => {
          const s = document.createElement('div');
          s.className = 'seg' + (i===popIdx && k===tu.length-1 ? ' top-pop' : '');
          s.style.background = PAL[c];
          el.appendChild(s);
        });
        el.addEventListener('click', () => tap(i));
        area.appendChild(el);
      });
      $('#ws-mv').textContent = moves;
    }
    function canPour(i, j){
      const from = tubes[i], to = tubes[j];
      if (!from.length || to.length >= CAP) return false;
      return !to.length || to[to.length-1] === from[from.length-1];
    }
    function tap(i){
      if (over || busy) return;
      if (sel === -1) {
        if (tubes[i].length) { sel = i; api.sound('tap'); }
        render(); return;
      }
      if (sel === i) { sel = -1; render(); return; }
      if (canPour(sel, i)) pourAnim(sel, i);
      else {
        sel = tubes[i].length ? i : -1;   // 注げない → 選び直し
        api.sound('tap');
        render();
      }
    }
    // 傾けて注ぐアニメーション → データ反映
    function pourAnim(si, di){
      busy = true;
      const srcEl = area.children[si], dstEl = area.children[di];
      const c = tubes[si][tubes[si].length-1];
      const sR = srcEl.getBoundingClientRect(), dR = dstEl.getBoundingClientRect(), wR = wrap.getBoundingClientRect();
      const leftSide = sR.left <= dR.left;
      srcEl.classList.add('pouring');
      srcEl.style.transformOrigin = '50% 92%';
      srcEl.style.transition = 'transform .26s ease';
      srcEl.style.transform = `translate(${dR.left - sR.left + (leftSide ? -30 : 30)}px,${dR.top - sR.top - 70}px) rotate(${leftSide ? 72 : -72}deg)`;
      const stream = document.createElement('div');
      stream.className = 'ws-stream';
      stream.style.left = (dR.left + dR.width/2 - wR.left - 3.5) + 'px';
      stream.style.top  = (dR.top - wR.top - 26) + 'px';
      stream.style.setProperty('--h', '44px');
      stream.style.background = PAL[c];
      timers.push(setTimeout(() => { if (!over) wrap.appendChild(stream); api.sound('pour'); }, 130));
      timers.push(setTimeout(() => {
        stream.remove();
        if (over) return;
        undoStack.push(tubes.map(a=>a.slice()));
        const from = tubes[si], to = tubes[di];
        while (from.length && from[from.length-1] === c && to.length < CAP) to.push(from.pop());
        moves++; sel = -1; busy = false;
        render(di);
        // コップ完成のキラキラ
        const tu = tubes[di];
        if (tu.length === CAP && tu.every(x=>x===tu[0])) {
          const el = area.children[di], eR = el.getBoundingClientRect(), wR2 = wrap.getBoundingClientRect();
          for (let k=0;k<3;k++){
            const sp = document.createElement('span');
            sp.className = 'ws-done'; sp.textContent = '✨';
            sp.style.left = (eR.left - wR2.left + 6 + k*14) + 'px';
            sp.style.top  = (eR.top - wR2.top - 8 + (k%2)*10) + 'px';
            wrap.appendChild(sp);
            timers.push(setTimeout(() => sp.remove(), 900));
          }
          api.sound('collect');
        }
        checkWin();
      }, 430));
    }
    function checkWin(){
      const done = tubes.every(tu => tu.length===0 || (tu.length===CAP && tu.every(c=>c===tu[0])));
      if (done) { over = true; setTimeout(() => api.end({win:true, msg:`手数: ${moves}`}), 450); }
    }
    bUndo.addEventListener('click', () => {
      if (over || busy || !undoStack.length) return;
      tubes = undoStack.pop(); moves++; sel = -1; api.sound('tap'); render();
    });
    bReset.addEventListener('click', () => {
      if (over || busy) return;
      tubes = initial.map(a=>a.slice()); undoStack.length = 0; moves = 0; sel = -1;
      api.sound('tap'); render();
    });
    render();
    return {destroy(){ over = true; timers.forEach(clearTimeout); }};
  }
};

/* ============================================================
   ゲーム3: ピンをぬけ！(Canvas + 簡易物理)
   ============================================================ */
const PinGame = {
  W:320, H:480,
  stages: [
    { // S1: 4本のピン。左右2つの溶岩を両方すててからお宝を通す
      walls:[[60,40,60,440],[260,40,260,440],[102,440,218,440],[110,395,110,440],[210,395,210,440],[112,312,112,340],[208,312,208,340]],
      pot:{x1:112,x2:208,y1:408,y2:438},
      drains:[[60,102],[218,260]],
      pins:[[90,90,230,90],[62,180,255,250],[100,340,220,340],[190,290,65,330]],
      gold:[[140,76],[175,76],[135,326],[180,326]],
      lava:[[212,220],[233,229],[80,311],[100,306]],
      hint:'溶岩🔥を全部すててからお宝を通せ'
    },
    { // S2: 5本のピン・2段トレイリレー
      walls:[[60,40,60,440],[260,40,260,440],[102,440,218,440],[110,395,110,440],[210,395,210,440],
             [112,252,112,280],[208,252,208,280],[112,352,112,380],[208,352,208,380]],
      pot:{x1:112,x2:208,y1:408,y2:438},
      drains:[[60,102],[218,260]],
      pins:[[90,70,230,70],[62,140,255,205],[100,280,220,280],[100,380,220,380],[190,300,65,340]],
      gold:[[140,56],[175,56],[135,266],[180,266]],
      lava:[[215,178],[235,185],[80,322],[100,316]],
      hint:'5本のピン！2段リレーでお宝を運べ'
    },
    { // S3: 7本のピン。溶岩斜面+ダミー斜面(乗ると排出口行き)の2枚重ね+ツボのフタ
      walls:[[60,40,60,440],[260,40,260,440],[102,440,218,440],[110,383,110,440],[210,383,210,440],
             [112,252,112,280],[208,252,208,280],[112,352,112,380],[208,352,208,380]],
      pot:{x1:112,x2:208,y1:408,y2:438},
      drains:[[60,102],[218,260]],
      pins:[[90,70,230,70],[62,100,255,158],[62,140,255,205],[100,280,220,280],[100,380,220,380],[190,300,65,340],[112,390,208,390]],
      gold:[[140,56],[175,56],[135,266],[180,266]],
      lava:[[228,131],[246,138],[80,322],[100,316]],
      hint:'7本のピン！3枚のしかけを全部かわせ'
    }
  ],
  create(host, stage, api){
    const S = this.stages[stage];
    const W = this.W, H = this.H;
    const {cv, ctx, toLocal, destroy:dcv} = makeCanvas(host, W, H);
    const hud = document.createElement('div'); hud.className = 'game-hud';
    hud.innerHTML = `<span>お宝 <b id="pin-c">0</b> / ${S.gold.length}</span>`;
    const bRetry = document.createElement('button'); bRetry.textContent = '🔄 リトライ';
    hud.appendChild(bRetry);
    host.appendChild(hud);
    api.hint(S.hint);

    const GRAV = 1500, REST = 0.15;
    const balls = [];
    S.gold.forEach(p => balls.push({x:p[0]+rnd(-1,1), y:p[1], vx:0, vy:0, r:10, kind:'gold', dead:false, still:0}));
    S.lava.forEach(p => balls.push({x:p[0]+rnd(-1,1), y:p[1], vx:0, vy:0, r:9,  kind:'lava', dead:false, still:0}));
    let pins = S.pins.map(p => ({seg:p, pulled:false, anim:0}));
    let collected = 0, over = false, raf = 0, tPrev = 0, gameT = 0;
    let boomAt = null;
    const timers = [];
    const parts = makeParticles(), shake = makeShake();

    function segCollide(b, s){
      const dx = s[2]-s[0], dy = s[3]-s[1];
      const len2 = dx*dx + dy*dy || 1;
      let t = ((b.x-s[0])*dx + (b.y-s[1])*dy) / len2;
      t = clamp(t, 0, 1);
      const px = s[0]+dx*t, py = s[1]+dy*t;
      let nx = b.x-px, ny = b.y-py;
      const d = Math.hypot(nx, ny);
      if (d >= b.r || d === 0) return;
      nx /= d; ny /= d;
      const pen = b.r - d;
      b.x += nx*pen; b.y += ny*pen;
      const vn = b.vx*nx + b.vy*ny;
      if (vn < 0) { b.vx -= (1+REST)*vn*nx; b.vy -= (1+REST)*vn*ny; }
      const tx = -ny, ty = nx, vt = b.vx*tx + b.vy*ty;
      b.vx -= vt*0.03*tx; b.vy -= vt*0.03*ty;
    }
    function ballCollide(a, b){
      let dx = b.x-a.x, dy = b.y-a.y;
      const d = Math.hypot(dx, dy) || 0.001, min = a.r + b.r;
      if (a.kind !== b.kind && d < min + 3) { burn(a.kind==='gold'?a:b); return; }
      if (d >= min) return;
      dx /= d; dy /= d;
      const pen = (min-d)/2;
      a.x -= dx*pen; a.y -= dy*pen; b.x += dx*pen; b.y += dy*pen;
      const avn = a.vx*dx + a.vy*dy, bvn = b.vx*dx + b.vy*dy;
      if (avn - bvn > 0) {
        const m = (avn+bvn)/2;
        a.vx += (m-avn)*dx; a.vy += (m-avn)*dy;
        b.vx += (m-bvn)*dx; b.vy += (m-bvn)*dy;
      }
    }
    function burn(gb){
      if (over) return; over = true;
      boomAt = {x:gb.x, y:gb.y};
      shake.hit(7, 0.4);
      parts.burst(gb.x, gb.y, {n:24, color:['#f97316','#dc2626','#fde047'], speed:240, life:0.7, size:5, up:100});
      api.sound('burn');
      timers.push(setTimeout(() => api.end({win:false, msg:'お宝が溶岩にふれてしまった…'}), 900));
    }
    function fail(msg){
      if (over) return; over = true;
      timers.push(setTimeout(() => api.end({win:false, msg}), 600));
    }
    function step(dt){
      const segs = S.walls.concat(pins.filter(p=>!p.pulled).map(p=>p.seg));
      const sub = 3, h = dt/sub;
      for (let s=0; s<sub; s++){
        for (const b of balls){
          if (b.dead) continue;
          b.vy += GRAV*h;
          b.x += b.vx*h; b.y += b.vy*h;
          for (const sg of segs) segCollide(b, sg);
          if (over) return;
        }
        for (let i=0;i<balls.length;i++) for (let j=i+1;j<balls.length;j++){
          if (!balls[i].dead && !balls[j].dead) ballCollide(balls[i], balls[j]);
          if (over) return;
        }
      }
      for (const b of balls){
        if (b.dead) continue;
        // ツボ判定
        const P = S.pot;
        if (b.x > P.x1 && b.x < P.x2 && b.y > P.y1 && b.y < P.y2) {
          if (b.kind === 'gold') {
            b.dead = true; collected++; api.sound('collect');
            parts.burst(b.x, b.y, {n:14, color:['#fde047','#fbbf24','#fff'], speed:160, life:0.6, size:4, up:120});
            $('#pin-c').textContent = collected;
            if (collected === S.gold.length) {
              over = true;
              timers.push(setTimeout(() => api.end({win:true, msg:`お宝 ${collected}個 かくとく！`}), 500));
              return;
            }
          } else { fail('ツボに溶岩が入ってしまった…'); return; }
        }
        // 画面外(排出口)
        if (b.y > H + 30) {
          b.dead = true;
          if (b.kind === 'gold') { fail('お宝が落ちてしまった…'); return; }
        }
        // 静止カウント
        b.still = (Math.abs(b.vx) < 10 && Math.abs(b.vy) < 10) ? b.still+1 : 0;
      }
      // 全ピンを抜いたのに届かない
      if (pins.every(p=>p.pulled)) {
        const rest = balls.filter(b=>!b.dead && b.kind==='gold');
        if (rest.length && rest.every(b=>b.still > 50)) fail('お宝がツボに届かなかった…');
      }
      pins.forEach(p => { if (p.pulled && p.anim < 1) p.anim = Math.min(1, p.anim + dt*5); });
    }
    function draw(){
      ctx.clearRect(0,0,W,H);
      ctx.save();
      shake.apply(ctx);
      // ダンジョン背景(レンガ)
      ctx.fillStyle = '#0b1220'; ctx.fillRect(-10,-10,W+20,H+20);
      ctx.fillStyle = 'rgba(71,85,105,.14)';
      for (let ry=0; ry<H; ry+=28){
        const off = (ry/28)%2 ? 24 : 0;
        for (let rx=-24+off; rx<W; rx+=48) ctx.fillRect(rx+1, ry+1, 46, 26);
      }
      // たいまつ(ゆらめき)
      const fl = 15 + Math.sin(gameT*9)*2;
      ctx.font = fl + 'px serif'; ctx.textAlign = 'center';
      ctx.fillText('🔥', 40, 70); ctx.fillText('🔥', 280, 70);
      ctx.fillStyle = 'rgba(251,146,60,' + (0.10 + Math.sin(gameT*9)*0.03) + ')';
      ctx.beginPath(); ctx.arc(40, 64, 30, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(280, 64, 30, 0, 7); ctx.fill();
      // 排出口(溶岩だまり)
      S.drains.forEach(d => {
        const g = ctx.createLinearGradient(0, 448, 0, 480);
        g.addColorStop(0, '#f97316'); g.addColorStop(1, '#7c2d12');
        ctx.fillStyle = g; ctx.fillRect(d[0], 448, d[1]-d[0], 32);
        ctx.font = '15px serif'; ctx.textAlign='center';
        ctx.fillText('🔥', (d[0]+d[1])/2, 468);
      });
      // ツボ(光る収集ゾーン)
      const P = S.pot;
      const pg = ctx.createLinearGradient(0, P.y1-16, 0, P.y2);
      pg.addColorStop(0, 'rgba(251,191,36,0)');
      pg.addColorStop(1, 'rgba(251,191,36,' + (0.20 + Math.sin(gameT*4)*0.07) + ')');
      ctx.fillStyle = pg;
      ctx.fillRect(P.x1, P.y1-16, P.x2-P.x1, P.y2-P.y1+16);
      ctx.font = '20px serif'; ctx.textAlign='center';
      ctx.fillText('🏺', (P.x1+P.x2)/2, P.y2-6);
      ctx.font = '11px serif';
      ctx.fillText('✨', P.x1+14, P.y1-2 + Math.sin(gameT*3)*3);
      ctx.fillText('✨', P.x2-14, P.y1-4 + Math.cos(gameT*3.4)*3);
      // 壁
      ctx.strokeStyle = '#475569'; ctx.lineWidth = 8; ctx.lineCap = 'round';
      S.walls.forEach(w => { ctx.beginPath(); ctx.moveTo(w[0],w[1]); ctx.lineTo(w[2],w[3]); ctx.stroke(); });
      // ピン
      pins.forEach(p => {
        if (p.anim >= 1) return;
        const s = p.seg;
        const dx = s[2]-s[0], dy = s[3]-s[1];
        const L = Math.hypot(dx,dy) || 1;
        const off = p.anim * 90;
        const ox = dx/L*off, oy = dy/L*off;
        ctx.globalAlpha = 1 - p.anim;
        ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 9; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(s[0]+ox, s[1]+oy); ctx.lineTo(s[2]+ox, s[3]+oy); ctx.stroke();
        ctx.beginPath(); ctx.arc(s[2]+ox, s[3]+oy, 8, 0, 7);
        ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 4; ctx.stroke();
        ctx.globalAlpha = 1;
      });
      // ボール
      balls.forEach(b => {
        if (b.dead) return;
        if (b.kind === 'gold') {
          ctx.fillStyle = '#fcd34d';
          ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
          ctx.strokeStyle = '#b45309'; ctx.lineWidth = 2; ctx.stroke();
          ctx.fillStyle = 'rgba(255,255,255,.7)';
          ctx.beginPath(); ctx.arc(b.x-3, b.y-3, 2.6, 0, 7); ctx.fill();
        } else {
          const pulse = 1 + Math.sin(gameT*7 + b.x)*0.08;
          ctx.fillStyle = 'rgba(249,115,22,.25)';
          ctx.beginPath(); ctx.arc(b.x, b.y, b.r*1.7*pulse, 0, 7); ctx.fill();
          ctx.fillStyle = '#f97316';
          ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
          ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2.5; ctx.stroke();
          ctx.fillStyle = '#fde047';
          ctx.beginPath(); ctx.arc(b.x, b.y, b.r*0.35*pulse, 0, 7); ctx.fill();
        }
      });
      parts.draw(ctx);
      if (boomAt) { ctx.font = '36px serif'; ctx.textAlign='center'; ctx.fillText('💥', boomAt.x, boomAt.y+10); }
      ctx.restore();
    }
    const ac = new AbortController();
    cv.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (over) return;
      const p = toLocal(e);
      // ピンとの距離でヒット判定
      let best = null, bd = 26;
      pins.forEach(pin => {
        if (pin.pulled) return;
        const s = pin.seg;
        const dx = s[2]-s[0], dy = s[3]-s[1], len2 = dx*dx+dy*dy||1;
        let t = clamp(((p.x-s[0])*dx + (p.y-s[1])*dy)/len2, 0, 1);
        const d = Math.hypot(p.x-(s[0]+dx*t), p.y-(s[1]+dy*t));
        if (d < bd) { bd = d; best = pin; }
      });
      if (best) { best.pulled = true; api.sound('pull'); }
    }, {signal:ac.signal});
    bRetry.addEventListener('click', () => { App.startGame(App.cur.g, App.cur.stage); }, {signal:ac.signal});

    function loop(t){
      raf = requestAnimationFrame(loop);
      const dt = Math.min((t-tPrev)/1000 || 0, 1/30);
      tPrev = t;
      gameT += dt;
      if (!over) step(dt);
      // お宝のきらめき
      if (Math.random() < 0.08) {
        const alive = balls.filter(b => !b.dead && b.kind === 'gold');
        if (alive.length) {
          const g = alive[ri(0, alive.length-1)];
          parts.burst(g.x + rnd(-6,6), g.y + rnd(-6,6), {n:1, color:'#fff', speed:20, life:0.4, size:2, grav:-30});
        }
      }
      parts.update(dt); shake.update(dt);
      draw();
    }
    raf = requestAnimationFrame(t => { tPrev = t; raf = requestAnimationFrame(loop); });
    return {destroy(){ cancelAnimationFrame(raf); ac.abort(); timers.forEach(clearTimeout); dcv(); }};
  }
};

/* ============================================================
   ゲーム4: かずあわせ(DOM・ドラッグ合体)
   ============================================================ */
const MergeGame = {
  N: 5,
  stages: [
    {target:128, moves:80,  seed:[2,2,2,2,4,4,4,4,8,8,8,16,16,2,4,8]},
    {target:256, moves:110, seed:[2,2,2,4,4,4,4,8,8,8,16,16,16,32,32,4,8,16]},
    {target:512, moves:140, seed:[2,2,4,4,4,4,8,8,8,8,16,16,16,32,32,32,64,8,16,64]},
  ],
  hue(v){ return (Math.log2(v)*36) % 360; },
  create(host, stage, api){
    const cfg = this.stages[stage];
    const N = this.N;
    const wrap = document.createElement('div'); wrap.className = 'mg-wrap';
    const board = document.createElement('div'); board.className = 'mg-board';
    wrap.appendChild(board); host.appendChild(wrap);
    const hud = document.createElement('div'); hud.className = 'game-hud';
    hud.innerHTML = `<span>目標 <b>${cfg.target}</b></span><span>のこり <b id="mg-mv">${cfg.moves}</b> 手</span><span>最大 <b id="mg-max">0</b></span>`;
    host.appendChild(hud);
    api.hint(`同じ数字をドラッグでくっつけて ${cfg.target} を作ろう！`);

    const GAP = 8, PAD = 8;
    let CS = 70;
    const grid = Array.from({length:N}, () => new Array(N).fill(null)); // grid[r][c] = tile
    let moves = cfg.moves, over = false, maxV = 0, idSeq = 0;

    function layout(){
      const bw = Math.min(host.clientWidth - 24, 360);
      CS = Math.floor((bw - PAD*2 - GAP*(N-1)) / N);
      const size = PAD*2 + CS*N + GAP*(N-1);
      board.style.width = size + 'px'; board.style.height = size + 'px';
      board.querySelectorAll('.mg-cell').forEach(el => el.remove());
      for (let r=0;r<N;r++) for (let c=0;c<N;c++){
        const cell = document.createElement('div'); cell.className = 'mg-cell';
        cell.style.cssText = `left:${PAD+c*(CS+GAP)}px;top:${PAD+r*(CS+GAP)}px;width:${CS}px;height:${CS}px;`;
        board.appendChild(cell);
      }
      for (let r=0;r<N;r++) for (let c=0;c<N;c++) if (grid[r][c]) place(grid[r][c], r, c, false);
    }
    const styleTile = (el, v) => {
      const h = (Math.log2(v)*36) % 360;
      const tier = Math.log2(v);
      el.style.background = `linear-gradient(160deg, hsl(${h} 80% 68%), hsl(${h} 72% 52%))`;
      el.style.boxShadow = tier >= 5
        ? `0 3px 0 rgba(0,0,0,.3), 0 0 ${tier*3}px hsl(${h} 90% 60% / .7)`
        : '0 3px 0 rgba(0,0,0,.3)';
      el.style.fontSize = (v >= 128 ? Math.floor(CS*0.32) : Math.floor(CS*0.4)) + 'px';
      el.textContent = v;
    };
    function mergeFx(r, c, v){
      const x = PAD + c*(CS+GAP) + CS/2, y = PAD + r*(CS+GAP) + CS/2;
      const h = (Math.log2(v)*36) % 360;
      for (let k=0;k<8;k++){
        const sp = document.createElement('span');
        sp.className = 'mg-spark';
        sp.style.left = x+'px'; sp.style.top = y+'px';
        sp.style.background = `hsl(${h} 85% 65%)`;
        sp.style.setProperty('--dx', rnd(-46,46)+'px');
        sp.style.setProperty('--dy', rnd(-46,46)+'px');
        board.appendChild(sp);
        setTimeout(() => sp.remove(), 520);
      }
      const ft = document.createElement('div');
      ft.className = 'mg-pop-txt';
      ft.textContent = '+' + v;
      ft.style.left = (x-20)+'px'; ft.style.top = (y-14)+'px';
      ft.style.fontSize = Math.floor(CS*0.34)+'px';
      board.appendChild(ft);
      setTimeout(() => ft.remove(), 820);
    }
    function place(t, r, c, anim=true){
      t.r = r; t.c = c;
      if (!anim) t.el.classList.add('drag');
      t.el.style.width = CS+'px'; t.el.style.height = CS+'px';
      t.el.style.transform = `translate(${PAD+c*(CS+GAP)}px,${PAD+r*(CS+GAP)}px)`;
      if (!anim) requestAnimationFrame(() => t.el.classList.remove('drag'));
    }
    function addTile(r, c, v, pop=true){
      const el = document.createElement('div');
      el.className = 'mg-tile' + (pop ? ' pop' : '');
      styleTile(el, v);
      board.appendChild(el);
      const t = {id:++idSeq, r, c, v, el};
      grid[r][c] = t;
      place(t, r, c, false);
      if (v > maxV) { maxV = v; $('#mg-max').textContent = maxV; }
      return t;
    }
    function removeTile(t){ grid[t.r][t.c] = null; t.el.remove(); }
    function emptyCells(){
      const es = [];
      for (let r=0;r<N;r++) for (let c=0;c<N;c++) if (!grid[r][c]) es.push([r,c]);
      return es;
    }
    function spawn(){
      const es = emptyCells();
      if (!es.length) return;
      const [r,c] = es[ri(0, es.length-1)];
      let pool = [2,4];
      if (maxV >= 256) pool = [16,32];
      else if (maxV >= 128) pool = [8,16];
      else if (maxV >= 32) pool = [4,8];
      addTile(r, c, pool[ri(0,1)]);
    }
    function useMove(){
      moves--;
      $('#mg-mv').textContent = moves;
      if (maxV >= cfg.target) {
        over = true;
        setTimeout(() => api.end({win:true, msg:`のこり ${moves} 手でクリア！`}), 500);
      } else if (moves <= 0) {
        over = true;
        setTimeout(() => api.end({win:false, msg:`目標 ${cfg.target} に届かなかった…(最大 ${maxV})`}), 500);
      }
    }
    // ---- ドラッグ操作 ----
    let drag = null;
    const ac = new AbortController();
    board.addEventListener('pointerdown', e => {
      if (over) return;
      e.preventDefault();
      const rect = board.getBoundingClientRect();
      const x = e.clientX - rect.left, y = e.clientY - rect.top;
      const c = Math.floor((x-PAD) / (CS+GAP)), r = Math.floor((y-PAD) / (CS+GAP));
      if (r<0||r>=N||c<0||c>=N||!grid[r][c]) return;
