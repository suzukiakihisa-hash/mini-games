        <div class="sn-row"><span class="lbl">🔥 たき火(＋は🌲4消費)</span>
          <button class="sn-btn" id="sn-fm">－</button><span class="val" id="sn-fv"></span><button class="sn-btn" id="sn-fp">＋</button></div>
        <button class="sn-chop" id="sn-chop">🪓 まき割り(+1🌲)</button>
      </div>`;
    host.appendChild(wrap);
    api.hint('たき火を絶やすな！吹雪の前にLvを上げろ');

    // 雪(canvas)
    const scv = wrap.querySelector('#sn-snow');
    const sctx = scv.getContext('2d');
    const flakes = Array.from({length:45}, () => [Math.random(), Math.random(), rnd(0.5,1.5)]);
    function sizeSnow(){
      const sc = wrap.querySelector('.sn-scene');
      scv.width = sc.clientWidth; scv.height = sc.clientHeight;
    }
    const ro = new ResizeObserver(sizeSnow); ro.observe(wrap);
    timers.push(setTimeout(sizeSnow, 50));

    const el = id => wrap.querySelector('#sn-'+id);
    const isBlizz = () => s.tick >= blizzStart && s.tick < blizzStart + 3;
    const isWarn  = () => s.tick >= blizzStart - 2 && s.tick < blizzStart;
    function req(){ return cfg.req(s.day); }
    function render(){
      el('p').textContent = s.people;
      el('f').textContent = s.fire;
      el('w').textContent = Math.floor(s.wood);
      el('fd').textContent = Math.floor(s.food);
      el('d').textContent = `Day ${Math.min(s.day, cfg.days)} / ${cfg.days}`;
      el('db').style.width = (s.tick / TPD * 100) + '%';
      el('ph').textContent = s.tick < 7 ? '☀' : '🌙';
      el('lv').textContent = s.lumber;
      el('hv').textContent = s.hunt;
      el('fv').textContent = s.fire;
      el('fire').style.fontSize = (26 + s.fire * 8) + 'px';
      el('fire').style.filter = `drop-shadow(0 0 ${8 + s.fire*5}px rgba(251,146,60,.9))`;
      el('ppl').textContent = '🧍'.repeat(Math.max(s.people, 0));
      const w = el('warn');
      if (isBlizz()) {
        const bad = s.fire < req();
        w.textContent = bad ? `🌨 吹雪！たき火Lv${req()}必要——こごえている！` : '🌨 吹雪が過ぎるのを待て…';
        w.className = 'sn-warn active';
        el('cold').style.opacity = bad ? 0.85 : 0.35;
      } else if (isWarn()) {
        w.textContent = `⚠ 吹雪接近！たき火Lv${req()}以上にしろ！`;
        w.className = 'sn-warn active';
        el('cold').style.opacity = 0.1;
      } else {
        w.textContent = ''; w.className = 'sn-warn';
        el('cold').style.opacity = 0;
      }
    }
    function toast(msg){
      const h = document.createElement('div'); h.className = 'hint-bar'; h.textContent = msg;
      host.appendChild(h);
      timers.push(setTimeout(() => h.remove(), 3100));
    }
    function losePerson(msg){
      s.people--;
      s.lumber = Math.min(s.lumber, s.people);
      s.hunt = Math.min(s.hunt, Math.max(0, s.people - s.lumber));
      api.sound('freeze');
      toast(msg);
      if (s.people <= 0) {
        over = true;
        timers.push(setTimeout(() => api.end({win:false, msg:`Day ${s.day} で全員たおれてしまった…`}), 700));
      }
    }
    function doTick(){
      s.wood += s.lumber * 1.1;
      s.food += s.hunt * 0.9;
      s.food -= s.people * 0.35;
      if (s.food < 0) { s.food = 0; s.hunger++; } else s.hunger = Math.max(0, s.hunger - 1);
      if (s.hunger >= 3) { s.hunger = 0; losePerson('🍖 食料ぎれ！1人たおれた…'); if (over) return; }
      s.wood -= s.fire * 0.5;
      if (s.wood < 0) { s.wood = 0; if (s.fire > 0) { s.fire--; toast('🌲 まきギレ！たき火が弱まった'); api.sound('hit'); } }
      if (isBlizz() && s.fire < req()) {
        s.freeze++;
        if (s.freeze >= 2) { s.freeze = 0; losePerson('❄ 1人こごえてしまった…'); if (over) return; }
      } else s.freeze = 0;
      s.tick++;
      if (s.tick >= TPD) {
        s.day++; s.tick = 0; blizzStart = ri(5,7);
        if (s.day > cfg.days) {
          over = true;
          timers.push(setTimeout(() => api.end({win:true, msg:`生存者 ${s.people}人 で ${cfg.days}日間を生きのびた！`}), 500));
          return;
        }
        api.sound('event');
        showEvent();
      }
      render();
    }
    function showEvent(){
      if (!eventPool.length) return;
      paused = true;
      const ev = eventPool.splice(ri(0, eventPool.length-1), 1)[0];
      const ovl = document.createElement('div'); ovl.className = 'sn-event';
      ovl.innerHTML = `<div class="box"><div class="t">${ev.t}</div><div class="d">${ev.d}</div></div>`;
      const box = ovl.querySelector('.box');
      [['a','main'],['b','']].forEach(([k, cls]) => {
        const b = document.createElement('button');
        if (cls) b.className = cls;
        b.textContent = ev[k].lbl;
        b.addEventListener('click', () => {
          api.sound('tap');
          ev[k].fn(s);
          s.lumber = Math.min(s.lumber, s.people);
          s.hunt = Math.min(s.hunt, Math.max(0, s.people - s.lumber));
          ovl.remove(); paused = false;
          if (s.people <= 0) { over = true; timers.push(setTimeout(() => api.end({win:false, msg:'全員たおれてしまった…'}), 600)); }
          render();
        });
        box.appendChild(b);
      });
      host.appendChild(ovl);
    }
    // 操作
    const bind = (id, fn) => el(id).addEventListener('click', () => { if (over || paused) return; fn(); api.sound('tap'); render(); });
    bind('lp', () => { if (s.lumber + s.hunt < s.people) s.lumber++; });
    bind('lm', () => { if (s.lumber > 0) s.lumber--; });
    bind('hp', () => { if (s.lumber + s.hunt < s.people) s.hunt++; });
    bind('hm', () => { if (s.hunt > 0) s.hunt--; });
    bind('fp', () => { if (s.fire < 5 && s.wood >= 4) { s.wood -= 4; s.fire++; } });
    bind('fm', () => { if (s.fire > 0) s.fire--; });
    el('chop').addEventListener('click', () => {
      if (over || paused || chopCd > 0) return;
      chopCd = 0.25; s.wood++;
      api.sound('chop');
      render();
    });
    function drawSnow(dt){
      if (!scv.width) return;
      sctx.clearRect(0, 0, scv.width, scv.height);
      const wind = isBlizz() ? 90 : 12;
      const spd = isBlizz() ? 150 : 45;
      sctx.fillStyle = 'rgba(226,232,240,.85)';
      flakes.forEach(f => {
        f[1] += spd * f[2] * dt / scv.height;
        f[0] += wind * f[2] * dt / scv.width;
        if (f[1] > 1) { f[1] = 0; f[0] = Math.random(); }
        if (f[0] > 1) f[0] = 0;
        sctx.beginPath();
        sctx.arc(f[0]*scv.width, f[1]*scv.height, f[2]*1.6, 0, 7);
        sctx.fill();
      });
    }
    function loop(tm){
      raf = requestAnimationFrame(loop);
      const dt = Math.min((tm - tPrev)/1000 || 0, 1/20);
      tPrev = tm;
      chopCd = Math.max(0, chopCd - dt);
      drawSnow(dt);
      if (over || paused) return;
      acc += dt;
      while (acc >= TICK && !over && !paused) { acc -= TICK; doTick(); }
    }
    render();
    raf = requestAnimationFrame(tm => { tPrev = tm; raf = requestAnimationFrame(loop); });
    return {destroy(){ over = true; cancelAnimationFrame(raf); ro.disconnect(); timers.forEach(clearTimeout); }};
  }
};

/* ============================================================
   ゲーム7: サバイブヒーロー(Canvas・ダダサバイバー系)
   ドラッグ移動+自動攻撃。宝石でレベルアップし大群から生きのびる。
   ============================================================ */
const DadaGame = {
  stages: [
    {time:60,  spawn:1.00, ehp:3, espd:40, cdmg:8},
    {time:90,  spawn:0.80, ehp:5, espd:46, cdmg:10},
    {time:120, spawn:0.65, ehp:8, espd:52, cdmg:12},
  ],
  create(host, stage, api){
    const cfg = this.stages[stage];
    const W = 360, H = 560;
    const {cv, ctx, toLocal, destroy:dcv} = makeCanvas(host, W, H);
    const hud = document.createElement('div'); hud.className = 'game-hud';
    hud.innerHTML = `<span>❤ <b id="dd-hp">100</b></span><span>Lv <b id="dd-lv">1</b></span>
      <span>⏱ <b id="dd-t">${cfg.time}</b></span>`;
    host.appendChild(hud);
    api.hint('ドラッグで移動！武器は自動で撃つ');

    const P = {x:W/2, y:H/2, hp:100, spd:115, face:1};
    let t = 0, over = false, paused = false, raf = 0, tPrev = 0;
    let fireRate = 1.7, dmg = 2, projN = 1, fireCd = 0;
    let level = 1, xp = 0, xpNeed = 5, kills = 0;
    let bullets = [], enemies = [], gems = [];
    let spawnCd = 0.6;
    const parts = makeParticles(), floats = makeFloats(), shake = makeShake();
    const timers = [];
    const tufts = Array.from({length:36}, () => [rnd(6,W-6), rnd(6,H-6), rnd(1.5,3.5)]);
    const gauge = makeSkillGauge(host, '💎', '#f472b6', '#f9a8d4');
    gauge.set(0, xpNeed);

    let joy = null;
    const ac = new AbortController();
    cv.addEventListener('pointerdown', e => {
      e.preventDefault();
      const p = toLocal(e);
      joy = {ox:p.x, oy:p.y, dx:0, dy:0};
    }, {signal:ac.signal});
    cv.addEventListener('pointermove', e => {
      if (!joy) return;
      const p = toLocal(e);
      joy.dx = clamp(p.x - joy.ox, -46, 46);
      joy.dy = clamp(p.y - joy.oy, -46, 46);
    }, {signal:ac.signal});
    window.addEventListener('pointerup', () => joy = null, {signal:ac.signal});

    function spawnEnemy(){
      const side = ri(0,3); let x, y;
      if (side === 0) { x = rnd(0,W); y = -26; }
      else if (side === 1) { x = rnd(0,W); y = H+26; }
      else if (side === 2) { x = -26; y = rnd(0,H); }
      else { x = W+26; y = rnd(0,H); }
      let hp = cfg.ehp, spd = cfg.espd*rnd(0.85,1.15), r = 14, emo = '🧟';
      const roll = Math.random();
      if (stage >= 1 && roll < 0.22) { hp = Math.max(1, Math.round(cfg.ehp*0.5)); spd *= 1.7; r = 11; emo = '👻'; }
      else if (roll > 0.86) { hp = cfg.ehp*3; spd *= 0.55; r = 19; emo = '🧌'; }
      enemies.push({x, y, hp, max:hp, spd, r, emo, hitCd:0});
      const rush = t > cfg.time - 12;
      spawnCd = cfg.spawn * (rush ? 0.45 : 1) * rnd(0.7, 1.3);
    }
    function fire(){
      let best = null, bd = 1e9;
      enemies.forEach(e => {
        const d = (e.x-P.x)*(e.x-P.x) + (e.y-P.y)*(e.y-P.y);
        if (d < bd) { bd = d; best = e; }
      });
      if (!best || bd > 300*300) return;
      const base = Math.atan2(best.y-P.y, best.x-P.x);
      for (let i=0;i<projN;i++){
        const off = (i - (projN-1)/2) * 0.16;
        bullets.push({x:P.x, y:P.y, vx:Math.cos(base+off)*340, vy:Math.sin(base+off)*340});
      }
      P.face = Math.cos(base) >= 0 ? 1 : -1;
      if (Math.random() < 0.3) api.sound('shoot');
    }
    const UPGRADES = [
      {t:'🔫 連射UP',        d:'攻撃速度 +30%', ok:() => true,      fn:() => fireRate *= 1.3},
      {t:'💥 ダメージUP',    d:'攻撃力 +1',     ok:() => true,      fn:() => dmg += 1},
      {t:'🎯 マルチショット', d:'同時発射 +1',   ok:() => projN < 4, fn:() => projN++},
      {t:'👟 スピードUP',    d:'移動速度 +18',  ok:() => true,      fn:() => P.spd += 18},
      {t:'💊 かいふく',      d:'HP +35',        ok:() => P.hp < 95, fn:() => P.hp = Math.min(100, P.hp + 35)},
    ];
    function levelUp(){
      paused = true;
      api.sound('event');
      const pool = UPGRADES.filter(u => u.ok());
      const a = pool.splice(ri(0, pool.length-1), 1)[0];
      const b = pool.length ? pool.splice(ri(0, pool.length-1), 1)[0] : a;
      const ovl = document.createElement('div'); ovl.className = 'sn-event';
      ovl.innerHTML = `<div class="box"><div class="t">⬆ レベルアップ！ Lv${level}</div><div class="d">パワーアップを1つえらぼう</div></div>`;
      const box = ovl.querySelector('.box');
      [[a,'main'],[b,'']].forEach(([u, cls]) => {
        const btn = document.createElement('button');
        if (cls) btn.className = cls;
        btn.textContent = `${u.t} — ${u.d}`;
        btn.addEventListener('click', () => {
          api.sound('gate'); u.fn();
          gauge.addSkill(u.t.split(' ')[0]);
          ovl.remove(); paused = false;
        });
        box.appendChild(btn);
      });
      host.appendChild(ovl);
    }
    function finish(win, msg){
      if (over) return; over = true;
      api.sound(win ? 'collect' : 'fail');
      timers.push(setTimeout(() => api.end({win, msg}), win ? 500 : 700));
    }
    function update(dt){
      t += dt;
      $('#dd-t').textContent = Math.max(0, Math.ceil(cfg.time - t));
      if (t >= cfg.time) return finish(true, `Lv${level}・${kills}体たおして生きのびた！`);
      // 移動
      if (joy) {
        const len = Math.hypot(joy.dx, joy.dy);
        if (len > 6) {
          P.x = clamp(P.x + joy.dx/46 * P.spd * dt, 16, W-16);
          P.y = clamp(P.y + joy.dy/46 * P.spd * dt, 16, H-16);
        }
      }
      spawnCd -= dt; if (spawnCd <= 0) spawnEnemy();
      fireCd -= dt;
      if (fireCd <= 0) { fire(); fireCd = 1/fireRate; }
      bullets.forEach(b => { b.x += b.vx*dt; b.y += b.vy*dt; });
      bullets = bullets.filter(b => b.x > -20 && b.x < W+20 && b.y > -20 && b.y < H+20 && !b.hit);
      // 敵
      for (const e of enemies){
        const a = Math.atan2(P.y-e.y, P.x-e.x);
        e.x += Math.cos(a) * e.spd * dt;
        e.y += Math.sin(a) * e.spd * dt;
        e.hitCd -= dt;
        const d = Math.hypot(e.x-P.x, e.y-P.y);
        if (d < e.r + 12 && e.hitCd <= 0) {
          e.hitCd = 0.8;
          P.hp -= cfg.cdmg;
          shake.hit(5, 0.25);
          parts.burst(P.x, P.y, {n:8, color:'#f87171', speed:140, life:0.4, size:4, up:60});
          floats.add(P.x, P.y-26, '-' + cfg.cdmg, '#f87171', 16);
          api.sound('hit');
          $('#dd-hp').textContent = Math.max(0, Math.ceil(P.hp));
          if (P.hp <= 0) return finish(false, `${Math.floor(t)}秒 いきのこった…(Lv${level})`);
        }
      }
      // 弾 vs 敵
      for (const b of bullets){
        for (const e of enemies){
          if (e.hp <= 0) continue;
          const dx = b.x-e.x, dy = b.y-e.y;
          if (dx*dx + dy*dy < (e.r+4)*(e.r+4)) {
            e.hp -= dmg; b.hit = true;
            parts.burst(b.x, b.y, {n:2, color:'#fde047', speed:70, life:0.2, size:3, grav:100});
            if (e.hp <= 0) {
              kills++;
              gems.push({x:e.x, y:e.y});
              parts.burst(e.x, e.y, {n:10, color:['#a3e635','#4d7c0f','#e2e8f0'], speed:150, life:0.5, size:4, up:60});
              if (Math.random() < 0.5) api.sound('hit');
            }
            break;
          }
        }
      }
      enemies = enemies.filter(e => e.hp > 0);
      // 宝石
      for (const g of gems){
        const d = Math.hypot(g.x-P.x, g.y-P.y);
        if (d < 70) { g.x += (P.x-g.x)/d * 280*dt; g.y += (P.y-g.y)/d * 280*dt; }
        if (d < 15) {
          g.got = true; xp++;
          if (Math.random() < 0.4) api.sound('coin');
          if (xp >= xpNeed) {
            xp -= xpNeed; level++;
            xpNeed = Math.round(xpNeed * 1.6 + 2);
            $('#dd-lv').textContent = level;
            parts.burst(P.x, P.y, {n:16, color:'#f472b6', speed:180, life:0.6, size:4, up:120});
            levelUp();
          }
        }
      }
      gems = gems.filter(g => !g.got);
      gauge.set(xp, xpNeed);
    }
    function draw(){
      ctx.save();
      shake.apply(ctx);
      // 草原フィールド
      ctx.fillStyle = '#15231b'; ctx.fillRect(-10,-10,W+20,H+20);
      ctx.fillStyle = 'rgba(74,222,128,.10)';
      tufts.forEach(tf => { ctx.beginPath(); ctx.arc(tf[0], tf[1], tf[2], 0, 7); ctx.fill(); });
      // ラッシュ警告
      if (t > cfg.time - 12 && !over && Math.sin(t*8) > 0) {
        ctx.fillStyle = 'rgba(248,113,113,.85)';
        ctx.font = '800 17px system-ui'; ctx.textAlign = 'center';
        ctx.fillText('⚠ ラッシュ！', W/2, 34);
      }
      // 宝石
      gems.forEach(g => {
        ctx.fillStyle = '#22d3ee';
        ctx.save(); ctx.translate(g.x, g.y); ctx.rotate(Math.PI/4);
        ctx.fillRect(-4,-4,8,8); ctx.restore();
        ctx.fillStyle = 'rgba(34,211,238,.35)';
        ctx.beginPath(); ctx.arc(g.x, g.y, 8, 0, 7); ctx.fill();
      });
      // 弾
      bullets.forEach(b => {
        ctx.fillStyle = 'rgba(253,224,71,.4)';
        ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, 7); ctx.fill();
        ctx.fillStyle = '#fde047';
        ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, 7); ctx.fill();
      });
      // 敵
      enemies.forEach(e => {
        ctx.font = (e.r*2.1) + 'px serif'; ctx.textAlign = 'center';
        ctx.fillText(e.emo, e.x, e.y + e.r*0.75);
        if (e.hp < e.max) {
          ctx.fillStyle = '#450a0a'; ctx.fillRect(e.x-13, e.y-e.r-9, 26, 4);
          ctx.fillStyle = '#f87171'; ctx.fillRect(e.x-13, e.y-e.r-9, 26*e.hp/e.max, 4);
        }
      });
      // プレイヤー
      ctx.fillStyle = 'rgba(0,0,0,.35)';
      ctx.beginPath(); ctx.ellipse(P.x, P.y+15, 13, 5, 0, 0, 7); ctx.fill();
      ctx.save();
      ctx.translate(P.x, P.y);
      ctx.scale(P.face, 1);
      ctx.font = '32px serif'; ctx.textAlign = 'center';
      ctx.fillText('🥷', 0, 11);
      ctx.restore();
      // ジョイスティック
      if (joy) {
        ctx.fillStyle = 'rgba(148,163,184,.15)';
        ctx.beginPath(); ctx.arc(joy.ox, joy.oy, 34, 0, 7); ctx.fill();
        ctx.fillStyle = 'rgba(226,232,240,.4)';
        ctx.beginPath(); ctx.arc(joy.ox+joy.dx*0.7, joy.oy+joy.dy*0.7, 15, 0, 7); ctx.fill();
      }
      parts.draw(ctx);
      floats.draw(ctx);
      ctx.restore();
    }
    function loop(tm){
      raf = requestAnimationFrame(loop);
      const dt = Math.min((tm - tPrev)/1000 || 0, 1/30);
      tPrev = tm;
      if (!over && !paused) update(dt);
      parts.update(dt); floats.update(dt); shake.update(dt);
      draw();
    }
    raf = requestAnimationFrame(tm => { tPrev = tm; raf = requestAnimationFrame(loop); });
    return {destroy(){ cancelAnimationFrame(raf); ac.abort(); timers.forEach(clearTimeout); dcv(); }};
  }
};

/* ============================================================
   ゲーム8: セルサバイバー(Canvas・コア防衛ビーム)
   回転しながら迫るウイルスを、ドラッグ照準のビームで焼く。
   ============================================================ */
const CellGame = {
  stages: [
    {waves:3, base:12, hp:2, spd:26, rot:1.1},
    {waves:4, base:15, hp:3, spd:30, rot:1.4},
    {waves:5, base:18, hp:5, spd:33, rot:1.7},
  ],
  create(host, stage, api){
    const cfg = this.stages[stage];
    const W = 360, H = 560;
    const {cv, ctx, toLocal, destroy:dcv} = makeCanvas(host, W, H);
    const hud = document.createElement('div'); hud.className = 'game-hud';
    hud.innerHTML = `<span>🫀 <b id="cl-hp">100</b></span><span>🌊 WAVE <b id="cl-w">1</b> / ${cfg.waves}</span>`;
    host.appendChild(hud);
    api.hint('おしている間ビーム発射！🧬を集めて進化しろ');

    const C = {x:W/2, y:H/2-10, r:26, hp:100};
    let wave = 1, spawnLeft = cfg.base, spawnCd = 0.8, spawned = 0;
    let aim = -Math.PI/2, firing = false, heat = 0, overheat = false;
    let t = 0, over = false, paused = false, raf = 0, tPrev = 0;
    let enemies = [];
    let dna = [], evo = 0, evoNeed = 8;
    let dmgMul = 1, beamW = 5, heatMul = 1, coolMul = 1, sats = 0, satAng = 0;
    let rings = [], surge = 0, dmgLv = 0, totalUp = 0;   // 進化演出用
    const parts = makeParticles(), floats = makeFloats(), shake = makeShake();
    const timers = [];
    const dust = Array.from({length:16}, () => [rnd(0,7), rnd(60,250), rnd(0.02,0.09), rnd(1,2.5)]); // [角度,半径,角速度,サイズ]
    const gauge = makeSkillGauge(host, '🧬', '#34d399', '#a7f3d0');
    gauge.set(0, evoNeed);

    const ac = new AbortController();
    const setAim = e => { const p = toLocal(e); aim = Math.atan2(p.y-C.y, p.x-C.x); };
    cv.addEventListener('pointerdown', e => { e.preventDefault(); setAim(e); firing = true; }, {signal:ac.signal});
    cv.addEventListener('pointermove', e => { if (firing) setAim(e); }, {signal:ac.signal});
    window.addEventListener('pointerup', () => firing = false, {signal:ac.signal});

    function waveCount(){ return cfg.base + (wave-1)*3; }
    function spawnEnemy(){
      const tank = spawnLeft <= 2;
      enemies.push({
        ang: rnd(0, Math.PI*2), rad: 330,
        dir: Math.random() < 0.5 ? 1 : -1,
        rot: cfg.rot * rnd(0.75, 1.3),
        spd: cfg.spd * rnd(0.85, 1.2) * (tank ? 0.7 : 1),
        hp: tank ? cfg.hp*2.5 : cfg.hp, max: tank ? cfg.hp*2.5 : cfg.hp,
        r: tank ? 17 : 12, tank, spin: rnd(0, 7),
      });
      spawned++; spawnLeft--;
      spawnCd = 0.45;
    }
    function finish(win, msg){
      if (over) return; over = true;
      api.sound(win ? 'collect' : 'fail');
      timers.push(setTimeout(() => api.end({win, msg}), win ? 550 : 750));
    }
    function killEnemy(e, ex, ey){
      e.dead = true;
      parts.burst(ex, ey, {n:12, color:['#f472b6','#c084fc','#e2e8f0'], speed:160, life:0.5, size:4, grav:0});
      dna.push({x:ex, y:ey, v:50});
      if (Math.random() < 0.6) api.sound('hit');
    }
    const UPGRADES = [
      {t:'💥 ビーム強化',   d:'ビーム威力 +40%(色が進化)', ok:() => true,        fn:() => { dmgMul *= 1.4; dmgLv++; }},
      {t:'📏 ビーム拡大',   d:'ビームが太くなる',           ok:() => beamW < 14,  fn:() => beamW += 3},
      {t:'❄ クールボディ', d:'熱がたまりにくく冷めやすく', ok:() => heatMul > 0.5, fn:() => { heatMul *= 0.75; coolMul *= 1.25; }},
      {t:'🛰 サテライト',   d:'周回するこぶんが敵を攻撃',   ok:() => sats < 2,    fn:() => sats++},
      {t:'🔧 コア修復',     d:'HP +30',                    ok:() => C.hp < 95,   fn:() => { C.hp = Math.min(100, C.hp+30); $('#cl-hp').textContent = Math.ceil(C.hp); }},
    ];
    function upgrade(){
      paused = true; firing = false;
      api.sound('event');
      const pool = UPGRADES.filter(u => u.ok());
      const a = pool.splice(ri(0, pool.length-1), 1)[0];
      const b = pool.length ? pool.splice(ri(0, pool.length-1), 1)[0] : a;
      const ovl = document.createElement('div'); ovl.className = 'sn-event';
      ovl.innerHTML = `<div class="box"><div class="t">🧬 進化！</div><div class="d">強化を1つえらぼう</div></div>`;
      const box = ovl.querySelector('.box');
      [[a,'main'],[b,'']].forEach(([u, cls]) => {
        const btn = document.createElement('button');
        if (cls) btn.className = cls;
        btn.textContent = `${u.t} — ${u.d}`;
        btn.addEventListener('click', () => {
          u.fn();
          gauge.addSkill(u.t.split(' ')[0]);
          totalUp++; surge = 2;
          rings.push({r:C.r, a:1}, {r:C.r-16, a:1});
          shake.hit(6, 0.35);
          floats.add(C.x, C.y-78, u.t, '#a7f3d0', 22);
          parts.burst(C.x, C.y, {n:26, color:['#34d399','#a7f3d0','#fde047'], speed:240, life:0.8, size:5, grav:0});
          api.sound('win');
          ovl.remove(); paused = false;
        });
        box.appendChild(btn);
      });
      host.appendChild(ovl);
    }
    function update(dt){
      t += dt;
      if (spawnLeft > 0) { spawnCd -= dt; if (spawnCd <= 0) spawnEnemy(); }
      // ヒート
      if (firing && !overheat) {
        heat += dt * 0.4 * heatMul;
        if (heat >= 1) { heat = 1; overheat = true; floats.add(C.x, C.y-52, 'オーバーヒート！', '#f87171', 16); api.sound('freeze'); }
      } else {
        heat = Math.max(0, heat - dt * 0.6 * coolMul);
        if (overheat && heat <= 0.35) overheat = false;
      }
      // ビームダメージ(貫通)
      const beamOn = firing && !overheat;
      if (beamOn) {
        const ux = Math.cos(aim), uy = Math.sin(aim);
        for (const e of enemies){
          const ex = C.x + Math.cos(e.ang)*e.rad, ey = C.y + Math.sin(e.ang)*e.rad;
          const dx = ex-C.x, dy = ey-C.y;
          const proj = dx*ux + dy*uy;
          if (proj <= 0) continue;
          if (Math.abs(dx*uy - dy*ux) < e.r + beamW) {
            e.hp -= 15 * dmgMul * dt;
            if (Math.random() < 0.25)
              parts.burst(ex, ey, {n:2, color:['#a7f3d0','#34d399'], speed:80, life:0.3, size:3, grav:0});
            if (e.hp <= 0) killEnemy(e, ex, ey);
          }
        }
      }
      // サテライト(周回攻撃)
      if (sats > 0) {
        satAng += 2.2 * dt;
        for (let si=0; si<sats; si++){
          const sa = satAng + si * Math.PI;
          const sx = C.x + Math.cos(sa)*74, sy = C.y + Math.sin(sa)*74;
          for (const e of enemies){
            if (e.dead) continue;
            const ex = C.x + Math.cos(e.ang)*e.rad, ey = C.y + Math.sin(e.ang)*e.rad;
            if (Math.hypot(ex-sx, ey-sy) < e.r + 15) {
              e.hp -= 13 * dt;
              if (Math.random() < 0.2)
                parts.burst(ex, ey, {n:1, color:'#a7f3d0', speed:60, life:0.25, size:3, grav:0});
              if (e.hp <= 0) killEnemy(e, ex, ey);
            }
          }
        }
      }
      // DNA吸収 → 進化
      for (const d of dna){
        const dist = Math.hypot(d.x-C.x, d.y-C.y) || 1;
        d.v += 500 * dt;
        d.x += (C.x-d.x)/dist * d.v * dt;
        d.y += (C.y-d.y)/dist * d.v * dt;
        if (dist < C.r + 8) {
          d.got = true; evo++;
          if (Math.random() < 0.3) api.sound('coin');
          if (evo >= evoNeed) {
            evo -= evoNeed;
            evoNeed = Math.round(evoNeed * 1.7 + 2);
            parts.burst(C.x, C.y, {n:18, color:'#34d399', speed:170, life:0.6, size:4, grav:0});
            upgrade();
          }
        }
      }
      dna = dna.filter(d => !d.got);
      gauge.set(evo, evoNeed);
      // 敵移動(回転しながら接近)
      for (const e of enemies){
        if (e.dead) continue;
        e.rad -= e.spd * dt;
        e.ang += e.rot * e.dir * dt;
        e.spin += dt * 3;
        if (e.rad <= C.r + e.r) {
          e.dead = true;
          C.hp -= e.tank ? 14 : 8;
          shake.hit(6, 0.3);
          const ex = C.x + Math.cos(e.ang)*e.rad, ey = C.y + Math.sin(e.ang)*e.rad;
          parts.burst(ex, ey, {n:12, color:'#f87171', speed:170, life:0.5, size:4, grav:0});
          api.sound('hit');
          $('#cl-hp').textContent = Math.max(0, Math.ceil(C.hp));
          if (C.hp <= 0) return finish(false, `コアが破壊された…(WAVE ${wave})`);
        }
      }
      enemies = enemies.filter(e => !e.dead);
      // ウェーブ進行
      if (spawnLeft <= 0 && enemies.length === 0 && !over) {
        if (wave >= cfg.waves) return finish(true, `全${cfg.waves}ウェーブ防衛成功！`);
        wave++;
        spawnLeft = waveCount(); spawnCd = 1.4;
        $('#cl-w').textContent = wave;
        floats.add(C.x, C.y - 90, 'WAVE ' + wave, '#a7f3d0', 30);
        api.sound('event');
      }
    }
    function draw(){
      ctx.save();
      shake.apply(ctx);
      // シャーレ背景
      const bg = ctx.createRadialGradient(C.x, C.y, 30, C.x, C.y, 330);
      bg.addColorStop(0, '#0e2a26'); bg.addColorStop(1, '#081420');
      ctx.fillStyle = bg; ctx.fillRect(-10,-10,W+20,H+20);
      ctx.strokeStyle = 'rgba(52,211,153,.10)'; ctx.lineWidth = 1.5;
      [90,160,230,300].forEach(r => { ctx.beginPath(); ctx.arc(C.x, C.y, r, 0, 7); ctx.stroke(); });
      // 浮遊プランクトン
      ctx.fillStyle = 'rgba(167,243,208,.14)';
      dust.forEach(d => {
        d[0] += d[2] * 0.016;
        ctx.beginPath();
        ctx.arc(C.x + Math.cos(d[0])*d[1], C.y + Math.sin(d[0])*d[1], d[3], 0, 7);
        ctx.fill();
      });
      // 進化の衝撃波
      rings.forEach(rg => {
        ctx.strokeStyle = `rgba(52,211,153,${(rg.a*0.7).toFixed(3)})`;
        ctx.lineWidth = 3 + rg.a*3;
        ctx.beginPath(); ctx.arc(C.x, C.y, rg.r, 0, 7); ctx.stroke();
      });
      const beamOn = firing && !overheat;
      // 照準線(非発射時)
      if (!beamOn && !over) {
        ctx.strokeStyle = 'rgba(167,243,208,.25)'; ctx.lineWidth = 1.5;
        ctx.setLineDash([6,9]);
        ctx.beginPath();
        ctx.moveTo(C.x + Math.cos(aim)*(C.r+6), C.y + Math.sin(aim)*(C.r+6));
        ctx.lineTo(C.x + Math.cos(aim)*400, C.y + Math.sin(aim)*400);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      // ビーム(強化するほど色が進化: 緑→シアン→金→マゼンタ)
      if (beamOn) {
        const BC = [
          ['rgba(52,211,153,.28)', '#34d399', '#e7fff5'],
          ['rgba(34,211,238,.30)', '#22d3ee', '#f0feff'],
          ['rgba(250,204,21,.30)', '#facc15', '#fffbe7'],
          ['rgba(244,114,182,.34)', '#f472b6', '#ffeefe'],
        ][Math.min(dmgLv, 3)];
        const wMul = 1 + surge*0.3;
        const bx = C.x + Math.cos(aim)*420, by = C.y + Math.sin(aim)*420;
        const sx = C.x + Math.cos(aim)*(C.r-2), sy = C.y + Math.sin(aim)*(C.r-2);
        ctx.lineCap = 'round';
        ctx.strokeStyle = BC[0]; ctx.lineWidth = (12 + beamW*1.6) * wMul;
        ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(bx,by); ctx.stroke();
        ctx.strokeStyle = BC[1]; ctx.lineWidth = (3 + beamW*0.6) * wMul;
        ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(bx,by); ctx.stroke();
        ctx.strokeStyle = BC[2]; ctx.lineWidth = (1 + beamW*0.2) * wMul;
        ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(bx,by); ctx.stroke();
        ctx.fillStyle = 'rgba(167,243,208,.8)';
        ctx.beginPath(); ctx.arc(sx, sy, (7 + Math.sin(t*30)*2) * wMul, 0, 7); ctx.fill();
      }
      // 敵(ウイルス)
      enemies.forEach(e => {
        const ex = C.x + Math.cos(e.ang)*e.rad, ey = C.y + Math.sin(e.ang)*e.rad;
        const col = e.tank ? '#c084fc' : '#f472b6';
        ctx.strokeStyle = col; ctx.lineWidth = 3;
        for (let k=0;k<8;k++){
          const a = e.spin + k*Math.PI/4;
          ctx.beginPath();
          ctx.moveTo(ex + Math.cos(a)*e.r, ey + Math.sin(a)*e.r);
          ctx.lineTo(ex + Math.cos(a)*(e.r+6), ey + Math.sin(a)*(e.r+6));
          ctx.stroke();
        }
        ctx.fillStyle = col;
        ctx.beginPath(); ctx.arc(ex, ey, e.r, 0, 7); ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,.25)';
        ctx.beginPath(); ctx.arc(ex, ey, e.r*0.55, 0, 7); ctx.fill();
        // コアをにらむ目
        const ea = Math.atan2(C.y-ey, C.x-ex);
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ex + Math.cos(ea)*e.r*0.35, ey + Math.sin(ea)*e.r*0.35, e.r*0.3, 0, 7); ctx.fill();
        ctx.fillStyle = '#1e1b4b';
        ctx.beginPath(); ctx.arc(ex + Math.cos(ea)*e.r*0.45, ey + Math.sin(ea)*e.r*0.45, e.r*0.15, 0, 7); ctx.fill();
        if (e.hp < e.max) {
          ctx.fillStyle = '#450a0a'; ctx.fillRect(ex-12, ey-e.r-12, 24, 4);
          ctx.fillStyle = '#f87171'; ctx.fillRect(ex-12, ey-e.r-12, 24*Math.max(e.hp,0)/e.max, 4);
        }
      });
      // DNAオーブ
      dna.forEach(d => {
        ctx.fillStyle = 'rgba(52,211,153,.3)';
        ctx.beginPath(); ctx.arc(d.x, d.y, 7, 0, 7); ctx.fill();
        ctx.fillStyle = '#a7f3d0';
        ctx.beginPath(); ctx.arc(d.x, d.y, 3, 0, 7); ctx.fill();
      });
      // サテライト(残像トレイル付き)
      for (let si=0; si<sats; si++){
        const sa = satAng + si * Math.PI;
        for (let g2=3; g2>=1; g2--){
          const ga = sa - g2*0.17;
          ctx.fillStyle = `rgba(110,231,183,${(0.28 - g2*0.08).toFixed(2)})`;
          ctx.beginPath(); ctx.arc(C.x + Math.cos(ga)*74, C.y + Math.sin(ga)*74, 7-g2, 0, 7); ctx.fill();
        }
        const sx2 = C.x + Math.cos(sa)*74, sy2 = C.y + Math.sin(sa)*74;
        ctx.fillStyle = 'rgba(52,211,153,.25)';
        ctx.beginPath(); ctx.arc(sx2, sy2, 12, 0, 7); ctx.fill();
        ctx.fillStyle = '#6ee7b7';
        ctx.beginPath(); ctx.arc(sx2, sy2, 6, 0, 7); ctx.fill();
        ctx.fillStyle = '#022c22';
        ctx.beginPath(); ctx.arc(sx2, sy2-1.5, 1.4, 0, 7); ctx.fill();
      }
      // コア細胞(進化するほどオーラが育つ)
      const pulse = 1 + Math.sin(t*4)*0.05 + surge*0.08;
      ctx.fillStyle = `rgba(52,211,153,${(0.15 + surge*0.12).toFixed(3)})`;
      ctx.beginPath(); ctx.arc(C.x, C.y, (C.r + 14 + totalUp*2.5 + surge*7)*pulse, 0, 7); ctx.fill();
      if (totalUp >= 3) {
        ctx.strokeStyle = 'rgba(167,243,208,.35)';
        ctx.lineWidth = 2; ctx.setLineDash([10,14]);
        ctx.beginPath(); ctx.arc(C.x, C.y, C.r+34, t*0.8, t*0.8 + Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
      }
      const cg = ctx.createRadialGradient(C.x-8, C.y-8, 4, C.x, C.y, C.r);
      cg.addColorStop(0, '#a7f3d0'); cg.addColorStop(1, '#059669');
      ctx.fillStyle = cg;
      ctx.beginPath(); ctx.arc(C.x, C.y, C.r*pulse, 0, 7); ctx.fill();
      ctx.fillStyle = '#065f46';
      ctx.beginPath(); ctx.arc(C.x+3, C.y+2, C.r*0.4, 0, 7); ctx.fill();
      // 目(かわいく)
      ctx.fillStyle = '#022c22';
      ctx.beginPath(); ctx.arc(C.x-7, C.y-6, 2.5, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(C.x+7, C.y-6, 2.5, 0, 7); ctx.fill();
      // ヒートゲージ(コアの周囲)
      if (heat > 0.02) {
        ctx.strokeStyle = overheat ? (Math.sin(t*14) > 0 ? '#f87171' : '#7f1d1d')
                                   : `hsl(${60 - heat*60} 90% 60%)`;
        ctx.lineWidth = 5; ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(C.x, C.y, C.r + 22, -Math.PI/2, -Math.PI/2 + heat*Math.PI*2);
        ctx.stroke();
      }
      parts.draw(ctx);
      floats.draw(ctx);
      ctx.restore();
    }
    function loop(tm){
      raf = requestAnimationFrame(loop);
      const dt = Math.min((tm - tPrev)/1000 || 0, 1/30);
      tPrev = tm;
      if (!over && !paused) update(dt);
      surge = Math.max(0, surge - dt);
      rings.forEach(rg => { rg.r += 300*dt; rg.a = Math.max(0, 1 - rg.r/320); });
      rings = rings.filter(rg => rg.a > 0);
      parts.update(dt); floats.update(dt); shake.update(dt);
      draw();
    }
    raf = requestAnimationFrame(tm => { tPrev = tm; raf = requestAnimationFrame(loop); });
    return {destroy(){ cancelAnimationFrame(raf); ac.abort(); timers.forEach(clearTimeout); dcv(); }};
  }
};
