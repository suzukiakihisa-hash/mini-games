<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>ミニゲームBOX</title>
<style>
/* ============================================================
   共通スタイル
   ============================================================ */
:root{
  --bg:#0f172a; --bg2:#1e293b; --card:#1e293b; --line:#334155;
  --text:#e2e8f0; --sub:#94a3b8; --accent:#38bdf8;
  --good:#4ade80; --bad:#f87171; --gold:#fbbf24;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{
  margin:0; padding:0; height:100%;
  background:var(--bg); color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;
  overflow:hidden; overscroll-behavior:none;
  -webkit-user-select:none; user-select:none;
  touch-action:manipulation;
}
#app{
  height:100vh; height:100dvh;
  display:flex; flex-direction:column;
  padding-top:var(--sat); padding-bottom:var(--sab);
}
/* ---- ヘッダー ---- */
#hdr{
  flex:0 0 auto; display:flex; align-items:center; gap:8px;
  padding:10px 12px;
}
#hdr .hbtn{
  width:42px; height:42px; border-radius:12px; border:1px solid var(--line);
  background:var(--card); color:var(--text); font-size:19px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  flex:0 0 auto;
}
#hdr .hbtn:active{transform:scale(.93);}
#hdr-title{flex:1; text-align:center; font-weight:700; font-size:16px; letter-spacing:.03em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
/* ---- 画面 ---- */
.screen{display:none; flex:1; min-height:0; flex-direction:column; overflow:hidden;}
.screen.active{display:flex;}
/* ---- メニュー ---- */
#scr-menu{padding:4px 16px 16px; overflow-y:auto;}
.logo{text-align:center; margin:6px 0 14px;}
.logo .big{font-size:26px; font-weight:800; letter-spacing:.06em;}
.logo .small{font-size:12px; color:var(--sub); margin-top:2px;}
.cards{display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:440px; margin:0 auto; width:100%;}
.card{
  background:linear-gradient(160deg,#1e293b,#16213a);
  border:1px solid var(--line); border-radius:18px;
  padding:16px 10px 12px; text-align:center; cursor:pointer;
  transition:transform .08s;
}
.card:active{transform:scale(.96);}
.card .ico{font-size:42px; line-height:1;}
.card .nm{font-weight:700; margin-top:8px; font-size:15px;}
.card .ds{font-size:11px; color:var(--sub); margin-top:4px; line-height:1.5;}
.card .st{font-size:13px; margin-top:8px; letter-spacing:2px;}
.menu-foot{text-align:center; margin-top:20px;}
.menu-foot button{
  background:none; border:none; color:var(--sub); font-size:12px;
  text-decoration:underline; cursor:pointer; padding:8px;
}
/* ---- ステージ選択 ---- */
#scr-stages{padding:8px 20px; align-items:center; overflow-y:auto;}
.sg-head{text-align:center; margin:10px 0 18px;}
.sg-head .ico{font-size:56px;}
.sg-head .nm{font-size:20px; font-weight:800; margin-top:6px;}
.sg-head .ds{font-size:13px; color:var(--sub); margin-top:6px;}
.stage-list{display:flex; flex-direction:column; gap:12px; width:100%; max-width:360px;}
.stage-btn{
  display:flex; align-items:center; gap:14px;
  background:var(--card); border:1px solid var(--line); border-radius:16px;
  color:var(--text); padding:16px 18px; font-size:16px; cursor:pointer; width:100%;
}
.stage-btn:active{transform:scale(.97);}
.stage-btn .no{
  width:40px; height:40px; border-radius:50%; background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:17px; flex:0 0 auto; border:1px solid var(--line);
}
.stage-btn .lbl{flex:1; text-align:left; font-weight:600;}
.stage-btn .mark{font-size:18px;}
.stage-btn.locked{opacity:.45;}
/* ---- ゲーム画面 ---- */
#scr-game{position:relative;}
#game-host{flex:1; min-height:0; position:relative; display:flex; flex-direction:column; touch-action:none;}
canvas{display:block; touch-action:none;}
.hint-bar{
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  background:rgba(15,23,42,.85); border:1px solid var(--line);
  padding:8px 16px; border-radius:99px; font-size:13px; white-space:nowrap;
  pointer-events:none; z-index:5; animation:hintfade 3s forwards;
}
@keyframes hintfade{0%,70%{opacity:1}100%{opacity:0}}
.game-hud{
  flex:0 0 auto; display:flex; align-items:center; justify-content:center; gap:14px;
  padding:8px 12px; font-size:13px; color:var(--sub); min-height:40px;
}
.game-hud b{color:var(--text);}
.game-hud button{
  background:var(--card); border:1px solid var(--line); color:var(--text);
  border-radius:10px; padding:6px 14px; font-size:13px; cursor:pointer;
}
.game-hud button:active{transform:scale(.94);}
/* ---- リザルトオーバーレイ ---- */
#overlay{
  position:fixed; inset:0; background:rgba(2,6,23,.72);
  display:none; align-items:center; justify-content:center; z-index:50; padding:24px;
}
#overlay.show{display:flex;}
.result-box{
  background:var(--bg2); border:1px solid var(--line); border-radius:22px;
  padding:28px 24px; width:100%; max-width:320px; text-align:center;
  animation:pop .22s ease-out;
}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.result-box .emo{font-size:54px;}
.result-box .ttl{font-size:20px; font-weight:800; margin-top:10px;}
.result-box .msg{font-size:13px; color:var(--sub); margin-top:8px; line-height:1.6; min-height:1em;}
.result-box .btns{display:flex; flex-direction:column; gap:10px; margin-top:20px;}
.rbtn{
  border:none; border-radius:14px; padding:13px; font-size:15px; font-weight:700;
  cursor:pointer; color:#0f172a; background:var(--accent);
}
.rbtn.sec{background:var(--card); color:var(--text); border:1px solid var(--line);}
.rbtn:active{transform:scale(.96);}
/* ============================================================
   ゲーム2: 水ソート
   ============================================================ */
.ws-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px; overflow:hidden;}
.ws-tubes{display:flex; flex-wrap:wrap; justify-content:center; gap:14px 12px; max-width:400px;}
.tube{
  width:50px; height:168px; border:3px solid #64748b; border-top:none;
  border-radius:0 0 22px 22px; background:rgba(148,163,184,.08);
  display:flex; flex-direction:column-reverse; overflow:hidden;
  cursor:pointer; transition:transform .15s;
  padding:2px;
}
.tube.sel{transform:translateY(-14px); border-color:var(--gold);}
.tube .seg{width:100%; flex:0 0 25%; border-radius:3px;}
.tube .seg.top-pop{animation:segin .18s ease-out;}
@keyframes segin{from{transform:translateY(-16px);opacity:.4}to{transform:none;opacity:1}}
/* ============================================================
   ゲーム4: マージ
   ============================================================ */
.mg-wrap{flex:1; display:flex; align-items:center; justify-content:center; padding:12px;}
.mg-board{
  position:relative; background:#0b1324; border:1px solid var(--line);
  border-radius:16px; touch-action:none;
}
.mg-cell{position:absolute; background:rgba(148,163,184,.09); border-radius:10px;}
.mg-tile{
  position:absolute; border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-weight:800; color:#0f172a; transition:transform .14s ease-out;
  box-shadow:0 3px 0 rgba(0,0,0,.3);
}
.mg-tile.pop{animation:tilepop .18s ease-out;}
@keyframes tilepop{0%{scale:.5}70%{scale:1.12}100%{scale:1}}
.mg-tile.drag{transition:none; z-index:3;}
.mg-pop-txt{
  position:absolute; font-weight:800; color:#fff; pointer-events:none; z-index:5;
  text-shadow:0 2px 6px rgba(0,0,0,.6); animation:floatup .8s ease-out forwards;
}
@keyframes floatup{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-46px)}}
.mg-spark{
  position:absolute; width:6px; height:6px; border-radius:2px; pointer-events:none; z-index:4;
  animation:sparkfly .5s ease-out forwards;
}
@keyframes sparkfly{from{opacity:1;transform:translate(0,0)}to{opacity:0;transform:translate(var(--dx),var(--dy))}}
/* ---- 紙吹雪(勝利演出) ---- */
#confetti{position:fixed; inset:0; pointer-events:none; z-index:60; overflow:hidden;}
#confetti span{
  position:absolute; top:-14px; width:9px; height:14px; border-radius:2px;
  animation:confall linear forwards;
}
@keyframes confall{
  from{transform:translate(0,0) rotate(0)}
  to{transform:translate(var(--dx),105vh) rotate(var(--rot))}
}
/* ---- 水ソート演出 ---- */
.tube{position:relative; background:linear-gradient(105deg,rgba(148,163,184,.16) 0%,rgba(148,163,184,.05) 45%,rgba(255,255,255,.10) 50%,rgba(148,163,184,.05) 55%);}
.tube::after{
  content:''; position:absolute; top:4px; left:6px; width:5px; height:70%;
  background:linear-gradient(rgba(255,255,255,.35),rgba(255,255,255,0));
  border-radius:99px; pointer-events:none;
}
.tube.pouring{z-index:6;}
.ws-stream{
  position:absolute; width:7px; border-radius:3px; pointer-events:none; z-index:7;
  animation:streamin .32s ease-in forwards; transform-origin:top center;
}
@keyframes streamin{0%{height:0;opacity:.4}30%{opacity:1}100%{height:var(--h);opacity:.9}}
.ws-done{position:absolute; font-size:18px; pointer-events:none; z-index:8; animation:floatup .9s ease-out forwards;}
/* ---- ふぶきサバイバル ---- */
.sn-wrap{flex:1; display:flex; flex-direction:column; padding:8px 12px; gap:8px; overflow:hidden; position:relative;}
.sn-stats{display:flex; gap:6px; justify-content:center; flex-wrap:wrap;}
.sn-stat{
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:6px 10px; font-size:13px; font-weight:700; min-width:64px; text-align:center;
}
.sn-stat small{display:block; font-weight:400; font-size:10px; color:var(--sub);}
.sn-day{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--sub); justify-content:center;}
.sn-daybar{width:150px; height:8px; background:#0b1324; border-radius:99px; overflow:hidden;}
.sn-daybar>span{display:block; height:100%; background:linear-gradient(90deg,#38bdf8,#a5f3fc); width:0%;}
.sn-warn{
  text-align:center; font-size:13px; font-weight:700; color:#fca5a5; min-height:20px;
}
.sn-warn.active{animation:blink 0.8s infinite;}
@keyframes blink{50%{opacity:.35}}
.sn-scene{
  flex:1; min-height:110px; position:relative; border-radius:16px; overflow:hidden;
  background:linear-gradient(#1e2a4a,#0b1324 70%); border:1px solid var(--line);
  display:flex; align-items:flex-end; justify-content:center; padding-bottom:14px;
}
.sn-fire{font-size:44px; filter:drop-shadow(0 0 18px rgba(251,146,60,.8)); transition:font-size .3s, filter .3s;}
.sn-people{position:absolute; bottom:10px; left:0; right:0; text-align:center; font-size:20px; letter-spacing:6px;}
.sn-cold{position:absolute; inset:0; background:radial-gradient(ellipse at center,transparent 30%,rgba(125,211,252,.45)); opacity:0; transition:opacity .5s; pointer-events:none;}
.sn-snow{position:absolute; inset:0; pointer-events:none;}
.sn-ctrl{display:flex; flex-direction:column; gap:6px;}
.sn-row{display:flex; align-items:center; justify-content:space-between; gap:8px;
  background:var(--card); border:1px solid var(--line); border-radius:12px; padding:7px 12px; font-size:13px;}
.sn-row .lbl{flex:1; font-weight:600;}
.sn-row .val{width:30px; text-align:center; font-weight:800;}
.sn-btn{
  width:38px; height:34px; border-radius:10px; border:1px solid var(--line);
  background:#0b1324; color:var(--text); font-size:17px; font-weight:800; cursor:pointer;
}
.sn-btn:active{transform:scale(.92);}
.sn-chop{
  border:none; border-radius:14px; padding:12px; font-size:16px; font-weight:800;
  background:linear-gradient(160deg,#166534,#14532d); color:#dcfce7; cursor:pointer;
  border:1px solid #15803d;
}
.sn-chop:active{transform:scale(.96);}
.sn-event{
  position:absolute; inset:0; background:rgba(2,6,23,.8); z-index:20;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.sn-event .box{
  background:var(--bg2); border:1px solid var(--line); border-radius:18px;
  padding:20px; max-width:300px; width:100%; text-align:center; animation:pop .2s ease-out;
}
.sn-event .box .t{font-size:15px; font-weight:800; margin-bottom:6px;}
.sn-event .box .d{font-size:13px; color:var(--sub); line-height:1.6; margin-bottom:14px;}
.sn-event .box button{
  display:block; width:100%; margin-top:8px; border:none; border-radius:12px;
  padding:11px; font-size:14px; font-weight:700; cursor:pointer;
  background:var(--card); color:var(--text); border:1px solid var(--line);
}
.sn-event .box button.main{background:var(--accent); color:#0f172a; border:none;}
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <button class="hbtn" id="btn-back" style="visibility:hidden">←</button>
    <div id="hdr-title">ミニゲームBOX</div>
    <button class="hbtn" id="btn-mute">🔊</button>
  </header>

  <!-- メニュー -->
  <section class="screen active" id="scr-menu">
    <div class="logo">
      <div class="big">🎮 ミニゲームBOX</div>
      <div class="small">4つのミニゲーム × 3ステージ</div>
    </div>
    <div class="cards" id="menu-cards"></div>
    <div class="menu-foot"><button id="btn-reset">進行度をリセット</button></div>
  </section>

  <!-- ステージ選択 -->
  <section class="screen" id="scr-stages">
    <div class="sg-head"><div class="ico" id="sg-ico"></div><div class="nm" id="sg-nm"></div><div class="ds" id="sg-ds"></div></div>
    <div class="stage-list" id="stage-list"></div>
  </section>

  <!-- ゲーム -->
  <section class="screen" id="scr-game">
    <div id="game-host"></div>
  </section>
</div>

<!-- リザルト -->
<div id="overlay">
  <div class="result-box">
    <div class="emo" id="rs-emo"></div>
    <div class="ttl" id="rs-ttl"></div>
    <div class="msg" id="rs-msg"></div>
    <div class="btns" id="rs-btns"></div>
  </div>
</div>

<script>
'use strict';
/* ============================================================
   ユーティリティ / セーフガード
   ============================================================ */
const $ = s => document.querySelector(s);
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const rnd = (a,b) => a + Math.random()*(b-a);
const ri = (a,b) => Math.floor(rnd(a, b+1));
if (!CanvasRenderingContext2D.prototype.roundRect) {   // iOS15以前向け
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(r, w/2, h/2);
    this.moveTo(x+r, y);
    this.arcTo(x+w, y,   x+w, y+h, r);
    this.arcTo(x+w, y+h, x,   y+h, r);
    this.arcTo(x,   y+h, x,   y,   r);
    this.arcTo(x,   y,   x+w, y,   r);
    this.closePath();
    return this;
  };
}
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('gesturestart', e => e.preventDefault());
let lastTouch = 0;
document.addEventListener('touchend', e => {           // ダブルタップ拡大抑止
  const now = Date.now();
  if (now - lastTouch < 350) e.preventDefault();
  lastTouch = now;
}, {passive:false});

/* ============================================================
   進行保存
   ============================================================ */
const Store = {
  KEY:'mgbox_progress_v1',
  data:{run:0, water:0, pin:0, merge:0, zombie:0, snow:0, hero:0},   // クリア済みステージ数 0..3
  load(){ try{ Object.assign(this.data, JSON.parse(localStorage.getItem(this.KEY)||'{}')); }catch(e){} },
  save(){ try{ localStorage.setItem(this.KEY, JSON.stringify(this.data)); }catch(e){} },
  cleared(g, stage){ if (stage+1 > this.data[g]) { this.data[g] = stage+1; this.save(); } },
  unlocked(g, stage){ return stage <= this.data[g]; },
  reset(){ this.data = {run:0, water:0, pin:0, merge:0, zombie:0, snow:0, hero:0}; this.save(); }
};
Store.load();

/* ============================================================
   サウンド(Web Audio 合成)
   ============================================================ */
const Sound = {
  ctx:null,
  muted: localStorage.getItem('mgbox_mute') === '1',
  ensure(){
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) this.ctx = new AC();
    }
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  tone(freq, dur, type='sine', vol=0.18, slideTo=null, delay=0){
    if (this.muted || !this.ctx) return;
    const t0 = this.ctx.currentTime + delay;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t0);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0+dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t0); o.stop(t0+dur+0.02);
  },
  play(name){
    if (this.muted) return;
    this.ensure();
    if (!this.ctx) return;
    switch(name){
      case 'tap':    this.tone(600,0.06,'square',0.10); break;
      case 'jump':   this.tone(350,0.14,'sine',0.20,700); break;
      case 'pour':   this.tone(420,0.08,'sine',0.15,300); this.tone(340,0.08,'sine',0.13,260,null,0.08); break;
      case 'pull':   this.tone(260,0.07,'square',0.14,180); break;
      case 'collect':this.tone(900,0.09,'sine',0.18,1200); break;
      case 'merge':  this.tone(500,0.09,'triangle',0.20,650); break;
      case 'win':    [523.25,659.25,783.99,1046.5].forEach((f,i)=>this.tone(f,0.14,'triangle',0.18,null,i*0.09)); break;
      case 'fail':   this.tone(240,0.28,'sawtooth',0.14,110); break;
      case 'burn':   this.tone(160,0.3,'sawtooth',0.16,60); break;
      case 'shoot':  this.tone(880,0.03,'square',0.05,600); break;
      case 'hit':    this.tone(200,0.06,'square',0.10,120); break;
      case 'gate':   this.tone(700,0.10,'triangle',0.18,1000); break;
      case 'coin':   this.tone(1150,0.07,'sine',0.15,1500); break;
      case 'chop':   this.tone(300,0.06,'square',0.14,180); break;
      case 'slash':  this.tone(500,0.09,'sawtooth',0.12,180); break;
      case 'freeze': this.tone(500,0.4,'sine',0.12,180); break;
      case 'event':  this.tone(600,0.12,'triangle',0.15,800); break;
    }
  }
};
document.addEventListener('pointerdown', () => Sound.ensure(), {once:false});

/* ============================================================
   ゲームメタ情報
   ============================================================ */
const META = {
  run:    {ico:'🏃', nm:'ダッシュラン',     ds:'タップでジャンプ！コインを集めてゴールへ'},
  water:  {ico:'🧪', nm:'みずいろソート',   ds:'水をそそぎ分けて同じ色にそろえよう'},
  pin:    {ico:'📌', nm:'ピンをぬけ！',     ds:'正しい順番でピンを抜いてお宝をツボへ'},
  merge:  {ico:'🔢', nm:'かずあわせ',       ds:'同じ数字をドラッグ合体で大きくしよう'},
  zombie: {ico:'🧟', nm:'ゾンビロード',     ds:'ゲートで兵士を増やして大群を撃て！'},
  snow:   {ico:'❄️', nm:'ふぶきサバイバル', ds:'たき火を絶やさず吹雪の日々を生きのびろ'},
  hero:   {ico:'⚔️', nm:'パワーヒーロー',   ds:'ゲートで強くなってボスをたおせ！'},
};
const GAME_ORDER = ['run','water','pin','merge','zombie','snow','hero'];

/* ============================================================
   演出ヘルパ(パーティクル・フロート文字・紙吹雪)
   ============================================================ */
function makeParticles(){
  const ps = [];
  return {
    burst(x, y, {n=12, color='#fbbf24', speed=180, life=0.6, size=4, grav=380, up=0}={}){
      for (let i=0;i<n;i++){
        const a = rnd(0, Math.PI*2), v = rnd(speed*0.35, speed);
        ps.push({x, y, vx:Math.cos(a)*v, vy:Math.sin(a)*v - up, life:rnd(life*0.5, life), t:0,
                 color:Array.isArray(color)?color[ri(0,color.length-1)]:color, size:rnd(size*0.6, size*1.5), grav});
      }
    },
    update(dt){
      for (let i=ps.length-1;i>=0;i--){
        const p = ps[i]; p.t += dt;
        if (p.t > p.life) { ps.splice(i,1); continue; }
        p.vy += p.grav*dt; p.x += p.vx*dt; p.y += p.vy*dt;
      }
    },
    draw(ctx){
      ps.forEach(p => {
        ctx.globalAlpha = 1 - p.t/p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
      });
      ctx.globalAlpha = 1;
    }
  };
}
function makeFloats(){
  const fs = [];
  return {
    add(x, y, txt, color='#fff', size=16){ fs.push({x, y, txt, color, size, t:0}); },
    update(dt){ for (let i=fs.length-1;i>=0;i--){ fs[i].t += dt; if (fs[i].t > 0.9) fs.splice(i,1); } },
    draw(ctx){
      fs.forEach(f => {
        ctx.globalAlpha = 1 - f.t/0.9;
        ctx.fillStyle = f.color;
        ctx.font = '800 ' + f.size + 'px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(f.txt, f.x, f.y - f.t*50);
      });
      ctx.globalAlpha = 1;
    }
  };
}
function makeShake(){
  let t = 0, mag = 0;
  return {
    hit(m=6, d=0.3){ mag = m; t = d; },
    update(dt){ if (t > 0) t -= dt; },
    apply(ctx){ if (t > 0) ctx.translate(rnd(-mag, mag), rnd(-mag, mag)); }
  };
}
function confettiBurst(){

}

  startGame(g, stage){

    const host = $('#game-host'); host.innerHTML = '';
