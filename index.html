      drag = {t:grid[r][c], sx:e.clientX, sy:e.clientY, dx:0, dy:0};
      drag.t.el.classList.add('drag');
      board.setPointerCapture(e.pointerId);
    }, {signal:ac.signal});
    board.addEventListener('pointermove', e => {
      if (!drag) return;
      e.preventDefault();
      drag.dx = e.clientX - drag.sx; drag.dy = e.clientY - drag.sy;
      // 主軸方向のみ・1マスぶんに制限して追従
      let vx = 0, vy = 0;
      if (Math.abs(drag.dx) > Math.abs(drag.dy)) vx = clamp(drag.dx, -CS*0.7, CS*0.7);
      else vy = clamp(drag.dy, -CS*0.7, CS*0.7);
      const t = drag.t;
      t.el.style.transform = `translate(${PAD+t.c*(CS+GAP)+vx}px,${PAD+t.r*(CS+GAP)+vy}px)`;
    }, {signal:ac.signal});
    board.addEventListener('pointerup', e => {
      if (!drag) return;
      const t = drag.t, dx = drag.dx, dy = drag.dy;
      t.el.classList.remove('drag');
      drag = null;
      let dr = 0, dc = 0;
      if (Math.abs(dx) > Math.abs(dy)) { if (Math.abs(dx) > CS*0.35) dc = dx > 0 ? 1 : -1; }
      else { if (Math.abs(dy) > CS*0.35) dr = dy > 0 ? 1 : -1; }
      const nr = t.r + dr, nc = t.c + dc;
      if ((dr===0 && dc===0) || nr<0 || nr>=N || nc<0 || nc>=N) { place(t, t.r, t.c); return; }
      const other = grid[nr][nc];
      if (!other) {                              // 空きマスへ移動
        grid[t.r][t.c] = null; grid[nr][nc] = t;
        place(t, nr, nc); api.sound('tap'); useMove();
      } else if (other.v === t.v) {              // 合体！
        removeTile(t); removeTile(other);
        const nt = addTile(nr, nc, t.v*2);
        nt.el.classList.add('pop');
        mergeFx(nr, nc, t.v*2);
        api.sound('merge');
        spawn();
        useMove();
      } else {                                   // 入れ替え
        const or = other.r, oc = other.c;
        grid[t.r][t.c] = other; grid[or][oc] = t;
        place(other, t.r, t.c); place(t, or, oc);
        api.sound('tap'); useMove();
      }
    }, {signal:ac.signal});
    board.addEventListener('pointercancel', () => {
      if (drag) { drag.t.el.classList.remove('drag'); place(drag.t, drag.t.r, drag.t.c); drag = null; }
    }, {signal:ac.signal});

    // ---- 初期配置 ----
    layout();
    const cells = [];
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) cells.push([r,c]);
    for (let i=cells.length-1;i>0;i--){ const j=ri(0,i); [cells[i],cells[j]]=[cells[j],cells[i]]; }
    cfg.seed.forEach((v,i) => addTile(cells[i][0], cells[i][1], v, false));
    $('#mg-max').textContent = maxV;
    const ro = new ResizeObserver(() => layout());
    ro.observe(host);
    return {destroy(){ over = true; ac.abort(); ro.disconnect(); }};
  }
};

/* ============================================================
   ゲーム5: ゾンビロード(Canvas・隊列シューター)
   左右ドラッグで隊列を動かし、ゲートで増員、ゾンビとボスを撃つ。
   ============================================================ */
const ZombieGame = {
  stages: [
    {len:55, spawn:1.25, ehp:4,  espd:52, boss:1400, crate:[38, 105, 195, 310]},
    {len:70, spawn:1.00, ehp:7,  espd:60, boss:2300, crate:[46, 120, 215, 330]},
    {len:85, spawn:0.85, ehp:9,  espd:68, boss:3200, crate:[52, 135, 240, 370]},
  ],
  // 単発DPSの伸びは ピストル比で最大3.4倍まで(以前は10倍超えてボスが即溶けていた)
  WEAPONS: [
    {nm:'ピストル',     ico:'🔫', dmg:1, rateM:1.00, pellets:1, pierce:0, splash:0,  color:'#fde047', bw:3, bh:9,  spd:560},
    {nm:'マシンガン',   ico:'🔫', dmg:1, rateM:1.60, pellets:1, pierce:0, splash:0,  color:'#fb923c', bw:3, bh:11, spd:600},
    {nm:'ショットガン', ico:'🧨', dmg:1, rateM:0.85, pellets:3, pierce:0, splash:0,  color:'#a3e635', bw:4, bh:8,  spd:540},
    {nm:'レーザー',     ico:'⚡', dmg:3, rateM:1.00, pellets:1, pierce:2, splash:0,  color:'#22d3ee', bw:4, bh:18, spd:720},
    {nm:'ロケット',     ico:'🚀', dmg:4, rateM:0.85, pellets:1, pierce:0, splash:40, color:'#f87171', bw:6, bh:12, spd:480},
  ],
  RATE_CAP: 55,                       // 発射レートの上限(以前は90で人数インフレがそのまま火力に乗っていた)
  create(host, stage, api){
    const cfg = this.stages[stage];
    const W = 360, H = 560;
    const {cv, ctx, toLocal, destroy:dcv} = makeCanvas(host, W, H);
    const hud = document.createElement('div'); hud.className = 'game-hud';
    hud.innerHTML = `<span>🪖 <b id="zb-n">6</b> 人</span><span>🔫 <b id="zb-w">ピストル</b></span>
      <span style="flex:0 0 100px;height:8px;background:#0b1324;border-radius:99px;overflow:hidden">
        <span id="zb-bar" style="display:block;height:100%;width:0%;background:var(--accent)"></span></span>`;
    host.appendChild(hud);
    api.hint('左右にドラッグ！📦をひろって武器を強化しろ');

    const SY = 468, ROAD = 92;
    const WEAPONS = this.WEAPONS, RATE_CAP = this.RATE_CAP;
    let t = 0, n = 6, sx = W/2;
    let bullets = [], enemies = [], gates = [], pickups = [], crates = [];
    let wTier = 0, crateIdx = 0;
    const crateAt = [0.14, 0.36, 0.58, 0.80].map(f => f * cfg.len);   // 武器箱の出現タイミング
    let fireCd = 0, spawnCd = 1.0, gateCd = 2.5;
    let boss = null, over = false, raf = 0, tPrev = 0;
    const parts = makeParticles(), floats = makeFloats(), shake = makeShake();
    const props = ['🌲','🏚','🚗','🌳','🗑','🌲','⚰','🌳'].map((e, i) => ({e, y:i*76, side:i%2}));

    const ac = new AbortController();
    let dragging = false;
    cv.addEventListener('pointerdown', e => { e.preventDefault(); dragging = true; sx = clamp(toLocal(e).x, 40, W-40); }, {signal:ac.signal});
    cv.addEventListener('pointermove', e => { if (dragging) sx = clamp(toLocal(e).x, 40, W-40); }, {signal:ac.signal});
    window.addEventListener('pointerup', () => dragging = false, {signal:ac.signal});

    function mkGate(){
      const good = Math.random() < 0.28 ? {op:'×', v:2} : {op:'+', v:ri(4,9)};
      const bad  = Math.random() < 0.28 ? {op:'÷', v:2} : {op:'-', v:ri(3,8)};
      const L = Math.random() < 0.5;
      gates.push({y:-46, l:L?good:bad, r:L?bad:good, used:false});
      gateCd = rnd(6, 8.5);
    }
    function mkEnemy(){
      const tank = stage > 0 && Math.random() < 0.25;
      const scale = 1 + (t / cfg.len) * 1.5;             // 時間経過で敵が硬くなる
      const hp = Math.round((tank ? cfg.ehp*2 : cfg.ehp) * scale);
      enemies.push({x:rnd(50, W-50), y:-30, hp, max:hp, spd:(tank?cfg.espd*0.7:cfg.espd)*rnd(0.9,1.2), big:tank});
      spawnCd = cfg.spawn * rnd(0.7, 1.3);
    }
    function applyGate(o){
      const goodOp = o.op === '+' || o.op === '×';
      if (o.op === '+') n += o.v;
      if (o.op === '-') n -= o.v;
      if (o.op === '×') n *= o.v;
      if (o.op === '÷') n = Math.ceil(n / o.v);
      floats.add(sx, SY-52, (goodOp?'+':'') + o.op + o.v, goodOp ? '#4ade80' : '#f87171', 20);
      api.sound(goodOp ? 'gate' : 'hit');
      if (!goodOp) shake.hit(4, 0.2);
      if (n <= 0) return finish(false, 'ぜんめつ… ' + Math.floor(t) + '秒');
      $('#zb-n').textContent = n;
    }
    function soldierPos(i){
      const col = i % 6, row = Math.floor(i / 6);
      return [sx + (col - 2.5) * 17, SY + row * 15];
    }
    function finish(win, msg){
      if (over) return; over = true;
      api.sound(win ? 'collect' : 'fail');
      timers.push(setTimeout(() => api.end({win, msg}), win ? 500 : 700));
    }
    const timers = [];

    function update(dt){
      t += dt;
      const inBossZone = t >= cfg.len;
      if (!inBossZone && t < cfg.len - 5) {
        spawnCd -= dt; if (spawnCd <= 0) mkEnemy();
        gateCd  -= dt; if (gateCd  <= 0) mkGate();
      }
      if (inBossZone && !boss) {
        // 画面外で溶かされないよう、まず見える位置まで降りてくる(その間は無敵)
        boss = {x:W/2, y:-70, hp:cfg.boss, max:cfg.boss, entering:true};
        floats.add(W/2, 210, '⚠ BOSS ⚠', '#f87171', 28);
        api.sound('burn');
        shake.hit(6, 0.5);
      }
      // 武器箱の出現(撃って壊さないと武器は手に入らない)
      if (crateIdx < crateAt.length && t >= crateAt[crateIdx] && !boss) {
        const hp = cfg.crate[crateIdx];
        crates.push({x:rnd(70, W-70), y:-30, hp, max:hp});
        crateIdx++;
        floats.add(W/2, 130, '📦 武器箱！ 撃ちこんで壊せ！', '#fde047', 17);
        api.sound('event');
      }
      // 射撃(武器性能に応じて)
      fireCd -= dt;
      const WP = WEAPONS[wTier];
      const interval = 1 / (Math.min(n * 2, RATE_CAP) * WP.rateM);
      while (fireCd <= 0) {
        fireCd += interval;
        const i = ri(0, Math.min(n, 30) - 1);
        const p = soldierPos(i);
        for (let k=0; k<WP.pellets; k++){
          const spread = (k - (WP.pellets-1)/2) * 14;
          bullets.push({x:p[0]+spread, y:p[1]-12, dmg:WP.dmg, pierce:WP.pierce, splash:WP.splash,
                        color:WP.color, bw:WP.bw, bh:WP.bh, spd:WP.spd});
        }
        if (Math.random() < 0.25) api.sound('shoot');
        parts.burst(p[0], p[1]-14, {n:1, color:WP.color, speed:30, life:0.08, size:3, grav:0});
      }
      bullets.forEach(b => b.y -= b.spd * dt);
      bullets = bullets.filter(b => b.y > -20 && !b.hit);
      // 敵
      enemies.forEach(e => e.y += e.spd * dt);
      gates.forEach(g => g.y += ROAD * dt);
      pickups.forEach(p => p.y += 78 * dt);
      crates.forEach(c => c.y += 72 * dt);           // 撃ち込む時間を確保するため道路より遅い
      // 弾 vs 敵/ボス
      const hitEnemy = (b, e) => {
        e.hp -= b.dmg;
        parts.burst(b.x, b.y, {n:2, color:'#a3e635', speed:60, life:0.25, size:3, grav:150});
        if (b.splash) {                                   // ロケット爆風
          parts.burst(b.x, b.y, {n:12, color:['#f97316','#fde047','#e2e8f0'], speed:180, life:0.4, size:5, grav:100});
          shake.hit(2, 0.12);
          enemies.forEach(o => { if (o !== e && o.hp > 0 && Math.hypot(o.x-b.x, o.y-b.y) < b.splash) o.hp -= 2; });
        }
        if (b.pierce > 0) b.pierce--; else b.hit = true;  // レーザーは貫通
      };
      for (const b of bullets){
        for (const e of enemies){
          const r = e.big ? 20 : 14;
          if (e.hp > 0 && Math.abs(b.x - e.x) < r && Math.abs(b.y - e.y) < r) {
            hitEnemy(b, e);
            if (b.hit) break;
          }
        }
        if (!b.hit) for (const c of crates){             // 弾で武器箱の数字を削る
          if (c.hp > 0 && Math.abs(b.x - c.x) < 26 && Math.abs(b.y - c.y) < 22) {
            c.hp -= b.dmg;
            parts.burst(b.x, b.y, {n:2, color:['#fde047','#a16207'], speed:80, life:0.25, size:3, grav:170});
            if (b.pierce > 0) b.pierce--; else b.hit = true;
            break;
          }
        }
        if (!b.hit && boss && !boss.entering && Math.abs(b.x - boss.x) < 36 && Math.abs(b.y - boss.y) < 36) {
          boss.hp -= b.dmg; b.hit = true;
          parts.burst(b.x, b.y, {n:b.splash ? 10 : 2, color:b.splash ? ['#f97316','#fde047'] : '#a3e635', speed:90, life:0.3, size:4, grav:120});
          if (boss.hp <= 0) {
            parts.burst(boss.x, boss.y, {n:40, color:['#a3e635','#fde047','#f97316'], speed:300, life:0.9, size:6, up:120});
            shake.hit(8, 0.5);
            return finish(true, `のこり ${n} 人でボスをたおした！`);
          }
        }
      }
      // 撃破処理(爆風による同時撃破もまとめて)
      for (const e of enemies){
        if (e.hp <= 0 && !e.deadFx) {
          e.deadFx = true;
          parts.burst(e.x, e.y, {n:10, color:['#a3e635','#4d7c0f','#e2e8f0'], speed:150, life:0.5, size:4, up:60});
          if (Math.random() < 0.5) api.sound('hit');
          if (Math.random() < 0.12) pickups.push({x:e.x, y:e.y});
        }
      }
      enemies = enemies.filter(e => e.hp > 0 && e.y < H + 30);
      // 武器箱: 数字を0まで削れば入手。削りきれずに通り過ぎたら取り逃し
      for (const c of crates){
        if (c.hp <= 0 && !c.done) {
          c.done = true;
          if (wTier < WEAPONS.length - 1) {
            wTier++;
            const nw = WEAPONS[wTier];
            $('#zb-w').textContent = nw.nm;
            floats.add(c.x, c.y - 30, nw.ico + ' ' + nw.nm + ' GET！', nw.color, 21);
            parts.burst(c.x, c.y, {n:26, color:[nw.color, '#fff'], speed:230, life:0.65, size:5, up:130});
            shake.hit(4, 0.25);
            api.sound('win');
          } else {
            n += 5;
            floats.add(c.x, c.y - 30, '+5 人', '#4ade80', 19);
            parts.burst(c.x, c.y, {n:16, color:'#4ade80', speed:180, life:0.5, size:4, up:100});
            $('#zb-n').textContent = n;
            api.sound('gate');
          }
        } else if (!c.done && c.y > SY - 4) {
          c.done = true; c.missed = true;
          floats.add(c.x, SY - 40, '武器箱を壊せなかった…', '#f87171', 15);
          api.sound('fail');
        }
      }
      crates = crates.filter(c => !c.done && c.y < H + 40);
      // 敵が隊列に到達
      for (const e of enemies){
        if (e.y >= SY - 16 && Math.abs(e.x - sx) < 60) {
          e.hp = 0;
          const dmg = e.big ? 4 : 2;
          n -= dmg;
          floats.add(sx, SY - 40, '-' + dmg, '#f87171', 18);
          parts.burst(e.x, SY - 10, {n:12, color:'#f87171', speed:160, life:0.5, size:4, up:80});
          shake.hit(5, 0.25);
          api.sound('hit');
          if (n <= 0) return finish(false, 'ぜんめつ… ' + Math.floor(t) + '秒');
          $('#zb-n').textContent = n;
        } else if (e.y >= SY + 40) e.hp = 0;   // すり抜けは消滅
      }
      enemies = enemies.filter(e => e.hp > 0);
      // ゲート通過
      for (const g of gates){
        if (!g.used && g.y >= SY - 24) { g.used = true; applyGate(sx < W/2 ? g.l : g.r); }
      }
      gates = gates.filter(g => g.y < H + 40);
      // 増援ピックアップ
      for (const p of pickups){
        if (!p.got && p.y > SY - 30 && Math.abs(p.x - sx) < 44) {
          p.got = true; n += 3;
          floats.add(p.x, SY - 44, '+3', '#4ade80', 18);
          api.sound('gate');
          $('#zb-n').textContent = n;
        }
      }
      pickups = pickups.filter(p => !p.got && p.y < H + 20);
      // ボス: まず画面内まで降りてくる(無敵)→ そこからじわじわ前進
      if (boss) {
        if (boss.entering) {
          boss.y += 130 * dt;
          if (boss.y >= 96) { boss.y = 96; boss.entering = false; shake.hit(7, 0.4); api.sound('hit'); }
        } else {
          boss.y += 9 * dt;
          if (boss.y >= SY - 46) return finish(false, 'ボスにおしつぶされた…');
        }
      }
      $('#zb-bar').style.width = clamp(t/cfg.len*100, 0, 100) + '%';
    }
    function draw(){
      ctx.save();
      shake.apply(ctx);
      // 荒野の路肩+道路
      ctx.fillStyle = '#18251c'; ctx.fillRect(-10,-10,W+20,H+20);
      const off = (t * ROAD) % 48;
      ctx.fillStyle = 'rgba(74,222,128,.07)';
      for (let y=-24; y<H; y+=42){ ctx.fillRect(6, y+off, 10, 3); ctx.fillRect(W-16, y+off+20, 10, 3); }
      ctx.fillStyle = '#1f2937'; ctx.fillRect(34, -10, W-68, H+20);
      ctx.fillStyle = 'rgba(0,0,0,.25)';
      ctx.fillRect(34, -10, 6, H+20); ctx.fillRect(W-40, -10, 6, H+20);
      ctx.fillStyle = 'rgba(148,163,184,.35)';
      for (let y=-48; y<H; y+=48) ctx.fillRect(W/2-3, y+off, 6, 26);
      ctx.fillStyle = 'rgba(250,204,21,.5)';
      for (let y=-48; y<H; y+=48){ ctx.fillRect(42, y+off, 4, 30); ctx.fillRect(W-46, y+off, 4, 30); }
      // 路肩の景観(スクロール)
      ctx.font = '19px serif'; ctx.textAlign = 'center';
      props.forEach(p => {
        const sy = ((p.y + t*ROAD*0.9) % (H+80)) - 40;
        ctx.fillText(p.e, p.side ? 17 : W-17, sy);
      });
      // ゲート
      gates.forEach(g => {
        if (g.used) return;
        const drawPanel = (x1, x2, o) => {
          const good = o.op === '+' || o.op === '×';
          ctx.fillStyle = good ? 'rgba(74,222,128,.22)' : 'rgba(248,113,113,.22)';
          ctx.strokeStyle = good ? '#4ade80' : '#f87171';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.roundRect(x1, g.y-22, x2-x1, 44, 8); ctx.fill(); ctx.stroke();
          ctx.fillStyle = good ? '#bbf7d0' : '#fecaca';
          ctx.font = '800 22px system-ui'; ctx.textAlign = 'center';
          ctx.fillText(o.op + o.v, (x1+x2)/2, g.y + 8);
        };
        drawPanel(42, W/2-5, g.l);
        drawPanel(W/2+5, W-42, g.r);
      });
      // ピックアップ
      ctx.font = '22px serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.globalAlpha = 1;
      pickups.forEach(p => ctx.fillText('🎁', p.x, p.y + 8));
      // 武器箱(残りの数字を撃って0にすると開く)
      crates.forEach(c => {
        const p = Math.max(c.hp, 0) / c.max;
        ctx.fillStyle = 'rgba(253,224,71,.22)';
        ctx.beginPath(); ctx.arc(c.x, c.y, 22 + Math.sin(t*6)*3, 0, 7); ctx.fill();
        ctx.font = '26px serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
        ctx.fillText('📦', c.x, c.y + 9);
        ctx.fillStyle = '#422006'; ctx.fillRect(c.x-21, c.y-25, 42, 5);
        ctx.fillStyle = '#fde047'; ctx.fillRect(c.x-21, c.y-25, 42*p, 5);
        ctx.font = '800 16px system-ui';
        ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,.85)';
        ctx.strokeText(Math.max(Math.ceil(c.hp), 0), c.x, c.y - 30);
        ctx.fillStyle = '#fde047';
        ctx.fillText(Math.max(Math.ceil(c.hp), 0), c.x, c.y - 30);
        ctx.font = '800 9px system-ui';
        ctx.fillText('WEAPON', c.x, c.y + 22);
      });
      // 弾(武器ごとに色・形が変化)
      bullets.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x - b.bw/2, b.y - b.bh, b.bw, b.bh);
        if (b.splash) { ctx.fillStyle = '#fde047'; ctx.fillRect(b.x - 1.5, b.y, 3, 5); }
      });
      // 敵(残りHP数字を常時表示)
      enemies.forEach(e => {
        const r = e.big ? 19 : 13;
        ctx.font = (r*2.2) + 'px serif'; ctx.textAlign = 'center';
        ctx.fillStyle = '#fff'; ctx.globalAlpha = 1;
        ctx.fillText('🧟', e.x, e.y + r*0.8);
        ctx.fillStyle = '#450a0a'; ctx.fillRect(e.x-14, e.y-r-8, 28, 4);
        ctx.fillStyle = '#f87171'; ctx.fillRect(e.x-14, e.y-r-8, 28*Math.max(e.hp,0)/e.max, 4);
        ctx.font = '800 12px system-ui';
        ctx.strokeStyle = 'rgba(0,0,0,.8)'; ctx.lineWidth = 3;
        ctx.strokeText(Math.ceil(e.hp), e.x, e.y - r - 12);
        ctx.fillStyle = '#fff';
        ctx.fillText(Math.ceil(e.hp), e.x, e.y - r - 12);
      });
      // ボス(残りHP数字つき。降りてくる間は無敵=シールド表示)
      if (boss) {
        ctx.font = '64px serif'; ctx.textAlign = 'center';
        ctx.fillStyle = '#fff'; ctx.globalAlpha = 1;
        ctx.fillText('🧟', boss.x, boss.y + 24);
        if (boss.entering) {
          ctx.strokeStyle = `rgba(125,211,252,${(0.5 + Math.sin(t*14)*0.3).toFixed(2)})`;
          ctx.lineWidth = 3;
          ctx.beginPath(); ctx.arc(boss.x, boss.y, 42, 0, 7); ctx.stroke();
        }
        ctx.fillStyle = '#450a0a'; ctx.fillRect(60, 14, W-120, 10);
        ctx.fillStyle = '#f87171'; ctx.fillRect(60, 14, (W-120)*Math.max(boss.hp,0)/boss.max, 10);
        ctx.fillStyle = '#fecaca'; ctx.font = '800 12px system-ui';
        ctx.fillText('BOSS', W/2, 12);
        ctx.font = '800 18px system-ui';
        ctx.strokeStyle = 'rgba(0,0,0,.8)'; ctx.lineWidth = 4;
        ctx.strokeText(Math.max(boss.hp, 0), boss.x, boss.y - 48);
        ctx.fillStyle = '#fff';
        ctx.fillText(Math.max(boss.hp, 0), boss.x, boss.y - 48);
      }
      // 隊列
      const shown = Math.min(n, 30);
      for (let i=shown-1; i>=0; i--){
        const p = soldierPos(i);
        ctx.fillStyle = '#93c5fd';
        ctx.beginPath(); ctx.arc(p[0], p[1], 6, 0, 7); ctx.fill();
        ctx.fillStyle = '#1d4ed8';
        ctx.beginPath(); ctx.arc(p[0], p[1]-2, 5, Math.PI, 0); ctx.fill();
      }
      ctx.fillStyle = '#fff'; ctx.font = '800 16px system-ui'; ctx.textAlign = 'center';
      ctx.strokeStyle = 'rgba(0,0,0,.6)'; ctx.lineWidth = 3;
      ctx.strokeText('x' + n, sx, SY - 26);
      ctx.fillText('x' + n, sx, SY - 26);
      parts.draw(ctx);
      floats.draw(ctx);
      ctx.restore();
    }
    function loop(tm){
      raf = requestAnimationFrame(loop);
      const dt = Math.min((tm - tPrev)/1000 || 0, 1/30);
      tPrev = tm;
      if (!over) update(dt);
      parts.update(dt); floats.update(dt); shake.update(dt);
      draw();
    }
    raf = requestAnimationFrame(tm => { tPrev = tm; raf = requestAnimationFrame(loop); });
    return {destroy(){ cancelAnimationFrame(raf); ac.abort(); timers.forEach(clearTimeout); dcv(); }};
  }
};

/* ============================================================
   ゲーム6: ふぶきサバイバル(Canvas・サバイバル&集落建設)
   雪原を歩いて 木材・石・食料 を集め、たき火のまわりに集落を築く。
   建物は仲間を呼び、槍を強化し、シロクマから集落を守る。
   勝利条件 = 規定日数の生存 + 集落レベル到達。
   描画は全て立体シェーディング(絵文字スプライト不使用)。
   Y座標ソートで奥行き、カメラはプレイヤー追従。
   ============================================================ */
const SN_BUILD = [
  {id:'hut',   nm:'小屋',     ico:'🛖',  wood:12, stone:0,  ds:'集落にいるとHPが回復・仲間+1'},
  {id:'store', nm:'倉庫',     ico:'📦', wood:12, stone:4,  ds:'伐採と採掘の取れ高+1・仲間+1'},
  {id:'work',  nm:'作業台',   ico:'⚒️',  wood:14, stone:8,  ds:'槍を強化(威力2倍・手数1.5倍)'},
  {id:'wall',  nm:'防壁',     ico:'🧱', wood:16, stone:10, ds:'シロクマが集落に入れなくなる'},
  {id:'tower', nm:'見張り塔', ico:'🗼', wood:18, stone:12, ds:'仲間+2・作業が速い・夜も明るい'},
];

const SnowGame = {
  stages: [
    {days:2, need:2, bears:1, bearHp:9,  bearSpd:52, blizzLen:7},
    {days:3, need:3, bears:2, bearHp:12, bearSpd:58, blizzLen:9},
    {days:4, need:5, bears:3, bearHp:15, bearSpd:64, blizzLen:11},
  ],
  create(host, stage, api){
    const cfg = this.stages[stage];
    const W = 360, H = 680;                        // 画面(ビューポート・スマホ縦に合わせた比率)
    const WW = 700, WH = 940;                      // ワールド
    const {cv, ctx, toLocal, destroy:dcv} = makeCanvas(host, W, H);
    api.hint('ドラッグで移動。🌲🪨を集めて、たき火のまわりに集落を建てよう！');

    const DAYLEN = 40;
    const CORE = 152;                              // 集落の半径
    const FIRE = {x: WW/2, y: WH/2};
    const P = {x: FIRE.x, y: FIRE.y + 96, hp:100, warm:100, face:1, ph:0, mv:false};
    const cam = {x: clamp(FIRE.x - W/2, 0, WW-W), y: clamp(FIRE.y + 96 - H/2, 0, WH-H)};

    let wood = 8, stone = 2, food = 10, fuel = 72;
    let t = 0, day = 1, dayT = 0, foodT = 0;
    let blizzT = rnd(14, 22);
    let over = false, raf = 0, tPrev = 0;
    let atkCd = 0, feedCd = 0, kills = 0;
    let lastAtk = null;
    const respawnQ = [];
    const parts = makeParticles(), floats = makeFloats(), shake = makeShake();
    const timers = [];

    /* ---- 建設スロット(たき火を囲む5箇所・種類は固定) ---- */
    const slots = SN_BUILD.map((def, i) => {
      const a = -Math.PI/2 + i * (Math.PI*2/5);
      return {x: FIRE.x + Math.cos(a)*116, y: FIRE.y + Math.sin(a)*100,
              def, state:'empty', prog:0, born:0};
    });
    const has   = id => slots.some(s => s.def.id === id && s.state === 'done');
    const level = () => slots.filter(s => s.state === 'done').length;
    const spear       = () => has('work')  ? {dmg:4, cd:0.45, rng:64} : {dmg:2, cd:0.7, rng:52};
    const gatherBonus = () => has('store') ? 1 : 0;
    const workSpeed   = () => has('tower') ? 1.55 : 1;
    const warmR       = () => has('hut')   ? 112 : 92;

    /* ---- 資源ノード(集落の外に配置) ---- */
    const trees = [], rocks = [];
    const outsideCamp = (x, y, d) => Math.hypot(x-FIRE.x, y-FIRE.y) > d;
    for (let i=0; i<17; i++){
      for (let k=0; k<40; k++){
        const x = rnd(38, WW-38), y = rnd(50, WH-42);
        if (!outsideCamp(x, y, CORE + 28)) continue;
        if (trees.some(o => Math.hypot(o.x-x, o.y-y) < 58)) continue;
        trees.push({x, y, left:4, prog:0, regrow:0, sway:rnd(0,7)});
        break;
      }
    }
    for (let i=0; i<9; i++){
      for (let k=0; k<40; k++){
        const x = rnd(36, WW-36), y = rnd(48, WH-40);
        if (!outsideCamp(x, y, CORE + 22)) continue;
        if (trees.some(o => Math.hypot(o.x-x, o.y-y) < 48)) continue;
        if (rocks.some(o => Math.hypot(o.x-x, o.y-y) < 74)) continue;
        rocks.push({x, y, left:3, prog:0, regrow:0});
        break;
      }
    }

    /* ---- 生き物 ---- */
    const bears = [], rabbits = [], mates = [];
    function edgePos(){
      const s = ri(0,3);
      if (s===0) return [rnd(30,WW-30), 34];
      if (s===1) return [rnd(30,WW-30), WH-34];
      if (s===2) return [34, rnd(34,WH-34)];
      return [WW-34, rnd(34,WH-34)];
    }
    function spawnBear(){
      const [x,y] = edgePos();
      bears.push({x, y, hp:cfg.bearHp, max:cfg.bearHp, hitCd:0, wa:rnd(0,7),
                  flash:0, ph:rnd(0,7), face:1, roar:0, retreat:0});
    }
    function spawnRabbit(){
      const [x,y] = edgePos();
      rabbits.push({x, y, wa:rnd(0,7), hop:rnd(0,7), face:1});
    }
    function spawnMate(x, y){
      mates.push({x, y, st:'seek', kind:'tree', tgt:null, prog:0, carry:0, carryKind:'tree',
                  ph:rnd(0,7), face:1, flee:0, born:0.001});
      parts.burst(x, y-8, {n:16, color:['#7dd3fc','#fff'], speed:150, life:0.6, size:4, up:90});
      floats.add(x, y-34, '+1 なかま', '#7dd3fc', 16);
      api.sound('collect');
    }
    for (let i=0;i<cfg.bears;i++) spawnBear();
    for (let i=0;i<6;i++) spawnRabbit();

    /* ---- 天候・地面の飾り ---- */
    const flakes  = Array.from({length:90}, () => ({x:Math.random()*W, y:Math.random()*H, z:rnd(0.5,1.7)}));
    const sparkle = Array.from({length:70}, () => [rnd(0,WW), rnd(0,WH), rnd(0,7)]);
    const drifts  = Array.from({length:24}, () => [rnd(0,WW), rnd(0,WH), rnd(40,95), rnd(14,30)]);

    /* ---- 建設パネル(DOM・canvasの上にかぶせる) ---- */
    const bp = document.createElement('div');
    bp.className = 'sn-build';
    bp.innerHTML = `<div class="bico"></div>
      <div class="bmain"><div class="bnm"></div><div class="bds"></div><div class="bcost"></div></div>
      <button class="bbtn">建てる</button>`;
    host.appendChild(bp);
    const bpIco  = bp.querySelector('.bico'),  bpNm   = bp.querySelector('.bnm'),
          bpDs   = bp.querySelector('.bds'),   bpCost = bp.querySelector('.bcost'),
          bpBtn  = bp.querySelector('.bbtn');
    let nearSlot = null, bpKey = '';
    bpBtn.addEventListener('pointerdown', e => e.stopPropagation());
    bpBtn.addEventListener('click', e => { e.stopPropagation(); startBuild(); });

    function refreshPanel(force){
      const s = nearSlot;
      const key = s ? s.def.id + s.state + (wood >= s.def.wood ? 1:0) + (stone >= s.def.stone ? 1:0) : '';
      if (key === bpKey && !force) return;
      bpKey = key;
      if (!s || s.state !== 'empty') { bp.classList.remove('show'); return; }
      const d = s.def, okW = wood >= d.wood, okS = stone >= d.stone;
      bpIco.textContent = d.ico;
      bpNm.textContent  = d.nm;
      bpDs.textContent  = d.ds;
      bpCost.innerHTML  = `<span class="${okW?'ok':'ng'}">🪵 ${wood}/${d.wood}</span>` +
                          (d.stone ? `<span class="${okS?'ok':'ng'}">🪨 ${stone}/${d.stone}</span>` : '');
      bpBtn.disabled = !(okW && okS);
      bp.classList.add('show');
    }
    function startBuild(){
      const s = nearSlot;
      if (!s || s.state !== 'empty' || over) return;
      const d = s.def;
      if (wood < d.wood || stone < d.stone) { api.sound('fail'); return; }
      wood -= d.wood; stone -= d.stone;
      s.state = 'building'; s.prog = 0;
      api.sound('gate');
      floats.add(s.x, s.y-36, '建設開始！', '#fde047', 16);
      refreshPanel(true);
    }
    function onBuilt(s){
      s.state = 'done'; s.born = 0.001;
      api.sound('win');
      shake.hit(5, 0.25);
      parts.burst(s.x, s.y-10, {n:28, color:['#fde047','#fff','#a3e635'], speed:210, life:0.7, size:5, up:120});
      floats.add(s.x, s.y-46, s.def.nm + ' 完成！', '#fde047', 19);
      const lv = level();
      floats.add(FIRE.x, FIRE.y-70, `🏘 集落Lv ${lv}/${cfg.need}`, '#7dd3fc', 17);
      const add = s.def.id === 'tower' ? 2 : (s.def.id === 'hut' || s.def.id === 'store') ? 1 : 0;
      for (let i=0;i<add;i++)
        timers.push(setTimeout(() => { if (!over) spawnMate(s.x + rnd(-14,14), s.y + 18); }, 300 + i*280));
    }

    /* ---- 入力(仮想ジョイスティック)
       支点を指に追従させる「トレイリング式」。支点を固定すると、
       切り返しに指を直径ぶん(最大92px)運ぶ必要があり、慣性のように感じる ---- */
    const JOY_R = 42;
    let joy = null;
    const ac = new AbortController();
    cv.addEventListener('pointerdown', e => {
      e.preventDefault();
      const p = toLocal(e);
      joy = {ox:p.x, oy:p.y, dx:0, dy:0};
    }, {signal:ac.signal});
    cv.addEventListener('pointermove', e => {
      if (!joy) return;
      const p = toLocal(e);
      let dx = p.x - joy.ox, dy = p.y - joy.oy;
      const len = Math.hypot(dx, dy);
      if (len > JOY_R) {                       // はみ出したぶんだけ支点を引きずる
        joy.ox = p.x - dx/len*JOY_R;
        joy.oy = p.y - dy/len*JOY_R;
        dx = dx/len*JOY_R; dy = dy/len*JOY_R;
      }
      joy.dx = dx; joy.dy = dy;                // 円形クランプ(斜めだけ速くならない)
    }, {signal:ac.signal});
    window.addEventListener('pointerup', () => joy = null, {signal:ac.signal});

    const isBlizz = () => dayT > blizzT && dayT < blizzT + cfg.blizzLen;
    const isWarn  = () => dayT > blizzT - 4 && dayT <= blizzT;
    const dFire   = () => Math.hypot(P.x-FIRE.x, P.y-FIRE.y);

    function finish(win, msg){
      if (over) return; over = true;
      bp.classList.remove('show');
      api.sound(win ? 'collect' : 'fail');
      timers.push(setTimeout(() => api.end({win, msg}), win ? 550 : 750));
    }

    /* ============ 更新 ============ */
    function update(dt){
      t += dt; dayT += dt;

      /* 日付 */
      if (dayT >= DAYLEN) {
        day++; dayT = 0;
        blizzT = rnd(11, Math.max(14, DAYLEN - cfg.blizzLen - 6));
        floats.add(P.x, P.y-64, '☀ DAY ' + day, '#a5f3fc', 26);
        api.sound('event');
        if (day > cfg.days) {
          spawnBear();                              // 猶予日はクマが増える
          if (level() < cfg.need)
            floats.add(P.x, P.y-88, `集落Lv ${level()}/${cfg.need} … まだ足りない！`, '#fca5a5', 15);
        }
      }
      if (day > cfg.days && level() >= cfg.need)
        return finish(true, `集落Lv${level()} を築き、${cfg.days}日を生きのびた！(🐻‍❄️×${kills})`);

      /* 移動 */
      P.mv = false;
      if (joy) {
        const len = Math.hypot(joy.dx, joy.dy);
        if (len > 4) {                                   // デッドゾーンは小さく
          const sp = Math.min(len / JOY_R, 1) * 138;     // 倒し量に比例(最大138px/s)
          P.x = clamp(P.x + joy.dx/len * sp * dt, 16, WW-16);
          P.y = clamp(P.y + joy.dy/len * sp * dt, 24, WH-16);
          if (Math.abs(joy.dx) > 3) P.face = joy.dx > 0 ? 1 : -1;
          P.ph += dt * (sp/138); P.mv = true;
        }
      }
      /* カメラ追従 */
      const tx = clamp(P.x - W/2, 0, WW-W), ty = clamp(P.y - H/2, 0, WH-H);
      cam.x += (tx - cam.x) * Math.min(1, dt*10);
      cam.y += (ty - cam.y) * Math.min(1, dt*10);

      /* 伐採(木のそばに立つと自動) */
      for (const tr of trees){
        if (tr.left <= 0) {
          tr.prog = 0; tr.regrow += dt;
          if (tr.regrow >= 30) {
            tr.regrow = 0; tr.left = 4;
            parts.burst(tr.x, tr.y-12, {n:8, color:'#4ade80', speed:80, life:0.6, size:3, up:60});
          }
          continue;
        }
        if (Math.hypot(tr.x-P.x, tr.y-P.y) < 40) {
          tr.prog += dt;
          if (tr.prog >= 1.0) {
            tr.prog = 0; tr.left--;
            const g = 2 + gatherBonus(); wood += g;
            api.sound('chop');
            parts.burst(tr.x, tr.y-18, {n:9, color:['#92400e','#3f6f4a','#e8f4ff'], speed:130, life:0.5, size:4, up:80});
            floats.add(tr.x, tr.y-42, '+'+g+' 🪵', '#a3e635', 15);
          }
          break;
        } else tr.prog = Math.max(0, tr.prog - dt*2);
      }
      /* 採掘 */
      for (const rk of rocks){
        if (rk.left <= 0) {
          rk.prog = 0; rk.regrow += dt;
          if (rk.regrow >= 42) { rk.regrow = 0; rk.left = 3; }
          continue;
        }
        if (Math.hypot(rk.x-P.x, rk.y-P.y) < 38) {
          rk.prog += dt;
          if (rk.prog >= 1.4) {
            rk.prog = 0; rk.left--;
            const g = 3 + gatherBonus(); stone += g;
            api.sound('pull');
            parts.burst(rk.x, rk.y-10, {n:10, color:['#94a3b8','#e2e8f0'], speed:140, life:0.5, size:4, up:70});
            floats.add(rk.x, rk.y-36, '+'+g+' 🪨', '#cbd5e1', 15);
          }
          break;
        } else rk.prog = Math.max(0, rk.prog - dt*2);
      }

      /* たき火(燃料の消費と補給)
         補給は fuel<60 のときだけ。常時くべると集落の材料が貯まらない */
      fuel -= (isBlizz() ? 5.6 : 2.6) * dt;
      feedCd -= dt;
      if (dFire() < 70 && wood > 0 && fuel < 60 && feedCd <= 0) {
        feedCd = 0.4; wood--; fuel = Math.min(100, fuel + 20);
        api.sound('pour');
        parts.burst(FIRE.x, FIRE.y-6, {n:6, color:['#fb923c','#fde047'], speed:100, life:0.5, size:4, up:140});
      }
      fuel = Math.max(0, fuel);

      /* 暖かさ・HP */
      const inCamp   = dFire() < CORE;
      const nearFire = dFire() < warmR() && fuel > 0;
      let dw = nearFire ? 30 : -4.5;
      if (isBlizz()) dw = nearFire ? 10 : -22;
      P.warm = clamp(P.warm + dw*dt, 0, 100);
      if (P.warm <= 0) P.hp -= 6*dt;
      if (has('hut') && inCamp && fuel > 0 && P.warm > 40) P.hp = Math.min(100, P.hp + 2.6*dt);

      /* 食料(仲間が増えるほど口が増える = 狩りに出る理由になる) */
      foodT += dt * (1 + mates.length*0.2);
      if (foodT >= 8) { foodT = 0; if (food > 0) food--; }
      if (food <= 0) P.hp -= 2*dt;

      /* ウサギ(逃げる・触れると捕獲) */
      for (const r of rabbits){
        const d = Math.hypot(r.x-P.x, r.y-P.y);
        r.hop += dt * (d < 100 ? 9 : 3.5);
        if (d < 100) {
          const a = Math.atan2(r.y-P.y, r.x-P.x);
          r.x += Math.cos(a)*100*dt; r.y += Math.sin(a)*100*dt;
          r.face = Math.cos(a) > 0 ? 1 : -1;
        } else {
          r.wa += rnd(-2,2)*dt;
          r.x += Math.cos(r.wa)*26*dt; r.y += Math.sin(r.wa)*26*dt;
          r.face = Math.cos(r.wa) > 0 ? 1 : -1;
        }
        r.x = clamp(r.x, 16, WW-16); r.y = clamp(r.y, 24, WH-16);
        if (d < 20) {
          r.dead = true; food += 4;
          floats.add(r.x, r.y-28, '+4 🍖', '#4ade80', 16);
          parts.burst(r.x, r.y-6, {n:10, color:['#fff','#fecdd3'], speed:130, life:0.4, size:3, up:70});
          api.sound('coin');
          respawnQ.push([8, 'rabbit']);
        }
      }

      /* シロクマ。襲ったら必ず距離を取る「一撃離脱」型。
         居座らせるとプレイヤーがたき火から動けず一方的に削られて詰む */
      const wall = has('wall');
      for (const b of bears){
        b.hitCd -= dt; b.flash = Math.max(0, b.flash - dt); b.roar = Math.max(0, b.roar - dt);
        b.retreat = Math.max(0, b.retreat - dt);
        const dP = Math.hypot(b.x-P.x, b.y-P.y);
        let ax, ay, spd;
        if (b.retreat > 0) {                                        // 襲った直後は離れる
          ax = b.x - FIRE.x; ay = b.y - FIRE.y;
          if (Math.hypot(ax, ay) < 1) { ax = Math.cos(b.wa); ay = Math.sin(b.wa); }
          spd = cfg.bearSpd * 0.9;
        } else if (dP < 150) {                                      // プレイヤーを追う
          ax = P.x - b.x; ay = P.y - b.y;
          spd = cfg.bearSpd;
        } else {                                                    // 集落のにおいに寄る
          ax = FIRE.x - b.x; ay = FIRE.y - b.y;
          if (Math.hypot(ax, ay) < 240) { b.wa += rnd(-1.5,1.5)*dt; ax = Math.cos(b.wa); ay = Math.sin(b.wa); }
          spd = cfg.bearSpd * 0.55;
        }
        const al = Math.hypot(ax, ay) || 1;
        b.x += ax/al * spd * dt; b.y += ay/al * spd * dt;
        b.ph += dt * (spd/22);
        if (Math.abs(ax) > 2) b.face = ax > 0 ? 1 : -1;

        if (wall) {                                                 // 防壁で押し戻す
          const dc = Math.hypot(b.x-FIRE.x, b.y-FIRE.y);
          if (dc < CORE + 12) {
            const a = Math.atan2(b.y-FIRE.y, b.x-FIRE.x);
            b.x = FIRE.x + Math.cos(a)*(CORE+12);
            b.y = FIRE.y + Math.sin(a)*(CORE+12);
            if (b.hitCd <= 0) {
              b.hitCd = 1.5; b.roar = 0.45;
              parts.burst(b.x, b.y-8, {n:6, color:['#e2e8f0','#94a3b8'], speed:110, life:0.4, size:3});
              api.sound('hit');
            }
          }
        }
        b.x = clamp(b.x, 18, WW-18); b.y = clamp(b.y, 28, WH-18);

        if (dP < 28 && b.hitCd <= 0) {                              // 体当たり
          b.hitCd = 1.2; b.retreat = 1.3; P.hp -= 12;
          const a = Math.atan2(P.y-b.y, P.x-b.x);
          P.x = clamp(P.x + Math.cos(a)*46, 16, WW-16);
          P.y = clamp(P.y + Math.sin(a)*46, 24, WH-16);
          shake.hit(7, 0.32);
          parts.burst(P.x, P.y-8, {n:12, color:['#f87171','#fff'], speed:170, life:0.5, size:4, up:80});
          floats.add(P.x, P.y-36, '-12', '#f87171', 18);
          api.sound('hit');
        }
        if (!wall && Math.hypot(b.x-FIRE.x, b.y-FIRE.y) < 34 && b.hitCd <= 0) {   // たき火を荒らす
          b.hitCd = 2.2; b.retreat = 4.5; b.roar = 0.5;
          fuel = Math.max(0, fuel - 15);
          shake.hit(6, 0.3);
          parts.burst(FIRE.x, FIRE.y-6, {n:18, color:['#fb923c','#78350f','#fde047'], speed:190, life:0.6, size:5, up:110});
          floats.add(FIRE.x, FIRE.y-50, 'たき火が荒らされた！', '#fca5a5', 15);
          api.sound('burn');
        }
        for (const m of mates) if (Math.hypot(b.x-m.x, b.y-m.y) < 30) m.flee = 3.5;  // 仲間を脅かす
      }

      /* 槍の自動攻撃 */
      atkCd -= dt;
      const sp = spear();
      if (atkCd <= 0) {
        let tgt = null, td = sp.rng;
        bears.forEach(b => { const d = Math.hypot(b.x-P.x, b.y-P.y); if (d < td) { td = d; tgt = b; } });
        if (tgt) {
          atkCd = sp.cd;
          tgt.hp -= sp.dmg; tgt.flash = 0.14;
          lastAtk = {x:tgt.x, y:tgt.y, t:0.14};
          P.face = tgt.x > P.x ? 1 : -1;
          parts.burst(tgt.x, tgt.y-8, {n:6, color:['#e2e8f0','#f87171'], speed:140, life:0.35, size:3, grav:0});
          api.sound('slash');
          if (tgt.hp <= 0) {
            tgt.dead = true; kills++; food += 10;
            floats.add(tgt.x, tgt.y-40, '+10 🍖', '#fde047', 20);
            parts.burst(tgt.x, tgt.y-10, {n:26, color:['#f87171','#fff','#fde047'], speed:220, life:0.65, size:5, up:110});
            shake.hit(5, 0.22);
            api.sound('win');
            respawnQ.push([14, 'bear']);
          }
        }
      }

      /* 仲間(木を切って たき火まで運ぶ。木材が潤沢なら石も掘りに行く。
         プレイヤーは暖かさに縛られて遠出しにくいので、石の供給は仲間が担う) */
      const ws = workSpeed();
      const CHOP_T = {tree:2.0, rock:2.8};
      for (const m of mates){
        if (m.born) { m.born += dt; if (m.born > 0.5) m.born = 0; }
        if (m.flee > 0) {                                            // クマから逃げる
          m.flee -= dt;
          const a = Math.atan2(FIRE.y-m.y, FIRE.x-m.x);
          m.x += Math.cos(a)*95*dt; m.y += Math.sin(a)*95*dt;
          m.face = Math.cos(a) > 0 ? 1 : -1; m.ph += dt*7;
          continue;
        }
        if (m.st === 'seek') {
          if (!m.tgt || m.tgt.left <= 0) {
            const toRock = wood >= 24 && rocks.some(r => r.left > 0);
            m.kind = toRock ? 'rock' : 'tree';
            let best = null, bd = 1e9;
            (toRock ? rocks : trees).forEach(o => {
              if (o.left <= 0) return;
              const d = Math.hypot(o.x-FIRE.x, o.y-FIRE.y);          // 集落に近い資源から
              if (d < bd) { bd = d; best = o; }
            });
            m.tgt = best;
          }
          if (!m.tgt) { m.st = 'home'; continue; }
          if (Math.hypot(m.tgt.x-m.x, m.tgt.y-m.y) < 26) { m.st = 'chop'; m.prog = 0; }
          else {
            const a = Math.atan2(m.tgt.y-m.y, m.tgt.x-m.x);
            m.x += Math.cos(a)*62*ws*dt; m.y += Math.sin(a)*62*ws*dt;
            m.face = Math.cos(a) > 0 ? 1 : -1; m.ph += dt*6*ws;
          }
        } else if (m.st === 'chop') {
          if (!m.tgt || m.tgt.left <= 0) { m.st = 'seek'; m.tgt = null; continue; }
          m.prog += dt * ws;
          if (m.prog >= CHOP_T[m.kind]) {
            m.prog = 0; m.tgt.left--;
            m.carry = 2 + gatherBonus();
            m.carryKind = m.kind;
            parts.burst(m.tgt.x, m.tgt.y-16, {n:5, color: m.kind === 'rock' ? ['#94a3b8','#e8f4ff'] : ['#92400e','#e8f4ff'],
                                              speed:90, life:0.4, size:3, up:60});
            m.st = 'home';
          }
        } else {                                                     // home: たき火へ帰る
          if (Math.hypot(FIRE.x-m.x, FIRE.y-m.y) < 46) {
            if (m.carry) {
              if (m.carryKind === 'rock') {
                stone += m.carry;
                floats.add(m.x, m.y-32, '+'+m.carry+' 🪨', '#cbd5e1', 13);
              } else {
                wood += m.carry;
                floats.add(m.x, m.y-32, '+'+m.carry+' 🪵', '#a3e635', 13);
              }
              m.carry = 0;
            }
            if (fuel < 50 && wood > 0) {                             // 自動で薪をくべる
              wood--; fuel = Math.min(100, fuel + 20);
              parts.burst(FIRE.x, FIRE.y-6, {n:4, color:['#fb923c','#fde047'], speed:80, life:0.45, size:3, up:120});
            }
            m.st = 'seek'; m.tgt = null;
          } else {
            const a = Math.atan2(FIRE.y-m.y, FIRE.x-m.x);
            m.x += Math.cos(a)*62*ws*dt; m.y += Math.sin(a)*62*ws*dt;
            m.face = Math.cos(a) > 0 ? 1 : -1; m.ph += dt*6*ws;
          }
        }
      }

      /* 建設の進行(仲間が近くにいると早い) */
      for (const s of slots){
        if (s.state === 'building') {
          const helpers = mates.filter(m => Math.hypot(m.x-s.x, m.y-s.y) < 90).length;
          s.prog += dt * (1 + helpers*0.35);
          if (s.prog >= 2.2) onBuilt(s);
        } else if (s.state === 'done' && s.born) {
          s.born += dt; if (s.born > 0.6) s.born = 0;
        }
      }
      nearSlot = null;
      let nd = 46;
      for (const s of slots){
        if (s.state !== 'empty') continue;
        const d = Math.hypot(s.x-P.x, s.y-P.y);
        if (d < nd) { nd = d; nearSlot = s; }
      }
      refreshPanel(false);

      /* リスポーン・後始末 */
      for (let i=respawnQ.length-1; i>=0; i--){
        respawnQ[i][0] -= dt;
        if (respawnQ[i][0] <= 0) {
          if (respawnQ[i][1] === 'bear') spawnBear(); else spawnRabbit();
          respawnQ.splice(i, 1);
        }
      }
      for (let i=bears.length-1;i>=0;i--)   if (bears[i].dead)   bears.splice(i,1);
      for (let i=rabbits.length-1;i>=0;i--) if (rabbits[i].dead) rabbits.splice(i,1);

      P.hp = Math.min(100, P.hp);
      if (P.hp <= 0) return finish(false, `Day ${day} でたおれた…(集落Lv${level()} / 🐻‍❄️×${kills})`);
      if (lastAtk) { lastAtk.t -= dt; if (lastAtk.t <= 0) lastAtk = null; }
    }

    /* ============ 描画パーツ ============ */
    function ringProg(x, y, r, p, color){
      ctx.strokeStyle = 'rgba(3,7,18,.6)'; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.stroke();
      ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(x, y, r, -Math.PI/2, -Math.PI/2 + clamp(p,0,1)*Math.PI*2); ctx.stroke();
      ctx.lineCap = 'butt';
    }

    function drawGround(){
      const g = ctx.createLinearGradient(0, 0, 0, WH);
      g.addColorStop(0, '#2c3f60'); g.addColorStop(0.5, '#22334f'); g.addColorStop(1, '#18263d');
      ctx.fillStyle = g; ctx.fillRect(0, 0, WW, WH);
      ctx.fillStyle = 'rgba(226,240,255,.055)';                      // 雪だまり
      drifts.forEach(([x,y,rx,ry]) => { ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, 7); ctx.fill(); });
      ctx.fillStyle = 'rgba(255,255,255,.6)';                        // きらめき
      sparkle.forEach(s => {
        const a = Math.sin(t*2.4 + s[2]);
        if (a > 0.86) { ctx.globalAlpha = (a-0.86)/0.14; ctx.fillRect(s[0], s[1], 1.8, 1.8); }
      });
      ctx.globalAlpha = 1;
      const cg = ctx.createRadialGradient(FIRE.x, FIRE.y, CORE*0.2, FIRE.x, FIRE.y, CORE);
      cg.addColorStop(0, 'rgba(214,232,255,.10)');                   // 踏み固められた集落の地面
      cg.addColorStop(1, 'rgba(214,232,255,0)');
      ctx.fillStyle = cg;
      ctx.beginPath(); ctx.ellipse(FIRE.x, FIRE.y, CORE, CORE*0.92, 0, 0, 7); ctx.fill();
    }

    function drawWarmPool(){
      if (fuel <= 0) return;
      const r = 88 + fuel*0.22;
      const g = ctx.createRadialGradient(FIRE.x, FIRE.y, 6, FIRE.x, FIRE.y, r);
      const a = 0.2 * (0.45 + fuel/180) + Math.sin(t*7)*0.02;
      g.addColorStop(0, `rgba(251,146,60,${a.toFixed(3)})`);
      g.addColorStop(1, 'rgba(251,146,60,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.ellipse(FIRE.x, FIRE.y, r, r*0.86, 0, 0, 7); ctx.fill();
      const wr = warmR();                                            // 暖域の境界
      ctx.strokeStyle = 'rgba(251,146,60,.22)'; ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 8]);
      ctx.beginPath(); ctx.ellipse(FIRE.x, FIRE.y, wr, wr*0.86, 0, 0, 7); ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawFire(){
      castShadow(ctx, FIRE.x, FIRE.y + 7, 27, 9, .34);
      for (let i=0;i<9;i++){                                         // 石組み
        const a = i/9 * Math.PI*2 + 0.3;
        orb(ctx, FIRE.x + Math.cos(a)*23, FIRE.y + Math.sin(a)*13 + 4, 5.5, '#8b98ad', .45, -.5);
      }
      capsule(ctx, FIRE.x-13, FIRE.y+2, FIRE.x+11, FIRE.y-5, 3.4, '#7c4a21');   // 薪
      capsule(ctx, FIRE.x-9,  FIRE.y-6, FIRE.x+13, FIRE.y+3, 3.4, '#5f3717');
      if (fuel <= 0) {
        ctx.fillStyle = 'rgba(130,142,162,.22)';                     // 消えた: 燻る煙
        for (let i=0;i<3;i++){
          const yy = FIRE.y - 8 - ((t*18 + i*15) % 44);
          ctx.beginPath(); ctx.arc(FIRE.x + Math.sin(t*2+i)*5, yy, 3 + i*1.6, 0, 7); ctx.fill();
        }
        return;
      }
      const s = 0.55 + fuel/135;                                     // 炎(加算合成で3層)
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const flame = (w, h, c, seed, alpha) => {
        const wob = Math.sin(t*10 + seed)*0.10 + Math.sin(t*19 + seed*2)*0.05;
        const top = FIRE.y - h*(1+wob) - 4;
        ctx.beginPath();
        ctx.moveTo(FIRE.x, top);
        ctx.bezierCurveTo(FIRE.x + w, FIRE.y - h*0.5, FIRE.x + w*0.7, FIRE.y - 1, FIRE.x, FIRE.y - 1);
        ctx.bezierCurveTo(FIRE.x - w*0.7, FIRE.y - 1, FIRE.x - w, FIRE.y - h*0.5, FIRE.x, top);
        ctx.closePath();
        const g = ctx.createLinearGradient(FIRE.x, FIRE.y, FIRE.x, FIRE.y - h*1.2);
        g.addColorStop(0,    rgba(c, alpha*0.15));
        g.addColorStop(0.35, rgba(c, alpha));
        g.addColorStop(1,    rgba(c, alpha*0.25));
        ctx.fillStyle = g; ctx.fill();
      };
      flame(17*s,  44*s, '#f97316', 0,   0.55);
      flame(11*s,  33*s, '#fbbf24', 2.1, 0.65);
      flame(5.5*s, 20*s, '#fff7cc', 4.3, 0.85);
      ctx.restore();
      if (Math.random() < 0.5)                                        // 火の粉
        parts.burst(FIRE.x + rnd(-6,6), FIRE.y - 10, {n:1, color:['#fdba74','#fde047'], speed:18, life:1.1, size:2.4, grav:-32, up:36});
    }

    function drawTree(tr){
      const x = tr.x, y = tr.y;
      if (tr.left <= 0) {                                            // 切り株
        castShadow(ctx, x, y+3, 12, 4.5, .32);
        ctx.beginPath(); ctx.roundRect(x-8, y-11, 16, 13, 3);
        ctx.fillStyle = shadeFill(ctx, x, y-5, 9, '#7c4a21', .3, -.5); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x, y-11, 8, 3.4, 0, 0, 7);
        ctx.fillStyle = shade('#b07a42', .25); ctx.fill();
        ctx.strokeStyle = 'rgba(90,55,25,.55)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(x, y-11, 4.6, 1.9, 0, 0, 7); ctx.stroke();
        if (tr.regrow > 0) {                                         // 再生の芽
          const p = tr.regrow/30;
          ctx.fillStyle = '#4ade80';
          ctx.beginPath(); ctx.arc(x, y-14, 1.4 + p*3.4, 0, 7); ctx.fill();
        }
        return;
      }
      const sw = Math.sin(t*1.4 + tr.sway) * 1.6;
      castShadow(ctx, x + 4, y + 3, 18, 6, .36);
      ctx.beginPath();                                               // 幹
      ctx.moveTo(x-3.4, y); ctx.lineTo(x+3.4, y);
      ctx.lineTo(x+2.2 + sw*0.2, y-16); ctx.lineTo(x-2.2 + sw*0.2, y-16);
      ctx.closePath();
      ctx.fillStyle = shadeFill(ctx, x, y-8, 5, '#7c4a21', .3, -.5); ctx.fill();
      const tier = (ty, hw, hh, off) => {                            // 葉の一段
        ctx.beginPath();
        ctx.moveTo(x + off, ty - hh);
        ctx.lineTo(x + hw + off*0.4, ty);
        ctx.quadraticCurveTo(x + off*0.4, ty + 6, x - hw + off*0.4, ty);
        ctx.closePath();
      };
      [[y-11, 20, 22, sw*0.3], [y-25, 16, 20, sw*0.6], [y-38, 11, 17, sw]].forEach(([ty, hw, hh, off]) => {
        tier(ty, hw, hh, off);
        ctx.fillStyle = shadeFill(ctx, x + off, ty - hh*0.5, hw, '#20694a', .42, -.52);
        ctx.fill();
        ctx.save();                                                  // 雪化粧
        tier(ty, hw, hh, off); ctx.clip();
        tier(ty - 5, hw, hh, off);
        const sg = ctx.createLinearGradient(x, ty - hh, x, ty);
        sg.addColorStop(0,    'rgba(240,249,255,.92)');
        sg.addColorStop(0.75, 'rgba(191,229,255,.15)');
        sg.addColorStop(1,    'rgba(191,229,255,0)');
        ctx.fillStyle = sg; ctx.fill();
        ctx.restore();
        ctx.strokeStyle = 'rgba(190,240,255,.32)'; ctx.lineWidth = 1.2;   // リムライト
        ctx.beginPath();
        ctx.moveTo(x + off, ty - hh); ctx.lineTo(x - hw + off*0.4, ty);
        ctx.stroke();
      });
      if (tr.prog > 0) ringProg(x, y - 22, 24, tr.prog/1.0, '#a3e635');
    }

    function drawRock(rk){
      const x = rk.x, y = rk.y;
      const R = rk.left <= 0 ? 9 : 12 + rk.left*2.2;
      castShadow(ctx, x+2, y+2, R*0.95, R*0.36, .34);
      const pts = [[-1,-.18],[-.66,-.78],[-.1,-1],[.6,-.74],[1,-.16],[.62,.2],[-.55,.22]];
      ctx.beginPath();
      pts.forEach(([px,py], i) => i ? ctx.lineTo(x+px*R, y+py*R) : ctx.moveTo(x+px*R, y+py*R));
      ctx.closePath();
      ctx.fillStyle = shadeFill(ctx, x, y-R*0.4, R, '#78879c', .4, -.5); ctx.fill();
      ctx.beginPath();                                               // 割れ面(暗い側)
      ctx.moveTo(x+0.1*R, y-1*R); ctx.lineTo(x+1*R, y-0.16*R);
      ctx.lineTo(x+0.62*R, y+0.2*R); ctx.lineTo(x+0.2*R, y-0.3*R);
      ctx.closePath();
      ctx.fillStyle = 'rgba(15,23,42,.26)'; ctx.fill();
      ctx.beginPath();                                               // 雪の帽子
      ctx.moveTo(x-0.66*R, y-0.78*R);
      ctx.quadraticCurveTo(x-0.1*R, y-1.16*R, x+0.6*R, y-0.74*R);
      ctx.quadraticCurveTo(x-0.05*R, y-0.6*R, x-0.66*R, y-0.78*R);
      ctx.closePath();
      ctx.fillStyle = 'rgba(236,246,255,.9)'; ctx.fill();
      if (rk.left <= 0) {                                            // 掘り尽くし
        ctx.fillStyle = 'rgba(3,7,18,.3)';
        ctx.beginPath(); ctx.ellipse(x, y+2, R*0.7, R*0.28, 0, 0, 7); ctx.fill();
      }
      if (rk.prog > 0) ringProg(x, y - 6, 22, rk.prog/1.4, '#cbd5e1');
    }

    function drawRabbit(r){
      const hop = Math.abs(Math.sin(r.hop)) * 5;
      castShadow(ctx, r.x, r.y+5, 8, 3, .3);
      ctx.save(); ctx.translate(r.x, r.y - hop); ctx.scale(r.face, 1);
      capsule(ctx, -1, -9, -3.5, -17, 1.7, '#eef4fb');               // 耳
      capsule(ctx,  2, -9,  1.5, -18, 1.7, '#e2ecf7');
      orb(ctx, -7, -2, 3,   '#ffffff', .3, -.2);                     // しっぽ
      orb(ctx,  0, -3, 7.5, '#f2f7fd', .35, -.35);                   // 体
      orb(ctx,  5, -8, 5,   '#f7fbff', .4, -.3);                     // 頭
      ctx.fillStyle = '#1f2937';
      ctx.beginPath(); ctx.arc(7.4, -9, 1.2, 0, 7); ctx.fill();
      ctx.fillStyle = '#fb7185';
      ctx.beginPath(); ctx.arc(9.6, -7, 1, 0, 7); ctx.fill();
      ctx.restore();
    }

    function drawBear(b){
      const walk = Math.sin(b.ph);
      const bob  = Math.abs(Math.sin(b.ph)) * 1.4;
      castShadow(ctx, b.x, b.y + 10, 22, 8, .4);
      ctx.save(); ctx.translate(b.x, b.y - bob); ctx.scale(b.face, 1);
      const fur = '#e3ecf7', furD = '#a9bdd4';
      capsule(ctx, -9, -2, -10 + walk*4, 9, 4.2, furD);              // 奥の脚
      capsule(ctx,  9, -3,  10 - walk*4, 9, 4.2, furD);
      ctx.beginPath(); ctx.ellipse(0, -5, 16, 10.5, 0, 0, 7);        // 胴
      ctx.fillStyle = shadeFill(ctx, 0, -5, 16, fur, .32, -.34); ctx.fill();
      capsule(ctx, -7, -3,  -8 - walk*4, 10, 4.4, fur);              // 手前の脚
      capsule(ctx, 11, -4,  12 + walk*4, 10, 4.4, fur);
      orb(ctx, 15, -11, 8.2, fur, .45, -.3);                         // 頭
      orb(ctx, 10.5, -17,   2.9, furD, .4, -.35);                    // 耳
      orb(ctx, 18.5, -17.5, 2.9, fur,  .5, -.3);
      ctx.beginPath(); ctx.ellipse(21.5, -9, 5.4, 3.9, -0.12, 0, 7); // 鼻先
      ctx.fillStyle = shadeFill(ctx, 21.5, -9, 5, '#f3f8fd', .3, -.28); ctx.fill();
      orb(ctx, 25, -9.8, 1.8, '#2b3444', .5, -.3);
      ctx.fillStyle = '#131b28';                                     // 目
      ctx.beginPath(); ctx.arc(17.5, -12.8, 1.5, 0, 7); ctx.fill();
      ctx.strokeStyle = '#131b28'; ctx.lineWidth = 1.4; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(14.6, -15.6); ctx.lineTo(19.4, -14.4); ctx.stroke();
      ctx.strokeStyle = 'rgba(180,225,255,.4)'; ctx.lineWidth = 1.4;  // リムライト
      ctx.beginPath(); ctx.ellipse(0, -5, 16, 10.5, 0, Math.PI*1.05, Math.PI*1.75); ctx.stroke();
      if (b.roar > 0) {
        ctx.fillStyle = `rgba(255,255,255,${b.roar.toFixed(2)})`;
        ctx.beginPath(); ctx.ellipse(27, -7, 4 + b.roar*8, 3 + b.roar*5, 0, 0, 7); ctx.fill();
      }
      ctx.restore();
      if (b.flash > 0) {                                              // 被弾フラッシュ
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = Math.min(b.flash*5, 0.75);
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.ellipse(b.x, b.y - 7, 22, 15, 0, 0, 7); ctx.fill();
        ctx.restore();
      }
      const bw = 34, bx = b.x - bw/2, by = b.y - 32;                  // HPバー + 残りHP
      statBar(ctx, bx, by, bw, 4.5, b.hp/b.max, '#fb7185', '#f43f5e');
      const n = Math.max(0, Math.ceil(b.hp));
      ctx.font = '800 10px system-ui'; ctx.textAlign = 'center';
      ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(3,7,18,.9)';
      ctx.strokeText(n, b.x, by - 4);
      ctx.fillStyle = '#ffffff';
      ctx.fillText(n, b.x, by - 4);
    }

    function drawHero(){
      const walk = P.mv ? Math.sin(P.ph*9) : 0;
      const bob  = P.mv ? Math.abs(Math.sin(P.ph*9)) * 1.5 : Math.sin(t*2)*0.5;
      castShadow(ctx, P.x, P.y + 13, 12, 4.5, .4);
      ctx.save(); ctx.translate(P.x, P.y - bob); ctx.scale(P.face, 1);
      capsule(ctx, -3.6, 1, -3.6 + walk*3.4, 12, 3.4, '#1f3c63');    // 脚
      capsule(ctx,  3.6, 1,  3.6 - walk*3.4, 12, 3.4, '#26497a');
      orb(ctx, -3.6 + walk*3.4, 13, 3, '#3b2416', .35, -.4);         // ブーツ
      orb(ctx,  3.6 - walk*3.4, 13, 3, '#3b2416', .35, -.4);
      ctx.beginPath(); ctx.roundRect(-12, -9, 9, 13, 3.5);           // 背負い袋
      ctx.fillStyle = shadeFill(ctx, -8, -3, 8, '#8a5a2b', .3, -.45); ctx.fill();
      ctx.strokeStyle = shadeFill(ctx, 0, -6, 12, '#a97c50', .3, -.4);  // 槍(背に担ぐ)
      ctx.lineWidth = 2.2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(9, 7); ctx.lineTo(4, -23); ctx.stroke();
      ctx.fillStyle = '#cbd5e1';
      ctx.beginPath(); ctx.moveTo(4, -27); ctx.lineTo(6.6, -22); ctx.lineTo(1.6, -22); ctx.closePath(); ctx.fill();
      ctx.beginPath();                                               // 胴(パーカ)
      ctx.moveTo(-8, -9);
      ctx.quadraticCurveTo(-9.8, 3, -6.6, 6);
      ctx.lineTo(6.6, 6);
      ctx.quadraticCurveTo(9.8, 3, 8, -9);
      ctx.closePath();
      ctx.fillStyle = shadeFill(ctx, 0, -2, 10, '#e0503c', .42, -.45); ctx.fill();
      ctx.strokeStyle = 'rgba(255,220,190,.35)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0.5, -8); ctx.lineTo(0.5, 5); ctx.stroke();
      capsule(ctx, -6.5, -6, -9 - walk*2.6, 2.5, 3, '#c8422f');      // 腕
      capsule(ctx,  6.5, -6,  9 + walk*2.6, 2.5, 3, '#e35b46');
      orb(ctx, 0.5, -15, 6.2, '#f0c8a2', .45, -.35);                 // 頭
      ctx.strokeStyle = shadeFill(ctx, 0.5, -15, 9, '#e8eef7', .3, -.35);   // フード(毛皮)
      ctx.lineWidth = 4.2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(0.5, -15.5, 8, Math.PI*0.72, Math.PI*2.28); ctx.stroke();
      ctx.fillStyle = '#0f172a';                                     // ゴーグル
      ctx.beginPath(); ctx.roundRect(-2.6, -17.8, 8.6, 4.4, 2); ctx.fill();
      spec(ctx, 3.2, -16.5, 2.4, 1.3, .55);
      ctx.restore();
    }

    function drawMate(m){
      const walk = Math.sin(m.ph*1.4);
      const bob  = Math.abs(Math.sin(m.ph*1.4)) * 1.1;
      const sc   = m.born ? clamp(m.born/0.5, 0.25, 1) : 1;
      castShadow(ctx, m.x, m.y + 11, 10, 4, .32);
      ctx.save(); ctx.translate(m.x, m.y - bob); ctx.scale(m.face*sc, sc);
      capsule(ctx, -3, 1, -3 + walk*2.8, 10, 2.9, '#1f3c63');
      capsule(ctx,  3, 1,  3 - walk*2.8, 10, 2.9, '#26497a');
      ctx.beginPath();
      ctx.moveTo(-6.8, -8);
      ctx.quadraticCurveTo(-8.4, 2, -5.6, 5);
      ctx.lineTo(5.6, 5);
      ctx.quadraticCurveTo(8.4, 2, 6.8, -8);
      ctx.closePath();
      ctx.fillStyle = shadeFill(ctx, 0, -2, 9, '#2f8fbf', .42, -.45); ctx.fill();
      capsule(ctx, -5.5, -5, -8 - walk*2, 2, 2.6, '#2a7ea9');
      capsule(ctx,  5.5, -5,  8 + walk*2, 2, 2.6, '#3aa0d2');
      orb(ctx, 0.5, -13, 5.4, '#f0c8a2', .45, -.35);
      ctx.strokeStyle = shadeFill(ctx, 0.5, -13, 8, '#dbe7f3', .3, -.35);
      ctx.lineWidth = 3.6; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(0.5, -13.5, 7, Math.PI*0.72, Math.PI*2.28); ctx.stroke();
      ctx.fillStyle = '#0f172a';
      ctx.beginPath(); ctx.arc(3, -13.5, 1.1, 0, 7); ctx.fill();
      if (m.carry) {                                                 // 運搬中の資源
        if (m.carryKind === 'rock') orb(ctx, 0, -10, 4.6, '#8b98ad', .45, -.5);
        else capsule(ctx, -8, -9, 8, -9, 2.8, '#8a5a2b');
      }
      ctx.restore();
      if (m.st === 'chop') ringProg(m.x, m.y - 26, 12, m.prog/2.0, '#a3e635');
    }

    /* 防壁(集落を囲む杭の輪)。奥側/手前側に分けて描き、奥行きを保つ */
    function drawPalisade(back){
      const n = 44;
      for (let i=0;i<n;i++){
        const a = i/n * Math.PI*2;
        if ((Math.sin(a) < 0) !== back) continue;
        if (Math.abs(a - Math.PI/2) < 0.26) continue;                // 南側に門を開ける
        const x = FIRE.x + Math.cos(a)*CORE;
        const y = FIRE.y + Math.sin(a)*CORE*0.92;
        const h = 25 + Math.sin(i*2.3)*3;
        castShadow(ctx, x + 2, y + 2, 6, 2.4, .3);
        ctx.beginPath();
        ctx.moveTo(x-4, y); ctx.lineTo(x-4, y-h); ctx.lineTo(x, y-h-6);
        ctx.lineTo(x+4, y-h); ctx.lineTo(x+4, y);
        ctx.closePath();
        ctx.fillStyle = shadeFill(ctx, x, y-h/2, 6, '#8a5a2b', .32, -.5); ctx.fill();
        ctx.fillStyle = 'rgba(238,247,255,.85)';                     // 雪の帽子
        ctx.beginPath();
        ctx.moveTo(x-4, y-h+1); ctx.lineTo(x, y-h-6); ctx.lineTo(x+4, y-h+1);
        ctx.closePath(); ctx.fill();
      }
    }

    function drawBuilding(s, ghost){
      const x = s.x, y = s.y;
      castShadow(ctx, x + 4, y + 4, 30, 10, .4);
      switch (s.def.id){
        case 'hut': {
          ctx.beginPath(); ctx.roundRect(x-22, y-30, 44, 32, 4);     // 丸太の壁
          ctx.fillStyle = shadeFill(ctx, x, y-14, 24, '#a06a3a', .35, -.5); ctx.fill();
          ctx.strokeStyle = 'rgba(70,40,15,.32)'; ctx.lineWidth = 1;
          for (let i=1;i<4;i++){
            ctx.beginPath(); ctx.moveTo(x-22, y-30+i*8); ctx.lineTo(x+22, y-30+i*8); ctx.stroke();
          }
          ctx.beginPath();                                           // 屋根
          ctx.moveTo(x-28, y-29); ctx.lineTo(x, y-50); ctx.lineTo(x+28, y-29); ctx.closePath();
          ctx.fillStyle = shadeFill(ctx, x, y-39, 26, '#7c4a21', .3, -.5); ctx.fill();
          ctx.beginPath();                                           // 屋根の雪
          ctx.moveTo(x-28, y-29); ctx.lineTo(x, y-50); ctx.lineTo(x+28, y-29);
          ctx.lineTo(x+22, y-30); ctx.lineTo(x, y-44); ctx.lineTo(x-22, y-30);
          ctx.closePath();
          ctx.fillStyle = 'rgba(238,247,255,.92)'; ctx.fill();
          if (!ghost) glow(ctx, x+10, y-19, 22, '#fbbf24', .45);     // 窓の灯り
          ctx.beginPath(); ctx.roundRect(x+4, y-25, 13, 11, 2);
          ctx.fillStyle = '#fcd34d'; ctx.fill();
          ctx.strokeStyle = '#7c4a21'; ctx.lineWidth = 1.4; ctx.stroke();
          ctx.beginPath(); ctx.moveTo(x+10.5, y-25); ctx.lineTo(x+10.5, y-14); ctx.stroke();
          ctx.beginPath(); ctx.roundRect(x-17, y-17, 15, 19, 2);     // ドア
          ctx.fillStyle = shadeFill(ctx, x-10, y-8, 8, '#5f3717', .25, -.4); ctx.fill();
          orb(ctx, x-5, y-7, 1.4, '#fbbf24', .5, -.2);
          break;
        }
        case 'store': {
          const crate = (cx, cy, w, h, base) => {
            ctx.beginPath(); ctx.roundRect(cx-w/2, cy-h, w, h, 3);
            ctx.fillStyle = shadeFill(ctx, cx, cy-h/2, w*0.6, base, .35, -.48); ctx.fill();
            ctx.strokeStyle = 'rgba(60,35,12,.45)'; ctx.lineWidth = 1.3;
            ctx.beginPath();
            ctx.moveTo(cx-w/2+3, cy-h+3); ctx.lineTo(cx+w/2-3, cy-3);
            ctx.moveTo(cx+w/2-3, cy-h+3); ctx.lineTo(cx-w/2+3, cy-3);
            ctx.stroke();
            ctx.fillStyle = 'rgba(238,247,255,.8)';                  // 雪
            ctx.beginPath(); ctx.roundRect(cx-w/2, cy-h-2, w, 4, 2); ctx.fill();
          };
          crate(x-11, y+2,  24, 20, '#a06a3a');
          crate(x+13, y+2,  22, 16, '#8f5c30');
          crate(x-2,  y-18, 22, 17, '#b0774a');
          break;
        }
        case 'work': {
          ctx.beginPath(); ctx.roundRect(x-24, y-20, 48, 8, 2);      // 天板
          ctx.fillStyle = shadeFill(ctx, x, y-16, 24, '#a06a3a', .35, -.45); ctx.fill();
          capsule(ctx, x-18, y-12, x-18, y+1, 2.6, '#7c4a21');       // 脚
          capsule(ctx, x+18, y-12, x+18, y+1, 2.6, '#7c4a21');
          ctx.beginPath();                                           // 金床
          ctx.moveTo(x-13, y-24); ctx.lineTo(x+9, y-24); ctx.lineTo(x+13, y-27);
          ctx.lineTo(x+6, y-31); ctx.lineTo(x-6, y-31); ctx.lineTo(x-10, y-27);
          ctx.closePath();
          ctx.fillStyle = shadeFill(ctx, x, y-27, 12, '#64748b', .45, -.5); ctx.fill();
          ctx.strokeStyle = shadeFill(ctx, x+20, y-30, 10, '#a97c50', .3, -.4);   // 研ぎ上がりの槍
          ctx.lineWidth = 2.4; ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(x+16, y-14); ctx.lineTo(x+22, y-38); ctx.stroke();
          ctx.fillStyle = '#cbd5e1';
          ctx.beginPath(); ctx.moveTo(x+22, y-44); ctx.lineTo(x+25.4, y-37); ctx.lineTo(x+18.6, y-37); ctx.closePath(); ctx.fill();
          if (!ghost) {
            glow(ctx, x, y-28, 22, '#fb923c', .25);
            if (Math.random() < 0.25)
              parts.burst(x, y-30, {n:2, color:['#fde047','#fb923c'], speed:70, life:0.35, size:2.4, up:40});
          }
          break;
        }
        case 'wall': {                                               // 門(輪は drawPalisade)
          const post = px => {
            ctx.beginPath();
            ctx.moveTo(px-5, y+2); ctx.lineTo(px-5, y-32); ctx.lineTo(px, y-38);
            ctx.lineTo(px+5, y-32); ctx.lineTo(px+5, y+2);
            ctx.closePath();
            ctx.fillStyle = shadeFill(ctx, px, y-16, 7, '#8a5a2b', .32, -.5); ctx.fill();
            ctx.fillStyle = 'rgba(238,247,255,.88)';
            ctx.beginPath();
            ctx.moveTo(px-5, y-31); ctx.lineTo(px, y-38); ctx.lineTo(px+5, y-31);
            ctx.closePath(); ctx.fill();
          };
          capsule(ctx, x-20, y-29, x+20, y-29, 3,   '#7c4a21');      // 横木
          capsule(ctx, x-18, y-18, x+18, y-18, 2.6, '#8a5a2b');
          post(x-17); post(x+17);
          break;
        }
        case 'tower': {
          capsule(ctx, x-16, y+2, x-8, y-34, 3,   '#8a5a2b');        // 4本柱
          capsule(ctx, x+16, y+2, x+8, y-34, 3,   '#7c4a21');
          capsule(ctx, x-8, y-8,  x-5, y-34, 2.6, '#6d4320');
          capsule(ctx, x+8, y-8,  x+5, y-34, 2.6, '#6d4320');
          ctx.strokeStyle = 'rgba(124,74,33,.8)'; ctx.lineWidth = 2; // 筋交い
          ctx.beginPath();
          ctx.moveTo(x-14, y-10); ctx.lineTo(x+14, y-22);
          ctx.moveTo(x+14, y-10); ctx.lineTo(x-14, y-22);
          ctx.stroke();
          ctx.beginPath(); ctx.roundRect(x-17, y-45, 34, 12, 3);     // 見張り台
          ctx.fillStyle = shadeFill(ctx, x, y-39, 18, '#a06a3a', .35, -.48); ctx.fill();
          ctx.beginPath();                                           // 屋根
          ctx.moveTo(x-20, y-45); ctx.lineTo(x, y-60); ctx.lineTo(x+20, y-45); ctx.closePath();
          ctx.fillStyle = shadeFill(ctx, x, y-52, 19, '#7c4a21', .3, -.5); ctx.fill();
          ctx.beginPath();
          ctx.moveTo(x-20, y-45); ctx.lineTo(x, y-60); ctx.lineTo(x+20, y-45);
          ctx.lineTo(x+14, y-46); ctx.lineTo(x, y-55); ctx.lineTo(x-14, y-46);
          ctx.closePath();
          ctx.fillStyle = 'rgba(238,247,255,.92)'; ctx.fill();
          const pulse = 0.78 + Math.sin(t*3)*0.14;                   // ランタン
          if (!ghost) glow(ctx, x, y-41, 36*pulse, '#fde68a', .5);
          orb(ctx, x, y-41, 4.6, '#fde047', .6, -.2);
          break;
        }
      }
    }

    function drawSlot(s){
      if (s.state === 'empty') {
        const near = nearSlot === s;
        ctx.save();                                                  // 建設予定地(ホログラム)
        ctx.setLineDash([6, 6]);
        ctx.lineDashOffset = -t * 14;
        ctx.strokeStyle = `rgba(125,211,252,${near ? .8 : .35})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(s.x, s.y, 27, 15, 0, 0, 7); ctx.stroke();
        ctx.restore();
        if (near) glow(ctx, s.x, s.y, 44, '#38bdf8', .22);
        ctx.save();                                                  // 完成予想図を薄く重ねる
        ctx.globalAlpha = near ? 0.34 : 0.16;
        drawBuilding(s, true);
        ctx.restore();
        return;
      }
      if (s.state === 'building') {
        ctx.save();
        ctx.setLineDash([4, 5]);
        ctx.strokeStyle = 'rgba(253,224,71,.8)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(s.x, s.y, 27, 15, 0, 0, 7); ctx.stroke();
        ctx.restore();
        const p = clamp(s.prog/2.2, 0, 1);                           // 地面からせり上がる
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.translate(s.x, s.y); ctx.scale(1, p); ctx.translate(-s.x, -s.y);
        drawBuilding(s);
        ctx.restore();
        ringProg(s.x, s.y - 38, 16, p, '#fde047');
        if (Math.random() < 0.35)
          parts.burst(s.x + rnd(-16,16), s.y + 4, {n:1, color:['#e2e8f0','#fde047'], speed:40, life:0.5, size:3, up:50});
        return;
      }
      const p  = s.born ? clamp(s.born/0.6, 0, 1) : 1;               // 完成: ぽん、と出る
      const sc = s.born ? 0.6 + 0.4*p + Math.sin(p*Math.PI)*0.12 : 1;
      ctx.save();
      ctx.translate(s.x, s.y); ctx.scale(sc, sc); ctx.translate(-s.x, -s.y);
      drawBuilding(s);
      ctx.restore();
    }

    function drawSnow(){
      const wind = isBlizz() ? 230 : 20;
      const fall = isBlizz() ? 200 : 58;
      ctx.fillStyle = isBlizz() ? 'rgba(233,244,255,.85)' : 'rgba(226,240,255,.72)';
      flakes.forEach(f => {
        f.y += fall * f.z * 0.016;
        f.x += (wind * f.z + Math.sin(t*2 + f.z*7)*10) * 0.016;
        if (f.y > H + 4) { f.y = -4; f.x = Math.random()*W; }
        if (f.x > W + 8)  f.x = -8;
        if (isBlizz()) ctx.fillRect(f.x, f.y, 4 + f.z*4, 1.7);
        else { ctx.beginPath(); ctx.arc(f.x, f.y, f.z*1.5, 0, 7); ctx.fill(); }
      });
      if (isBlizz()) { ctx.fillStyle = 'rgba(147,197,253,.10)'; ctx.fillRect(0, 0, W, H); }
    }

    function drawVignette(){
      const a = (1 - P.warm/100) * 0.5;                              // 寒さ
      if (a > 0.02) {
        const g = ctx.createRadialGradient(W/2, H/2, 110, W/2, H/2, 340);
        g.addColorStop(0, 'rgba(125,211,252,0)');
        g.addColorStop(1, `rgba(125,211,252,${a.toFixed(2)})`);
        ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      }
      const h = 1 - clamp(P.hp/40, 0, 1);                            // 瀕死
      if (h > 0.02) {
        const g = ctx.createRadialGradient(W/2, H/2, 90, W/2, H/2, 330);
        g.addColorStop(0, 'rgba(220,38,38,0)');
        g.addColorStop(1, `rgba(220,38,38,${(h*0.5).toFixed(2)})`);
        ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      }
    }

    function drawHUD(){
      /* 左: HP / 暖かさ / 燃料 */
      panel(ctx, 10, 10, 132, 58, 14);
      const gauge = (i, ico, v, c1, c2) => {
        const yy = 19 + i*16;
        ctx.font = '11px system-ui'; ctx.textAlign = 'left'; ctx.fillStyle = '#cbd5e1';
        ctx.fillText(ico, 18, yy + 9);
        statBar(ctx, 36, yy + 1, 96, 8, v, c1, c2);
      };
      gauge(0, '❤',  P.hp/100,   '#fb7185', '#f43f5e');
      gauge(1, '🌡', P.warm/100, '#7dd3fc', '#38bdf8');
      gauge(2, '🔥', fuel/100,   '#fdba74', '#f97316');

      /* 右: 資源 */
      const chip = (i, ico, v, col) => {
        const cx = W - 78, cy = 10 + i*20;
        panel(ctx, cx, cy, 68, 18, 9);
        ctx.font = '11px system-ui'; ctx.textAlign = 'left'; ctx.fillStyle = '#cbd5e1';
        ctx.fillText(ico, cx + 7, cy + 13);
        ctx.font = '800 12px system-ui'; ctx.textAlign = 'right'; ctx.fillStyle = col;
        ctx.fillText(v, cx + 60, cy + 13);
      };
      chip(0, '🪵', wood,  '#bef264');
      chip(1, '🪨', stone, '#e2e8f0');
      chip(2, '🍖', food,  '#fdba74');

      /* 中央: 日数 + 集落レベル */
      const lv = level(), met = lv >= cfg.need;
      panel(ctx, 148, 10, 124, 48, 13);
      ctx.textAlign = 'center';
      ctx.font = '800 11px system-ui'; ctx.fillStyle = '#cbd5e1';
      ctx.fillText(`DAY ${day} / ${cfg.days}`, 210, 24);
      statBar(ctx, 154, 29, 112, 5, dayT/DAYLEN, '#38bdf8', '#a5f3fc');
      ctx.font = '800 11px system-ui';
      ctx.fillStyle = met ? '#fde047' : '#94a3b8';
      ctx.fillText(`🏘 集落Lv ${lv} / ${cfg.need}`, 210, 50);

      /* 警告 */
      ctx.textAlign = 'center';
      if (isBlizz()) {
        ctx.font = '800 14px system-ui';
        ctx.fillStyle = `rgba(186,230,253,${(0.65 + Math.sin(t*7)*0.35).toFixed(2)})`;
        ctx.fillText('🌨 吹雪！ たき火のそばへ！', W/2, 82);
      } else if (isWarn()) {
        ctx.font = '800 13px system-ui';
        ctx.fillStyle = `rgba(252,165,165,${(0.5 + Math.sin(t*8)*0.5).toFixed(2)})`;
        ctx.fillText('⚠ 吹雪がちかづいている…', W/2, 82);
      }
      if (fuel <= 0) {
        ctx.font = '800 13px system-ui';
        ctx.fillStyle = `rgba(252,165,165,${(0.55 + Math.sin(t*9)*0.45).toFixed(2)})`;
        ctx.fillText('🪵 たき火が消えた！ 薪をくべろ！', W/2, 102);
      }

      /* 画面外の集落へのコンパス */
      const fx = FIRE.x - cam.x, fy = FIRE.y - cam.y;
      if (fx < 24 || fx > W-24 || fy < 78 || fy > H-58) {
        const mx = clamp(fx, 26, W-26), my = clamp(fy, 82, H-60);
        const a  = Math.atan2(FIRE.y - (cam.y + H/2), FIRE.x - (cam.x + W/2));
        glow(ctx, mx, my, 20, '#fb923c', .5);
        ctx.save(); ctx.translate(mx, my); ctx.rotate(a);
        ctx.fillStyle = '#fdba74';
        ctx.beginPath(); ctx.moveTo(9, 0); ctx.lineTo(-5, -6); ctx.lineTo(-5, 6); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }

    function drawJoy(){
      if (!joy) return;
      ctx.beginPath(); ctx.arc(joy.ox, joy.oy, JOY_R, 0, 7);
      ctx.fillStyle = 'rgba(148,180,255,.10)'; ctx.fill();
      ctx.strokeStyle = 'rgba(148,180,255,.35)'; ctx.lineWidth = 2; ctx.stroke();
      const kx = joy.ox + joy.dx, ky = joy.oy + joy.dy;
      glow(ctx, kx, ky, 22, '#38bdf8', .35);
      orb(ctx, kx, ky, 15, '#7dd3fc', .5, -.4);
    }

    /* ============ 描画 ============ */
    function draw(){
      ctx.save();
      shake.apply(ctx);
      const night = clamp((dayT/DAYLEN - 0.45) * 1.5, 0, 0.62);

      /* --- ワールド座標 --- */
      ctx.save();
      ctx.translate(-cam.x, -cam.y);
      drawGround();
      drawWarmPool();

      const items = [];                                              // Yソートで奥行き
      trees.forEach(o   => items.push([o.y, () => drawTree(o)]));
      rocks.forEach(o   => items.push([o.y, () => drawRock(o)]));
      slots.forEach(s   => items.push([s.y, () => drawSlot(s)]));
      rabbits.forEach(o => items.push([o.y, () => drawRabbit(o)]));
      mates.forEach(o   => items.push([o.y, () => drawMate(o)]));
      bears.forEach(o   => items.push([o.y, () => drawBear(o)]));
      items.push([FIRE.y, drawFire]);
      items.push([P.y,    drawHero]);
      if (has('wall')) {
        items.push([FIRE.y - CORE, () => drawPalisade(true)]);       // 奥の壁
        items.push([FIRE.y + CORE, () => drawPalisade(false)]);      // 手前の壁
      }
      items.sort((a, b) => a[0] - b[0]);
      items.forEach(it => it[1]());

      if (lastAtk) {                                                 // 槍の一撃
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.strokeStyle = 'rgba(226,240,255,.9)'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(P.x, P.y - 10); ctx.lineTo(lastAtk.x, lastAtk.y - 8); ctx.stroke();
        ctx.restore();
      }
      parts.draw(ctx);
      floats.draw(ctx);
      ctx.restore();

      /* --- 画面座標 --- */
      if (night > 0.01) {                                            // 夜のとばり
        ctx.fillStyle = `rgba(6,12,32,${night.toFixed(3)})`;
        ctx.fillRect(0, 0, W, H);
        ctx.save();                                                  // 光源で夜を押し戻す
        ctx.globalCompositeOperation = 'lighter';
        ctx.translate(-cam.x, -cam.y);
        if (fuel > 0) glow(ctx, FIRE.x, FIRE.y, 120 + fuel*0.5, '#fb923c', night*0.58);
        slots.forEach(s => {
          if (s.state !== 'done') return;
          if (s.def.id === 'tower') glow(ctx, s.x, s.y - 41, 112, '#fde68a', night*0.52);
          if (s.def.id === 'hut')   glow(ctx, s.x + 10, s.y - 19, 54, '#fbbf24', night*0.46);
        });
        ctx.restore();
      }
      drawVignette();
      drawSnow();
      drawHUD();
      drawJoy();
      ctx.restore();
    }

    function loop(tm){
      raf = requestAnimationFrame(loop);
      const dt = Math.min((tm - tPrev)/1000 || 0, 1/30);
      tPrev = tm;
      if (!over) update(dt);
      parts.update(dt); floats.update(dt); shake.update(dt);
      draw();
    }
    raf = requestAnimationFrame(tm => { tPrev = tm; raf = requestAnimationFrame(loop); });
    return {destroy(){ cancelAnimationFrame(raf); ac.abort(); timers.forEach(clearTimeout); bp.remove(); dcv(); }};
  }
};

/* ============================================================
   ゲーム7: サバイブヒーロー(Canvas・ダダサバイバー系)
   ドラッグ移動+自動攻撃。宝石でレベルアップし大群から生きのびる。
   ============================================================ */
const DadaGame = {
  stages: [
    {time:60,  spawn:1.00, ehp:3, espd:40, cdmg:8},
    {time:90,  spawn:0.80, ehp:5, espd:46, cdmg:10},
    {time:120, spawn:0.65, ehp:8, espd:52, cdmg:12},
  ],
  create(host, stage, api){
    const cfg = this.stages[stage];
    const W = 360, H = 560;
    const {cv, ctx, toLocal, destroy:dcv} = makeCanvas(host, W, H);
    const hud = document.createElement('div'); hud.className = 'game-hud';
    hud.innerHTML = `<span>❤ <b id="dd-hp">100</b></span><span>Lv <b id="dd-lv">1</b></span>
      <span>⏱ <b id="dd-t">${cfg.time}</b></span>`;
    host.appendChild(hud);
    api.hint('ドラッグで移動！武器は自動で撃つ');

    const P = {x:W/2, y:H/2, hp:100, spd:115, face:1};
    let t = 0, over = false, paused = false, raf = 0, tPrev = 0;
    let fireRate = 1.7, dmg = 2, projN = 1, fireCd = 0;
    let level = 1, xp = 0, xpNeed = 5, kills = 0;
    let bullets = [], enemies = [], gems = [];
    let spawnCd = 0.6;
    const parts = makeParticles(), floats = makeFloats(), shake = makeShake();
    const timers = [];
    const tufts = Array.from({length:36}, () => [rnd(6,W-6), rnd(6,H-6), rnd(1.5,3.5)]);
    const gauge = makeSkillGauge(host, '💎', '#f472b6', '#f9a8d4');
    gauge.set(0, xpNeed);

    let joy = null;
    const ac = new AbortController();
    cv.addEventListener('pointerdown', e => {
      e.preventDefault();
      const p = toLocal(e);
      joy = {ox:p.x, oy:p.y, dx:0, dy:0};
    }, {signal:ac.signal});
    cv.addEventListener('pointermove', e => {
      if (!joy) return;
      const p = toLocal(e);
      joy.dx = clamp(p.x - joy.ox, -46, 46);
      joy.dy = clamp(p.y - joy.oy, -46, 46);
    }, {signal:ac.signal});
    window.addEventListener('pointerup', () => joy = null, {signal:ac.signal});

    function spawnEnemy(){
      const side = ri(0,3); let x, y;
      if (side === 0) { x = rnd(0,W); y = -26; }
      else if (side === 1) { x = rnd(0,W); y = H+26; }
      else if (side === 2) { x = -26; y = rnd(0,H); }
      else { x = W+26; y = rnd(0,H); }
      let hp = cfg.ehp, spd = cfg.espd*rnd(0.85,1.15), r = 14, emo = '🧟';
      const roll = Math.random();
      if (stage >= 1 && roll < 0.22) { hp = Math.max(1, Math.round(cfg.ehp*0.5)); spd *= 1.7; r = 11; emo = '👻'; }
      else if (roll > 0.86) { hp = cfg.ehp*3; spd *= 0.55; r = 19; emo = '🧌'; }
      enemies.push({x, y, hp, max:hp, spd, r, emo, hitCd:0});
      const rush = t > cfg.time - 12;
      spawnCd = cfg.spawn * (rush ? 0.45 : 1) * rnd(0.7, 1.3);
    }
    function fire(){
      let best = null, bd = 1e9;
      enemies.forEach(e => {
        const d = (e.x-P.x)*(e.x-P.x) + (e.y-P.y)*(e.y-P.y);
        if (d < bd) { bd = d; best = e; }
      });
      if (!best || bd > 300*300) return;
      const base = Math.atan2(best.y-P.y, best.x-P.x);
      for (let i=0;i<projN;i++){
        const off = (i - (projN-1)/2) * 0.16;
        bullets.push({x:P.x, y:P.y, vx:Math.cos(base+off)*340, vy:Math.sin(base+off)*340});
      }
      P.face = Math.cos(base) >= 0 ? 1 : -1;
      if (Math.random() < 0.3) api.sound('shoot');
    }
    const UPGRADES = [
      {t:'🔫 連射UP',        d:'攻撃速度 +30%', ok:() => true,      fn:() => fireRate *= 1.3},
      {t:'💥 ダメージUP',    d:'攻撃力 +1',     ok:() => true,      fn:() => dmg += 1},
      {t:'🎯 マルチショット', d:'同時発射 +1',   ok:() => projN < 4, fn:() => projN++},
      {t:'👟 スピードUP',    d:'移動速度 +18',  ok:() => true,      fn:() => P.spd += 18},
      {t:'💊 かいふく',      d:'HP +35',        ok:() => P.hp < 95, fn:() => P.hp = Math.min(100, P.hp + 35)},
    ];
    function levelUp(){
      paused = true;
      api.sound('event');
      const pool = UPGRADES.filter(u => u.ok());
      const a = pool.splice(ri(0, pool.length-1), 1)[0];
      const b = pool.length ? pool.splice(ri(0, pool.length-1), 1)[0] : a;
      const ovl = document.createElement('div'); ovl.className = 'sn-event';
      ovl.innerHTML = `<div class="box"><div class="t">⬆ レベルアップ！ Lv${level}</div><div class="d">パワーアップを1つえらぼう</div></div>`;
      const box = ovl.querySelector('.box');
      [[a,'main'],[b,'']].forEach(([u, cls]) => {
        const btn = document.createElement('button');
        if (cls) btn.className = cls;
        btn.textContent = `${u.t} — ${u.d}`;
        btn.addEventListener('click', () => {
          api.sound('gate'); u.fn();
          gauge.addSkill(u.t.split(' ')[0]);
          ovl.remove(); paused = false;
        });
        box.appendChild(btn);
      });
      host.appendChild(ovl);
    }
    function finish(win, msg){
      if (over) return; over = true;
      api.sound(win ? 'collect' : 'fail');
      timers.push(setTimeout(() => api.end({win, msg}), win ? 500 : 700));
    }
    function update(dt){
      t += dt;
      $('#dd-t').textContent = Math.max(0, Math.ceil(cfg.time - t));
      if (t >= cfg.time) return finish(true, `Lv${level}・${kills}体たおして生きのびた！`);
      // 移動
      if (joy) {
        const len = Math.hypot(joy.dx, joy.dy);
        if (len > 6) {
          P.x = clamp(P.x + joy.dx/46 * P.spd * dt, 16, W-16);
          P.y = clamp(P.y + joy.dy/46 * P.spd * dt, 16, H-16);
        }
      }
      spawnCd -= dt; if (spawnCd <= 0) spawnEnemy();
      fireCd -= dt;
      if (fireCd <= 0) { fire(); fireCd = 1/fireRate; }
      bullets.forEach(b => { b.x += b.vx*dt; b.y += b.vy*dt; });
      bullets = bullets.filter(b => b.x > -20 && b.x < W+20 && b.y > -20 && b.y < H+20 && !b.hit);
      // 敵
      for (const e of enemies){
        const a = Math.atan2(P.y-e.y, P.x-e.x);
        e.x += Math.cos(a) * e.spd * dt;
        e.y += Math.sin(a) * e.spd * dt;
        e.hitCd -= dt;
        const d = Math.hypot(e.x-P.x, e.y-P.y);
        if (d < e.r + 12 && e.hitCd <= 0) {
          e.hitCd = 0.8;
          P.hp -= cfg.cdmg;
          shake.hit(5, 0.25);
          parts.burst(P.x, P.y, {n:8, color:'#f87171', speed:140, life:0.4, size:4, up:60});
          floats.add(P.x, P.y-26, '-' + cfg.cdmg, '#f87171', 16);
          api.sound('hit');
          $('#dd-hp').textContent = Math.max(0, Math.ceil(P.hp));
          if (P.hp <= 0) return finish(false, `${Math.floor(t)}秒 いきのこった…(Lv${level})`);
        }
      }
      // 弾 vs 敵
      for (const b of bullets){
        for (const e of enemies){
          if (e.hp <= 0) continue;
          const dx = b.x-e.x, dy = b.y-e.y;
          if (dx*dx + dy*dy < (e.r+4)*(e.r+4)) {
            e.hp -= dmg; b.hit = true;
            parts.burst(b.x, b.y, {n:2, color:'#fde047', speed:70, life:0.2, size:3, grav:100});
            if (e.hp <= 0) {
              kills++;
              gems.push({x:e.x, y:e.y});
